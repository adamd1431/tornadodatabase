<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strongest 30 Tornadoes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      padding:30px;
      min-height:100vh;

      font-family:Inter,sans-serif;
      color:#f8fafc;

      background:
        radial-gradient(circle at 15% 10%, rgba(59,130,246,.15), transparent 35%),
        radial-gradient(circle at 85% 15%, rgba(139,92,246,.12), transparent 40%),
        linear-gradient(180deg,#020617,#08111f,#0f172a);

      background-attachment:fixed;
    }

    h1 {
      font-size: 44px;
      font-weight: 900;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    button {
      padding:10px 14px;
      border-radius:12px;
      border:none;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
    }

    .grid {
      max-width: 900px;
      margin: auto;
    }

    .slot{
      display:flex;
      align-items:center;
      gap:18px;

      padding:18px;
      margin-bottom:14px;

      border-radius:22px;

      background:
        rgba(255,255,255,.04);

      backdrop-filter:blur(14px);

      border:1px solid rgba(255,255,255,.08);

      transition:.2s;
    }

    .slot:hover{
      transform:translateY(-3px);

      border-color:
        rgba(59,130,246,.3);
    }

    .rank{
      width:72px;
      height:72px;

      display:flex;
      align-items:center;
      justify-content:center;

      border-radius:18px;

      font-size:28px;
      font-weight:900;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );
    }

    select {
      flex:1;
      margin-left:10px;
      padding:10px;
      border-radius:10px;
      background:#111827;
      color:white;
      border:1px solid #374151;
    }

    .muted {
      color:#64748b;
      font-style:italic;
    }

    .hero{
      text-align:center;
      margin-bottom:35px;
    }

    .hero h1{
      margin:0;

      font-size:clamp(42px,6vw,72px);
      font-weight:900;

      background:
        linear-gradient(
          90deg,
          white,
          #93c5fd,
          #c4b5fd
        );

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .hero p{
      color:#94a3b8;
      margin-top:10px;
    }

    .thumb{
      width:120px;
      height:80px;
      object-fit:cover;
      border-radius:14px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:14px;
      margin-bottom:24px;
    }

    .stat{
      padding:20px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .stat h2{
      margin:0;
      font-size:32px;
    }

    .stat p{
      color:#94a3b8;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>💥 Strongest 30 Tornadoes</h1>
  <p>My personal ranking of the strongest tornadoes ever documented.</p>
</div>

<div class="topbar">
  <button onclick="location.href='index.html'">← Back</button>
</div>

<div class="grid" id="grid">Loading...</div>

<script type="module">
import { supabase } from './supabase.js';

const grid = document.getElementById("grid");

let tornadoes = [];
let isAdmin = false;

async function checkAdmin() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) return false;

  const { data } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  return data?.role === "admin";
}

async function load() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  tornadoes = data || [];

  isAdmin = await checkAdmin();

  render();
}

function attachResultListeners(results, rank) {
  [...results.children].forEach(child => {
    child.addEventListener("click", async () => {
      await assignRank(child.dataset.id, rank);
    });
  });
}

function getRankStyle(rank) {
  if (rank === 1) return "linear-gradient(135deg,#facc15,#eab308)";
  if (rank === 2) return "linear-gradient(135deg,#d1d5db,#9ca3af)";
  if (rank === 3) return "linear-gradient(135deg,#fb923c,#ea580c)";
  return "linear-gradient(135deg,#2563eb,#1d4ed8)";
}

function formatState(state) {
  if (!state) return "Unknown";
  return state
    .toString()
    .split(" ")
    .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
    .join(" ");
}

function render() {
  grid.innerHTML = "";

  // =========================
  // 👁️ VIEWER MODE
  // =========================
  if (!isAdmin) {
    const ranked = [...tornadoes]
      .filter(t => t.opinion_rank != null)
      .sort((a, b) => a.opinion_rank - b.opinion_rank)
      .slice(0, 30);

    if (!ranked.length) {
      grid.innerHTML = `
        <div style="text-align:center;color:#94a3b8;">
          No ranked tornadoes yet.
        </div>
      `;
      return;
    }

    grid.innerHTML = ranked.map(t => `
      <div class="slot">

        <div class="rank" style="background:${getRankStyle(t.opinion_rank)}">
          #${t.opinion_rank}
        </div>

        ${
          t.cover_image
            ? `
              <img
                class="thumb"
                src="${t.cover_image}"
              >
            `
            : ""
        }

        <div>
          <h3 style="margin:0;">
            ${t.name}
          </h3>

          <p style="margin:4px 0;color:#94a3b8;">
            ${
              Array.isArray(t.states)
                ? t.states.map(formatState).join(" • ")
                : formatState(t.states)
            }
          </p>
        </div>

      </div>
    `).join("");

    return;
  }

  // =========================
  // 🔧 ADMIN MODE
  // =========================

  for (let rank = 1; rank <= 30; rank++) {

    const assigned = tornadoes.find(t => t.opinion_rank === rank);

    const slot = document.createElement("div");
    slot.className = "slot";
    slot.style.position = "relative";

    const label = document.createElement("div");
    label.className = "rank";
    label.textContent = "#" + rank;

    label.style.background = getRankStyle(rank);

    const main = document.createElement("div");
    main.style.flex = "1";
    main.style.position = "relative";

    const display = document.createElement("div");
    display.style.cursor = "pointer";
    display.style.padding = "10px";
    display.style.borderRadius = "10px";
    display.style.background = "rgba(255,255,255,0.04)";
    display.style.border = "1px solid rgba(255,255,255,0.08)";
    display.textContent = assigned ? assigned.name : "Click to assign...";

    const searchBox = document.createElement("input");
    searchBox.placeholder = "Search tornado...";
    searchBox.style.display = "none";
    searchBox.style.width = "100%";
    searchBox.style.marginTop = "8px";
    searchBox.style.padding = "10px";
    searchBox.style.borderRadius = "10px";
    searchBox.style.background = "#111827";
    searchBox.style.color = "white";
    searchBox.style.border = "1px solid #374151";

    const results = document.createElement("div");
    results.style.position = "absolute";
    results.style.top = "70px";
    results.style.left = "0";
    results.style.right = "0";
    results.style.background = "#0f172a";
    results.style.border = "1px solid rgba(255,255,255,0.1)";
    results.style.borderRadius = "12px";
    results.style.maxHeight = "180px";
    results.style.overflowY = "auto";
    results.style.display = "none";
    results.style.zIndex = "1000";

    function openSearch() {

      searchBox.style.display = "block";
      results.style.display = "block";

      searchBox.focus();

      const filtered =
        [...tornadoes]
          .sort((a,b)=>a.name.localeCompare(b.name))
          .slice(0,25);

      results.innerHTML = filtered.map(t => `
        <div
          class="resultItem"
          data-id="${t.id}"
          style="
            padding:10px;
            cursor:pointer;
            border-bottom:1px solid rgba(255,255,255,0.05);
          ">
          ${t.name}
        </div>
      `).join("");

      attachResultListeners(results, rank);

      const closeHandler = (e) => {
        if (!main.contains(e.target)) {
          searchBox.style.display = "none";
          results.style.display = "none";

          document.removeEventListener(
            "click",
            closeHandler
          );
        }
      };

      setTimeout(() => {
        document.addEventListener(
          "click",
          closeHandler
        );
      }, 0);
    }

    display.addEventListener("click", openSearch);

    searchBox.addEventListener("input", () => {
      const q = searchBox.value.toLowerCase();

      const filtered = tornadoes.filter(t =>
        t.name.toLowerCase().includes(q)
      );

      results.innerHTML = filtered.map(t => `
        <div
          class="resultItem"
          data-id="${t.id}"
          style="
            padding:10px;
            cursor:pointer;
            border-bottom:1px solid rgba(255,255,255,0.05);
          ">
          ${t.name}
        </div>
      `).join("");

      attachResultListeners(results, rank);
    });

    main.appendChild(display);
    main.appendChild(searchBox);
    main.appendChild(results);

    slot.appendChild(label);
    slot.appendChild(main);

    grid.appendChild(slot);
  }
}

async function assignRank(tornadoId, rank) {

  console.log("Assigning", tornadoId, "to rank", rank);

  // clear rank already used
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: null })
    .eq("opinion_rank", rank);

  // clear old rank of selected tornado
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: null })
    .eq("id", tornadoId);

  // assign new rank
  const { error } = await supabase
    .from("tornadoes")
    .update({ opinion_rank: rank })
    .eq("id", tornadoId);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  load();
}

load();
</script>

</body>
</html>
