<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strongest 30 (Editable Ranking)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 26px;
      font-family: Inter;
      color: #f8fafc;
      background: #0b1220;
    }

    h1 {
      font-size: 44px;
      font-weight: 900;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    button {
      padding:10px 14px;
      border-radius:12px;
      border:none;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
    }

    .grid {
      max-width: 900px;
      margin: auto;
    }

    .slot {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px;
      margin-bottom:10px;
      border-radius:14px;
      background: rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
    }

    .rank {
      font-size:22px;
      font-weight:900;
      width:60px;
    }

    select {
      flex:1;
      margin-left:10px;
      padding:10px;
      border-radius:10px;
      background:#111827;
      color:white;
      border:1px solid #374151;
    }

    .muted {
      color:#64748b;
      font-style:italic;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="location.href='index.html'">← Back</button>
</div>

<h1>💥 Strongest 30</h1>

<div class="grid" id="grid">Loading...</div>

<script type="module">
import { supabase } from './supabase.js';

const grid = document.getElementById("grid");

let tornadoes = [];
let isAdmin = false;

async function checkAdmin() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return false;

  const { data } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  return data?.role === "admin";
}

async function load() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  tornadoes = data || [];

  isAdmin = await checkAdmin();

  render();
}

function render() {
  grid.innerHTML = "";

  // =========================
  // 👁️ VIEWER MODE
  // =========================
  if (!isAdmin) {
    const ranked = [...tornadoes]
      .filter(t => t.opinion_rank != null)
      .sort((a, b) => a.opinion_rank - b.opinion_rank)
      .slice(0, 30);

    if (!ranked.length) {
      grid.innerHTML = `
        <div style="text-align:center;color:#94a3b8;">
          No ranked tornadoes yet.
        </div>
      `;
      return;
    }

    grid.innerHTML = ranked.map(t => `
      <div class="slot">
        <div class="rank">#${t.opinion_rank}</div>
        <div>
          <b>${t.name}</b><br>
          <span style="color:#64748b;">
            ${t.states?.join(" • ") || "Unknown"}
          </span>
        </div>
      </div>
    `).join("");

    return;
  }

  // =========================
  // 🔧 ADMIN MODE
  // =========================

  for (let rank = 1; rank <= 30; rank++) {

    const assigned = tornadoes.find(t => t.opinion_rank === rank);

    const slot = document.createElement("div");
    slot.className = "slot";

    const label = document.createElement("div");
    label.className = "rank";
    label.textContent = "#" + rank;

    const select = document.createElement("select");

    const emptyOption = document.createElement("option");
    emptyOption.value = "";
    emptyOption.textContent = assigned ? assigned.name : "— Empty Slot —";
    select.appendChild(emptyOption);

    tornadoes.forEach(t => {
      const opt = document.createElement("option");
      opt.value = t.id;
      opt.textContent = t.name;

      if (assigned?.id === t.id) {
        opt.selected = true;
      }

      select.appendChild(opt);
    });

    select.addEventListener("change", async (e) => {
      const tornadoId = e.target.value;
      if (!tornadoId) return;

      await assignRank(tornadoId, rank);
    });

    slot.appendChild(label);
    slot.appendChild(select);
    grid.appendChild(slot);
  }
}

async function assignRank(tornadoId, rank) {

  // clear rank already used
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: null })
    .eq("opinion_rank", rank);

  // clear old rank of selected tornado
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: null })
    .eq("id", tornadoId);

  // assign new rank
  const { error } = await supabase
    .from("tornadoes")
    .update({ opinion_rank: rank })
    .eq("id", tornadoId);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  load();
}

load();
</script>

</body>
</html>
