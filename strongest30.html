<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strongest 30 (Editable Ranking)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 26px;
      font-family: Inter;
      color: #f8fafc;
      background: #0b1220;
    }

    h1 {
      font-size: 44px;
      font-weight: 900;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    button {
      padding:10px 14px;
      border-radius:12px;
      border:none;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
    }

    .grid {
      max-width: 900px;
      margin: auto;
    }

    .slot {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px;
      margin-bottom:10px;
      border-radius:14px;
      background: rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
    }

    .rank {
      font-size:22px;
      font-weight:900;
      width:60px;
    }

    select {
      flex:1;
      margin-left:10px;
      padding:10px;
      border-radius:10px;
      background:#111827;
      color:white;
      border:1px solid #374151;
    }

    .muted {
      color:#64748b;
      font-style:italic;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="location.href='index.html'">← Back</button>
</div>

<h1>💥 Strongest 30</h1>

<div class="grid" id="grid">Loading...</div>

<script type="module">
import { supabase } from './supabase.js';

const grid = document.getElementById("grid");

let tornadoes = [];
let isAdmin = false;

async function checkAdmin() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return false;

  const { data } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  return data?.role === "admin";
}

async function load() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  tornadoes = data || [];

  isAdmin = await checkAdmin();

  render();
}

function render() {
  grid.innerHTML = "";

  // =========================
  // 👁️ VIEWER MODE
  // =========================
  if (!isAdmin) {
    const ranked = [...tornadoes]
      .filter(t => t.opinion_rank != null)
      .sort((a, b) => a.opinion_rank - b.opinion_rank)
      .slice(0, 30);

    if (!ranked.length) {
      grid.innerHTML = `
        <div style="text-align:center;color:#94a3b8;">
          No ranked tornadoes yet.
        </div>
      `;
      return;
    }

    grid.innerHTML = ranked.map(t => `
      <div class="slot">
        <div class="rank">#${t.opinion_rank}</div>
        <div>
          <b>${t.name}</b><br>
          <span style="color:#64748b;">
            ${t.states?.join(" • ") || "Unknown"}
          </span>
        </div>
      </div>
    `).join("");

    return;
  }

  // =========================
  // 🔧 ADMIN MODE
  // =========================

  for (let rank = 1; rank <= 30; rank++) {

    const assigned = tornadoes.find(t => t.opinion_rank === rank);

    const slot = document.createElement("div");
    slot.className = "slot";
    slot.style.position = "relative";

    const label = document.createElement("div");
    label.className = "rank";
    label.textContent = "#" + rank;

    const main = document.createElement("div");
    main.style.flex = "1";
    main.style.position = "relative";

    const display = document.createElement("div");
    display.style.cursor = "pointer";
    display.style.padding = "10px";
    display.style.borderRadius = "10px";
    display.style.background = "rgba(255,255,255,0.04)";
    display.style.border = "1px solid rgba(255,255,255,0.08)";
    display.textContent = assigned ? assigned.name : "Click to assign...";

    const searchBox = document.createElement("input");
    searchBox.placeholder = "Search tornado...";
    searchBox.style.display = "none";
    searchBox.style.width = "100%";
    searchBox.style.marginTop = "8px";
    searchBox.style.padding = "10px";
    searchBox.style.borderRadius = "10px";
    searchBox.style.background = "#111827";
    searchBox.style.color = "white";
    searchBox.style.border = "1px solid #374151";

    const results = document.createElement("div");
    results.style.position = "absolute";
    results.style.top = "70px";
    results.style.left = "0";
    results.style.right = "0";
    results.style.background = "#0f172a";
    results.style.border = "1px solid rgba(255,255,255,0.1)";
    results.style.borderRadius = "12px";
    results.style.maxHeight = "180px";
    results.style.overflowY = "auto";
    results.style.display = "none";
    results.style.zIndex = "1000";

    function openSearch() {
      searchBox.style.display = "block";
      searchBox.focus();
      results.style.display = "block";
    }

    display.addEventListener("click", openSearch);

    searchBox.addEventListener("input", () => {
      const q = searchBox.value.toLowerCase();

      const filtered = tornadoes.filter(t =>
        t.name.toLowerCase().includes(q)
      );

      results.innerHTML = filtered.map(t => `
        <div style="
          padding:10px;
          cursor:pointer;
          border-bottom:1px solid rgba(255,255,255,0.05);
        " data-id="${t.id}">
          ${t.name}
        </div>
      `).join("");

      [...results.children].forEach(child => {
        child.addEventListener("click", async () => {
          const tornadoId = child.dataset.id;
          await assignRank(tornadoId, rank);
        });
      });
    });

    main.appendChild(display);
    main.appendChild(searchBox);
    main.appendChild(results);

    slot.appendChild(label);
    slot.appendChild(main);

    grid.appendChild(slot);
  }
}

async function assignRank(tornadoId, rank) {

  // clear rank already used
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: null })
    .eq("opinion_rank", rank);

  // clear old rank of selected tornado
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: null })
    .eq("id", tornadoId);

  // assign new rank
  const { error } = await supabase
    .from("tornadoes")
    .update({ opinion_rank: rank })
    .eq("id", tornadoId);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  load();
}

load();
</script>

</body>
</html>
