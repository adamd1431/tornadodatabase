<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Strongest 30 (Editable Ranking)</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 26px;
      font-family: Inter;
      color: #f8fafc;
      background: #0b1220;
    }

    h1 {
      font-size: 44px;
      font-weight: 900;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      margin-bottom:20px;
    }

    button {
      padding:10px 14px;
      border-radius:12px;
      border:none;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
    }

    .grid {
      max-width: 900px;
      margin: auto;
    }

    .slot {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:14px;
      margin-bottom:10px;
      border-radius:14px;
      background: rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
    }

    .rank {
      font-size:22px;
      font-weight:900;
      width:60px;
    }

    select {
      flex:1;
      margin-left:10px;
      padding:10px;
      border-radius:10px;
      background:#111827;
      color:white;
      border:1px solid #374151;
    }

    .empty {
      color:#64748b;
      font-style:italic;
    }
  </style>
</head>

<body>

<div class="topbar">
  <button onclick="location.href='index.html'">← Back</button>
</div>

<h1>💥 Strongest 30 (Editable Ranking)</h1>

<div class="grid" id="grid"></div>

<script type="module">
import { supabase } from './supabase.js';

const grid = document.getElementById("grid");

let tornadoes = [];

async function load() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  tornadoes = data || [];

  render();
}

function render() {
  let html = "";

  for (let rank = 1; rank <= 30; rank++) {

    const assigned = tornadoes.find(t => t.opinion_rank === rank);

    html += `
      <div class="slot">
        <div class="rank">#${rank}</div>

        <select onchange="assignRank(this.value, ${rank})">
          <option value="">${assigned ? assigned.name : "— Empty Slot —"}</option>

          ${tornadoes.map(t => `
            <option value="${t.id}" ${assigned?.id === t.id ? "selected" : ""}>
              ${t.name}
            </option>
          `).join("")}
        </select>
      </div>
    `;
  }

  grid.innerHTML = html;
}

window.assignRank = async function(tornadoId, rank) {
  if (!tornadoId) return;

  // remove old assignment for this rank
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: null })
    .eq("opinion_rank", rank);

  // assign new one
  await supabase
    .from("tornadoes")
    .update({ opinion_rank: rank })
    .eq("id", tornadoId);

  load();
};

load();
</script>

</body>
</html>
