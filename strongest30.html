<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strongest 30 · UTWX Tornado Database</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="theme-color" content="#080e1a">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080e1a;
      --surface: #0d1625;
      --card: #111b2e;
      --card-hover: #172032;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --text: #f0f4ff;
      --muted: #7a8baa;
      --muted2: #3d4f6a;
      --accent: #3b82f6;
      --accent-dim: rgba(59,130,246,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOP NAV ── */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 58px;
      background: rgba(8,14,26,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .topnav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
      text-decoration: none;
    }

    .topnav-brand span { color: var(--accent); }

    .topnav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-hover);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      font-family: "Inter", sans-serif;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
    }

    .btn-sm {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
    }

    /* ── BADGE ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid rgba(59,130,246,0.35);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 56px 24px 40px;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }

    .hero h1 {
      font-size: clamp(36px, 6vw, 56px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      color: var(--text);
      margin-bottom: 14px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-sub {
      font-size: 16px;
      color: var(--muted);
      max-width: 440px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── STATS ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 24px 40px;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    /* ── MAIN ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    #grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── LOADING / EMPTY ── */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
    }

    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p {
      color: var(--muted);
      font-size: 15px;
    }

    /* ── SLOT ── */
    .slot {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      animation: fadeIn 0.25s ease both;
    }

    .slot.clickable {
      cursor: pointer;
    }

    .slot.clickable:hover {
      background: var(--card-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RANK BADGE ── */
    .rank {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 800;
      border: 1px solid;
    }

    /* ── THUMB ── */
    .thumb {
      flex-shrink: 0;
      width: 96px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .thumb-placeholder {
      flex-shrink: 0;
      width: 96px;
      height: 64px;
      border-radius: 8px;
      border: 1px dashed var(--border-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      opacity: 0.35;
    }

    /* ── SLOT BODY ── */
    .slot-body {
      flex: 1;
      min-width: 0;
    }

    .slot-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-meta svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    /* ── ARROW ── */
    .slot-arrow {
      display: flex;
      align-items: center;
      color: var(--muted2);
      flex-shrink: 0;
      transition: color 0.15s, transform 0.15s;
    }

    .slot.clickable:hover .slot-arrow { color: var(--muted); transform: translateX(2px); }

    .slot-arrow svg { width: 16px; height: 16px; }

    /* ── ADMIN ASSIGN ── */
    .assign-box {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .assign-box:hover { border-color: var(--border-hover); }

    .assign-box.empty {
      color: var(--muted2);
      font-size: 14px;
      border-style: dashed;
    }

    .assign-search {
      width: 100%;
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 14px;
      font-family: "Inter", sans-serif;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .assign-search:focus {
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .assign-search::placeholder { color: var(--muted2); }

    .assign-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      margin-top: 4px;
      background: var(--card);
      border: 1px solid var(--border-hover);
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
    }

    .result-item {
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .result-item:last-child { border-bottom: none; }
    .result-item:hover { background: var(--card-hover); }

    /* ── SLOT ACTIONS ── */
    .slot-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted2);
      font-size: 12px;
      letter-spacing: 0.3px;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .topnav { padding: 0 16px; }
      .topnav .btn-label { display: none; }
      .hero { padding: 40px 20px 28px; }
      .main { padding: 0 16px 60px; }
      .thumb, .thumb-placeholder { display: none; }
      .slot-arrow { display: none; }
      .rank { width: 44px; height: 44px; font-size: 16px; }
    }
  </style>
</head>
<body>

<!-- ══ TOP NAV ══ -->
<nav class="topnav">
  <a class="topnav-brand" href="index.html">
    🌪 <span>UTWX</span> Tornado Database
  </a>
  <div class="topnav-actions">
    <span id="adminBadge" class="badge" style="display:none;">Admin</span>
    <button class="btn" onclick="location.href='index.html'">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span class="btn-label">Back to list</span>
    </button>
  </div>
</nav>

<!-- ══ HERO ══ -->
<header class="hero">
  <div class="hero-eyebrow"></div>
  <h1>Strongest <em>30</em></h1>
  <p class="hero-sub">My personal ranking of the most intense tornadoes ever documented.</p>
</header>

<!-- ══ STATS ══ -->
<div class="stats">
  <div class="stat-pill">
    <div>
      <div class="stat-num" id="rankedCount">—</div>
      <div class="stat-label">Ranked</div>
    </div>
  </div>
</div>

<!-- ══ MAIN ══ -->
<main class="main">
  <div id="grid">
    <div class="loading-state">Loading rankings…</div>
  </div>
</main>

<footer>© 2026 utwx</footer>

<script type="module">
import { supabase } from './supabase.js';

const grid = document.getElementById("grid");
const rankedCountEl = document.getElementById("rankedCount");
const adminBadge = document.getElementById("adminBadge");

let tornadoes = [];
let isAdmin = false;

/* ── ICONS ── */
const PIN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;
const CHEVRON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;

/* ── ADMIN CHECK ── */
async function checkAdmin() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return false;

  const { data } = await supabase.from("profiles").select("role").eq("id", user.id).single();
  return data?.role === "admin";
}

/* ── HELPERS ── */
function getRankColor(rank) {
  if (rank === 1) return "#eab308"; // gold
  if (rank === 2) return "#cbd5e1"; // silver
  if (rank === 3) return "#f97316"; // bronze
  return "#3b82f6"; // accent
}

function renderRankBadge(rank) {
  const c = getRankColor(rank);
  return `<div class="rank" style="color:${c};border-color:${c}33;background:${c}1a">#${rank}</div>`;
}

function renderThumb(t) {
  if (t && t.cover_image) return `<img class="thumb" src="${t.cover_image}" alt="">`;
  return `<div class="thumb-placeholder">🌪</div>`;
}

function formatState(state) {
  if (!state) return "Unknown";
  return state.toString().split(" ").map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(" ");
}

function formatStates(t) {
  return Array.isArray(t.states) ? t.states.map(formatState).join(" — ") : formatState(t.states);
}

function animateCounter(el, target, suffix = "") {
  if (!target) { el.textContent = "0" + suffix; return; }
  let current = 0;
  const step = Math.max(1, Math.ceil(target / 30));
  const iv = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = current + suffix;
    if (current >= target) clearInterval(iv);
  }, 16);
}

/* ── LOAD ── */
async function load() {
  const { data } = await supabase.from("tornadoes").select("*").eq("status", "approved");
  tornadoes = data || [];
  isAdmin = await checkAdmin();

  adminBadge.style.display = isAdmin ? "inline-flex" : "none";

  const rankedCount = tornadoes.filter(t => t.opinion_rank >= 1 && t.opinion_rank <= 30).length;
  animateCounter(rankedCountEl, rankedCount, " / 30");

  render();
}

function render() {
  grid.innerHTML = "";
  isAdmin ? renderAdmin() : renderViewer();
}

/* ── VIEWER MODE ── */
function renderViewer() {
  const ranked = [...tornadoes]
    .filter(t => t.opinion_rank != null)
    .sort((a, b) => a.opinion_rank - b.opinion_rank)
    .slice(0, 30);

  if (!ranked.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏆</div>
        <p>No ranked tornadoes yet.</p>
      </div>
    `;
    return;
  }

  grid.innerHTML = ranked.map((t, i) => `
    <div class="slot clickable" data-id="${t.id}" style="animation-delay:${Math.min(i * 0.03, 0.4)}s">
      ${renderRankBadge(t.opinion_rank)}
      ${renderThumb(t)}
      <div class="slot-body">
        <div class="slot-name">${t.name || "Unnamed tornado"}</div>
        <div class="slot-meta">${PIN}${formatStates(t)}</div>
      </div>
      <div class="slot-arrow">${CHEVRON}</div>
    </div>
  `).join("");

  grid.querySelectorAll(".slot").forEach(slot => {
    slot.addEventListener("click", () => {
      location.href = "tornado.html?id=" + slot.dataset.id;
    });
  });
}

/* ── ADMIN MODE ── */
function renderAdmin() {
  for (let rank = 1; rank <= 30; rank++) {
    const assigned = tornadoes.find(t => t.opinion_rank === rank);

    const slot = document.createElement("div");
    slot.className = "slot";
    slot.style.animationDelay = `${Math.min((rank - 1) * 0.02, 0.4)}s`;
    slot.innerHTML = renderRankBadge(rank) + renderThumb(assigned);

    const wrap = document.createElement("div");
    wrap.className = "slot-body";
    wrap.style.position = "relative";

    const box = document.createElement("div");
    box.className = assigned ? "assign-box" : "assign-box empty";
    box.innerHTML = assigned
      ? `<div class="slot-name">${assigned.name}</div><div class="slot-meta">${PIN}${formatStates(assigned)}</div>`
      : "Click to assign…";

    const search = document.createElement("input");
    search.className = "assign-search";
    search.placeholder = "Search tornadoes…";
    search.setAttribute("aria-label", "Search tornadoes to assign to rank " + rank);
    search.setAttribute("autocomplete", "off");
    search.style.display = "none";

    const results = document.createElement("div");
    results.className = "assign-results";
    results.style.display = "none";

    function renderResults(list) {
      results.innerHTML = list.map(t => `<div class="result-item" data-id="${t.id}">${t.name}</div>`).join("");
      results.querySelectorAll(".result-item").forEach(item => {
        item.addEventListener("click", () => assignRank(item.dataset.id, rank));
      });
    }

    function openSearch() {
      box.style.display = "none";
      search.style.display = "block";
      results.style.display = "block";
      search.value = "";
      search.focus();

      renderResults([...tornadoes].sort((a, b) => a.name.localeCompare(b.name)).slice(0, 25));

      const closeHandler = (e) => {
        if (!wrap.contains(e.target)) {
          box.style.display = "block";
          search.style.display = "none";
          results.style.display = "none";
          document.removeEventListener("click", closeHandler);
        }
      };

      setTimeout(() => document.addEventListener("click", closeHandler), 0);
    }

    box.addEventListener("click", openSearch);

    search.addEventListener("input", () => {
      const q = search.value.toLowerCase();
      renderResults(
        tornadoes.filter(t => t.name.toLowerCase().includes(q))
          .sort((a, b) => a.name.localeCompare(b.name))
          .slice(0, 25)
      );
    });

    wrap.appendChild(box);
    wrap.appendChild(search);
    wrap.appendChild(results);
    slot.appendChild(wrap);

    if (assigned) {
      const actions = document.createElement("div");
      actions.className = "slot-actions";

      const clearBtn = document.createElement("button");
      clearBtn.className = "btn btn-sm";
      clearBtn.textContent = "✕";
      clearBtn.title = "Remove ranking";
      clearBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        clearRank(assigned.id);
      });

      const viewArrow = document.createElement("div");
      viewArrow.className = "slot-arrow";
      viewArrow.innerHTML = CHEVRON;
      viewArrow.title = "View tornado";
      viewArrow.style.cursor = "pointer";
      viewArrow.addEventListener("click", (e) => {
        e.stopPropagation();
        location.href = "tornado.html?id=" + assigned.id;
      });

      actions.appendChild(clearBtn);
      actions.appendChild(viewArrow);
      slot.appendChild(actions);
    }

    grid.appendChild(slot);
  }
}

/* ── ASSIGN / CLEAR ── */
async function assignRank(tornadoId, rank) {
  await supabase.from("tornadoes").update({ opinion_rank: null }).eq("opinion_rank", rank);
  await supabase.from("tornadoes").update({ opinion_rank: null }).eq("id", tornadoId);

  const { error } = await supabase.from("tornadoes").update({ opinion_rank: rank }).eq("id", tornadoId);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  load();
}

async function clearRank(tornadoId) {
  const { error } = await supabase.from("tornadoes").update({ opinion_rank: null }).eq("id", tornadoId);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  load();
}

load();
</script>

</body>
</html>
