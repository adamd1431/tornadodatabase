<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UTWX Login</title>

  <style>

    :root {
      --bg0: #020617;
      --bg1: #0f172a;

      --card:
        rgba(15,23,42,0.88);

      --border:
        rgba(255,255,255,0.08);

      --text: #ffffff;
      --muted: #94a3b8;

      --blue: #2563eb;
      --blue2: #3b82f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 24px;

      font-family: "Segoe UI", sans-serif;
      color: var(--text);

      background:
        radial-gradient(circle at top left,
          rgba(59,130,246,0.18),
          transparent 35%),

        radial-gradient(circle at bottom right,
          rgba(34,211,238,0.10),
          transparent 35%),

        linear-gradient(
          180deg,
          var(--bg0),
          var(--bg1)
        );
    }

    .authCard {
      width: 100%;
      max-width: 430px;

      background: var(--card);

      border:
        1px solid var(--border);

      border-radius: 28px;

      padding: 42px;

      backdrop-filter: blur(18px);

      box-shadow:
        0 25px 60px rgba(0,0,0,0.55);
    }

    .logo {
      width: 68px;
      height: 68px;

      border-radius: 20px;

      display: flex;
      align-items: center;
      justify-content: center;

      margin: 0 auto 22px;

      font-size: 34px;

      background:
        linear-gradient(
          135deg,
          var(--blue2),
          var(--blue)
        );

      box-shadow:
        0 18px 35px rgba(37,99,235,0.35);
    }

    h1 {
      margin: 0;
      text-align: center;

      font-size: 34px;
      font-weight: 800;
    }

    .sub {
      text-align: center;

      color: var(--muted);

      margin-top: 10px;
      margin-bottom: 32px;

      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    .label {
      font-size: 14px;
      font-weight: 700;

      margin-bottom: 8px;

      color: #dbeafe;
    }

    input {
      width: 100%;

      padding: 15px 16px;

      border-radius: 15px;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
        rgba(255,255,255,0.04);

      color: white;

      outline: none;

      font-size: 15px;

      transition: 0.2s ease;
    }

    input:focus {
      border-color: #60a5fa;

      box-shadow:
        0 0 0 4px rgba(59,130,246,0.15);
    }

    .mainBtn {
      width: 100%;

      padding: 15px;

      margin-top: 10px;

      border: none;
      border-radius: 16px;

      background:
        linear-gradient(
          135deg,
          var(--blue2),
          var(--blue)
        );

      color: white;

      font-size: 15px;
      font-weight: 800;

      cursor: pointer;

      transition: 0.2s ease;

      box-shadow:
        0 15px 35px rgba(37,99,235,0.30);
    }

    .mainBtn:hover {
      transform: translateY(-2px);

      filter: brightness(1.05);
    }

    .divider {
      display: flex;
      align-items: center;

      gap: 14px;

      margin: 26px 0;

      color: var(--muted);

      font-size: 13px;
    }

    .divider::before,
    .divider::after {
      content: "";

      flex: 1;
      height: 1px;

      background:
        rgba(255,255,255,0.08);
    }

    .googleBtn {
      width: 100%;

      padding: 14px;

      border-radius: 15px;

      border:
        1px solid rgba(255,255,255,0.10);

      background:
        rgba(255,255,255,0.04);

      color: white;

      font-weight: 700;

      cursor: pointer;

      transition: 0.2s ease;
    }

    .googleBtn:hover {
      background:
        rgba(255,255,255,0.07);
    }

    .guestBtn {
      width: 100%;

      padding: 14px;

      margin-top: 14px;

      border-radius: 15px;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
        transparent;

      color: #cbd5e1;

      font-weight: 700;

      cursor: pointer;

      transition: 0.2s ease;
    }

    .guestBtn:hover {
      background:
        rgba(255,255,255,0.05);
    }

    .bottomText {
      text-align: center;

      margin-top: 28px;

      color: var(--muted);

      font-size: 14px;
    }

    .bottomText span {
      color: #60a5fa;

      cursor: pointer;

      font-weight: 700;
    }

    .bottomText span:hover {
      color: white;
    }

    #usernameField {
      display: none;
    }

    @media (max-width: 520px) {

      .authCard {
        padding: 30px 24px;
      }

      h1 {
        font-size: 28px;
      }
    }

  </style>
</head>

<body>

<div class="authCard">

  <div class="logo">
    🌪
  </div>

  <h1 id="title">
    Welcome Back
  </h1>

  <div class="sub" id="subtitle">
    Sign in to access the UTWX Tornado Archive.
  </div>

  <div
    class="field"
    id="usernameField"
  >
    <div class="label">
      Username
    </div>

    <input
      id="username"
      placeholder="Choose a username"
    >
  </div>

  <div class="field">
    <div class="label">
      Email or Username
    </div>

    <input
      id="email"
      placeholder="Enter your email or username"
    >
  </div>

  <div class="field">
    <div class="label">
      Password
    </div>

    <input
      id="password"
      type="password"
      placeholder="Enter your password"
    >
  </div>

  <button
    class="mainBtn"
    onclick="submitAuth()"
    id="mainBtn"
  >
    Sign In
  </button>

  <div class="divider">
    OR
  </div>

  <button
    class="googleBtn"
    onclick="signInWithGoogle()"
  >
    Continue with Google
  </button>

  <button
    class="guestBtn"
    onclick="continueGuest()"
  >
    Continue as Guest
  </button>

  <div
    class="bottomText"
    id="switchText"
  >
    Don’t have an account?
    <span onclick="toggleMode()">
      Sign Up
    </span>
  </div>

</div>

<script type="module">
import { supabase } from './supabase.js';

let isLogin = true;

window.toggleMode = function () {

  isLogin = !isLogin;

  document.getElementById("title").innerText =
    isLogin
      ? "Welcome Back"
      : "Create Account";

  document.getElementById("subtitle").innerText =
    isLogin
      ? "Sign in to access the UTWX Tornado Archive."
      : "Create your account to begin uploading and contributing.";

  document.getElementById("mainBtn").innerText =
    isLogin
      ? "Sign In"
      : "Create Account";

  document.getElementById("switchText").innerHTML =
    isLogin
      ? `Don’t have an account?
          <span onclick="toggleMode()">
            Sign Up
          </span>`
      : `Already have an account?
          <span onclick="toggleMode()">
            Sign In
          </span>`;

  document.getElementById("usernameField").style.display =
    isLogin
      ? "none"
      : "block";

  document.querySelector(".label").innerText =
    isLogin
      ? "Email or Username"
      : "Email";

  document.getElementById("email").placeholder =
    isLogin
      ? "Enter your email or username"
      : "Enter your email";
};

async function ensureProfile() {

  const { data: { user } } =
    await supabase.auth.getUser();

  if (!user) return;

  const { data: existing } = await supabase
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if (existing) return;

  const username =
    user.user_metadata?.full_name ||
    user.user_metadata?.name ||
    user.email?.split("@")[0] ||
    "User";

  await supabase
    .from("profiles")
    .insert([{
      id: user.id,
      username,
      email: user.email
    }]);
}

window.submitAuth = async function () {

  const username =
    document.getElementById("username").value.trim();

  const emailInput =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  if (!emailInput || !password) {
    alert("Please fill out all required fields.");
    return;
  }

  // LOGIN
  if (isLogin) {

    let loginEmail = emailInput;

    if (!emailInput.includes("@")) {

      const { data: profile } = await supabase
        .from("profiles")
        .select("email")
        .eq("username", emailInput)
        .maybeSingle();

      if (!profile) {
        alert("Username not found.");
        return;
      }

      loginEmail = profile.email;
    }

    const { error } =
      await supabase.auth.signInWithPassword({
        email: loginEmail,
        password
      });

    if (error) {
      alert(error.message);
      return;
    }

    location.href = "index.html";
    return;
  }

  // SIGN UP
  if (!username) {
    alert("Please choose a username.");
    return;
  }

  const { data: existing } = await supabase
    .from("profiles")
    .select("username")
    .eq("username", username)
    .maybeSingle();

  if (existing) {
    alert("Username already taken.");
    return;
  }

  const { data, error } =
    await supabase.auth.signUp({
      email: emailInput,
      password
    });

  if (error) {
    alert(error.message);
    return;
  }

  if (!data.user) {
    alert("Signup failed.");
    return;
  }

  const { error: profileError } =
    await supabase
      .from("profiles")
      .insert([{
        id: data.user.id,
        username,
        email: emailInput
      }]);

  if (profileError) {
    alert(profileError.message);
    return;
  }

  location.href = "index.html";
};

window.signInWithGoogle = async function () {

  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo:
        window.location.origin + "/index.html"
    }
  });
};

window.continueGuest = function () {
  location.href = "index.html";
};

window.addEventListener(
  "DOMContentLoaded",
  ensureProfile
);
</script>

</body>
</html>
