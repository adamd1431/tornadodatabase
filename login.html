<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      background: #111827;
      color: white;
      border: 1px solid #374151;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .link {
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
      cursor: pointer;
    }

    .link span {
      color: #60a5fa;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2 id="title">Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <!-- ONLY SHOW THIS IN SIGNUP MODE -->
  <input id="username" placeholder="Username" style="display:none;">

  <button id="mainBtn" onclick="login()">Login</button>
  <button onclick="googleLogin()">Sign in with Google</button>

  <div class="link" id="toggleText">
    Don't have an account? <span onclick="switchMode()">Sign up</span>
  </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

let mode = "login"; // login or signup

function switchMode() {
  mode = mode === "login" ? "signup" : "login";

  document.getElementById("title").innerText =
    mode === "login" ? "Login" : "Sign Up";

  document.getElementById("mainBtn").innerText =
    mode === "login" ? "Login" : "Sign Up";

  document.getElementById("username").style.display =
    mode === "signup" ? "block" : "none";

  document.getElementById("toggleText").innerHTML =
    mode === "login"
      ? `Don't have an account? <span onclick="switchMode()">Sign up</span>`
      : `Already have an account? <span onclick="switchMode()">Login</span>`;
}

window.switchMode = switchMode;

window.login = async function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (mode === "login") {
    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) return alert(error.message);

    location.href = "index.html";
  }

  if (mode === "signup") {
    const username = document.getElementById("username").value;

    if (!username) return alert("Username required");

    const { data: existing } = await supabase
      .from("profiles")
      .select("username")
      .eq("username", username)
      .maybeSingle();

    if (existing) return alert("Username already taken");

    const { error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) return alert(error.message);

    alert("Check your email to confirm signup, then choose username.");
  }
};

window.googleLogin = async function () {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/index.html"
    }
  });
};
</script>

</body>
</html>
