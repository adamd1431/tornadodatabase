<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>UTWX Login</title>

  <style>

    :root {
      --bg0: #020617;
      --bg1: #0f172a;

      --card:
        rgba(15,23,42,0.78);

      --border:
        rgba(255,255,255,0.08);

      --text: #ffffff;
      --muted: #94a3b8;

      --blue: #3b82f6;
      --blue2: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;

      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 24px;

      font-family:
        Inter,
        Segoe UI,
        sans-serif;

      color: var(--text);

      background:
        radial-gradient(
          circle at top left,
          rgba(59,130,246,0.18),
          transparent 35%
        ),

        radial-gradient(
          circle at bottom right,
          rgba(34,211,238,0.10),
          transparent 35%
        ),

        linear-gradient(
          180deg,
          var(--bg0),
          var(--bg1)
        );
    }

    .authCard {
      width: 100%;
      max-width: 430px;

      background:
        linear-gradient(
          180deg,
          rgba(15,23,42,0.94),
          rgba(15,23,42,0.86)
        );

      border:
        1px solid var(--border);

      border-radius: 28px;

      padding: 42px;

      backdrop-filter: blur(20px);

      box-shadow:
        0 30px 70px rgba(0,0,0,0.55);
    }

    .logo {
      width: 62px;
      height: 62px;

      border-radius: 18px;

      margin: 0 auto 22px;

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 30px;

      background:
        linear-gradient(
          135deg,
          var(--blue),
          var(--blue2)
        );

      box-shadow:
        0 18px 40px rgba(37,99,235,0.35);
    }

    h1 {
      margin: 0;
      text-align: center;

      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .subtitle {
      text-align: center;

      margin-top: 12px;
      margin-bottom: 30px;

      color: var(--muted);

      line-height: 1.6;
      font-size: 15px;
    }

    .tabRow {
      display: flex;

      background:
        rgba(255,255,255,0.04);

      padding: 5px;

      border-radius: 14px;

      margin-bottom: 24px;
    }

    .tabBtn {
      flex: 1;

      border: none;

      padding: 12px;

      border-radius: 10px;

      background: transparent;

      color: #cbd5e1;

      font-weight: 700;

      cursor: pointer;

      transition: 0.2s ease;
    }

    .tabBtn.active {
      background:
        linear-gradient(
          135deg,
          var(--blue),
          var(--blue2)
        );

      color: white;

      box-shadow:
        0 10px 25px rgba(37,99,235,0.35);
    }

    .signupOptions {
      display: flex;
      gap: 10px;

      margin-bottom: 18px;
    }

    .optionBtn {
      flex: 1;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
        rgba(255,255,255,0.04);

      color: white;

      padding: 11px;

      border-radius: 12px;

      cursor: pointer;

      font-weight: 700;

      transition: 0.2s ease;
    }

    .optionBtn.active {
      border-color:
        rgba(96,165,250,0.6);

      background:
        rgba(59,130,246,0.18);
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;

      margin-bottom: 8px;

      font-size: 14px;
      font-weight: 700;

      color: #cbd5e1;
    }

    input {
      width: 100%;

      padding: 14px 15px;

      border-radius: 14px;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
        rgba(255,255,255,0.04);

      color: white;

      outline: none;

      font-size: 15px;

      transition: 0.2s ease;
    }

    input:focus {
      border-color:
        rgba(96,165,250,0.7);

      box-shadow:
        0 0 0 4px rgba(59,130,246,0.15);
    }

    .mainBtn {
      width: 100%;

      border: none;

      padding: 14px;

      border-radius: 15px;

      margin-top: 8px;

      font-size: 15px;
      font-weight: 800;

      cursor: pointer;

      color: white;

      background:
        linear-gradient(
          135deg,
          var(--blue),
          var(--blue2)
        );

      transition: 0.2s ease;

      box-shadow:
        0 16px 35px rgba(37,99,235,0.30);
    }

    .mainBtn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .secondaryBtn {
      width: 100%;

      margin-top: 12px;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
        rgba(255,255,255,0.04);

      color: white;

      padding: 13px;

      border-radius: 15px;

      cursor: pointer;

      font-weight: 700;

      transition: 0.2s ease;
    }

    .secondaryBtn:hover {
      background:
        rgba(255,255,255,0.07);
    }

    .switchText {
      margin-top: 24px;

      text-align: center;

      color: var(--muted);

      font-size: 14px;
    }

    .switchText span {
      color: #93c5fd;

      cursor: pointer;

      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 520px) {

      .authCard {
        padding: 28px;
      }

      h1 {
        font-size: 28px;
      }
    }

  </style>
</head>

<body>

<div class="authCard">

  <div class="logo">
    🌪
  </div>

  <h1 id="title">
    Welcome Back
  </h1>

  <div class="subtitle">
    Sign in to access the UTWX Tornado Archive.
  </div>

  <!-- LOGIN / SIGNUP TABS -->

  <div class="tabRow">

    <button
      class="tabBtn active"
      id="loginTab"
      onclick="setMode(false)"
    >
      Login
    </button>

    <button
      class="tabBtn"
      id="signupTab"
      onclick="setMode(true)"
    >
      Sign Up
    </button>

  </div>

  <!-- SIGNUP METHOD -->

  <div
    class="signupOptions hidden"
    id="signupOptions"
  >

    <button
      class="optionBtn active"
      id="emailOption"
      onclick="setSignupMethod('email')"
    >
      Email
    </button>

    <button
      class="optionBtn"
      id="usernameOption"
      onclick="setSignupMethod('username')"
    >
      Username
    </button>

  </div>

  <!-- USERNAME -->

  <div
    class="field hidden"
    id="usernameField"
  >

    <label>
      Username
    </label>

    <input
      id="username"
      placeholder="Choose a username"
    />

  </div>

  <!-- EMAIL -->

  <div class="field">

    <label id="emailLabel">
      Email or Username
    </label>

    <input
      id="email"
      placeholder="Enter your email or username"
    />

  </div>

  <!-- PASSWORD -->

  <div class="field">

    <label>
      Password
    </label>

    <input
      id="password"
      type="password"
      placeholder="Enter your password"
    />

  </div>

  <button
    class="mainBtn"
    onclick="submitAuth()"
    id="mainBtn"
  >
    Sign In
  </button>

  <button
    class="secondaryBtn"
    onclick="signInWithGoogle()"
  >
    Continue with Google
  </button>

  <button
    class="secondaryBtn"
    onclick="continueGuest()"
  >
    Continue as Guest
  </button>

  <div class="switchText">

    <span
      id="switchText"
      onclick="toggleMode()"
    >
      Don't have an account? Sign Up
    </span>

  </div>

</div>

<script type="module">

import { supabase } from './supabase.js';

let isSignup = false;
let signupMethod = "email";

// ===== MODE =====

window.setMode = function(signup) {

  isSignup = signup;

  document
    .getElementById("loginTab")
    .classList.toggle("active", !signup);

  document
    .getElementById("signupTab")
    .classList.toggle("active", signup);

  document
    .getElementById("signupOptions")
    .classList.toggle("hidden", !signup);

  document.getElementById("title").innerText =
    signup
      ? "Create Account"
      : "Welcome Back";

  document.getElementById("mainBtn").innerText =
    signup
      ? "Create Account"
      : "Sign In";

  document.getElementById("switchText").innerText =
    signup
      ? "Already have an account? Sign In"
      : "Don't have an account? Sign Up";

  document.getElementById("emailLabel").innerText =
    signup
      ? "Email"
      : "Email or Username";

  document.getElementById("email").placeholder =
    signup
      ? "Enter your email"
      : "Enter your email or username";

  updateSignupFields();
};

window.toggleMode = function() {
  setMode(!isSignup);
};

// ===== SIGNUP METHOD =====

window.setSignupMethod = function(method) {

  signupMethod = method;

  document
    .getElementById("emailOption")
    .classList.toggle(
      "active",
      method === "email"
    );

  document
    .getElementById("usernameOption")
    .classList.toggle(
      "active",
      method === "username"
    );

  updateSignupFields();
};

function updateSignupFields() {

  const usernameField =
    document.getElementById("usernameField");

  if (!isSignup) {
    usernameField.classList.add("hidden");
    return;
  }

  usernameField.classList.remove("hidden");
}

// ===== PROFILE =====

async function ensureProfile(usernameOverride = null) {

  const { data: { user } } =
    await supabase.auth.getUser();

  if (!user) return;

  const { data: existing } = await supabase
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if (existing) return;

  const username =
    usernameOverride ||
    user.user_metadata?.full_name ||
    user.email?.split("@")[0] ||
    "User";

  await supabase
    .from("profiles")
    .insert([{
      id: user.id,
      username,
      email: user.email
    }]);
}

// ===== AUTH =====

window.submitAuth = async function() {

  const username =
    document
      .getElementById("username")
      .value
      .trim();

  const emailInput =
    document
      .getElementById("email")
      .value
      .trim();

  const password =
    document
      .getElementById("password")
      .value;

  if (!emailInput || !password) {
    alert("Please fill in all required fields.");
    return;
  }

  // ===== LOGIN =====

  if (!isSignup) {

    let loginEmail = emailInput;

    if (!emailInput.includes("@")) {

      const { data: profile } = await supabase
        .from("profiles")
        .select("email")
        .eq("username", emailInput)
        .maybeSingle();

      if (!profile) {
        alert("Username not found.");
        return;
      }

      loginEmail = profile.email;
    }

    const { error } =
      await supabase.auth.signInWithPassword({
        email: loginEmail,
        password
      });

    if (error) {
      alert(error.message);
      return;
    }

    location.href = "index.html";
    return;
  }

  // ===== SIGNUP =====

  if (!username) {
    alert("Please choose a username.");
    return;
  }

  const { data: existingUser } =
    await supabase
      .from("profiles")
      .select("username")
      .eq("username", username)
      .maybeSingle();

  if (existingUser) {
    alert("Username already taken.");
    return;
  }

  const { data, error } =
    await supabase.auth.signUp({
      email: emailInput,
      password
    });

  if (error) {
    alert(error.message);
    return;
  }

  if (!data.user) {
    alert("Signup failed.");
    return;
  }

  await ensureProfile(username);

  location.href = "index.html";
};

// ===== GOOGLE =====

window.signInWithGoogle = async function() {

  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo:
        window.location.origin +
        "/index.html"
    }
  });
};

// ===== GUEST =====

window.continueGuest = function() {
  location.href = "index.html";
};

// START ON LOGIN
setMode(false);

</script>

</body>
</html>
