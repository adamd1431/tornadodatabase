<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b1220;
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      background: #111827;
      padding: 40px;
      border-radius: 16px;
      width: 350px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #1f2937;
      color: white;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 6px;
    }

    button:hover {
      background: #3b82f6;
    }

    .switch {
      text-align: center;
      margin-top: 18px;
      color: #9ca3af;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h1 id="title">Sign Up</h1>

  <input id="username" placeholder="Username">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="submitAuth()" id="mainBtn">
    Sign Up
  </button>

  <button onclick="signInWithGoogle()">
    Continue with Google
  </button>

  <div class="switch" onclick="toggleMode()" id="switchText">
    Already have an account? Sign In
  </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

let isLogin = false;

window.toggleMode = function () {
  isLogin = !isLogin;

  document.getElementById("title").innerText =
    isLogin ? "Sign In" : "Sign Up";

  document.getElementById("mainBtn").innerText =
    isLogin ? "Sign In" : "Sign Up";

  document.getElementById("switchText").innerText =
    isLogin
      ? "Need an account? Sign Up"
      : "Already have an account? Sign In";

  document.getElementById("username").style.display =
    isLogin ? "none" : "block";

  document.getElementById("email").placeholder =
    isLogin ? "Email or Username" : "Email";
};

async function ensureProfile() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) return;

  const { data: existing } = await supabase
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if (existing) return;

  const username =
    user.user_metadata?.full_name ||
    user.user_metadata?.name ||
    user.email?.split("@")[0] ||
    "User";

  const { error } = await supabase
    .from("profiles")
    .insert([{
      id: user.id,
      username,
      email: user.email
    }]);

  if (error) console.error(error);
}

window.submitAuth = async function () {
  const usernameInput =
    document.getElementById("username").value.trim();

  const emailInput =
    document.getElementById("email").value.trim();

  const password =
    document.getElementById("password").value;

  if (!emailInput || !password) {
    alert("Email/username and password required.");
    return;
  }

  // LOGIN
  if (isLogin) {
    let loginEmail = emailInput;

    if (!emailInput.includes("@")) {
      const { data: profile } = await supabase
        .from("profiles")
        .select("email")
        .eq("username", emailInput)
        .maybeSingle();

      if (!profile) {
        alert("Username not found.");
        return;
      }

      loginEmail = profile.email;
    }

    const { error } = await supabase.auth.signInWithPassword({
      email: loginEmail,
      password
    });

    if (error) {
      alert(error.message);
      return;
    }

    await ensureProfile();
    location.href = "index.html";
    return;
  }

  // SIGN UP
  if (!usernameInput) {
    alert("Username required.");
    return;
  }

  const { data: existingUser } = await supabase
    .from("profiles")
    .select("username")
    .eq("username", usernameInput)
    .maybeSingle();

  if (existingUser) {
    alert("Username already taken.");
    return;
  }

  const { data, error } = await supabase.auth.signUp({
    email: emailInput,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  if (!data.user) {
    alert("Signup failed.");
    return;
  }

  const { error: profileError } = await supabase
    .from("profiles")
    .insert([{
      id: data.user.id,
      username: usernameInput,
      email: emailInput
    }]);

  if (profileError) {
    alert(profileError.message);
    return;
  }

  alert("Account created!");
  location.href = "index.html";
};

window.signInWithGoogle = async function () {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/index.html"
    }
  });
};

// ONLY ensure profile if user returns from OAuth
window.addEventListener("DOMContentLoaded", async () => {
  await ensureProfile();
});
</script>
</body>
</html>
