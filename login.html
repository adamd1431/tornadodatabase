<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #1f2937;
      padding: 30px;
      border-radius: 14px;
      width: 350px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #111827;
      color: white;
      border: 1px solid #374151;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Login / Sign Up</h2>

  <input id="identifier" placeholder="Email or Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUpEmail()">Sign Up with Email</button>
  <button onclick="login()">Login</button>
  <button onclick="googleLogin()">Google Sign In</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

/* EMAIL SIGNUP */
window.signUpEmail = async function () {
  const email = document.getElementById("identifier").value.trim();
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  localStorage.setItem("needsUsername", email);
  alert("Account created. After login, choose a username.");
};

/* LOGIN WITH EMAIL OR USERNAME */
window.login = async function () {
  let identifier = document.getElementById("identifier").value.trim();
  const password = document.getElementById("password").value;

  /* If not email, treat as username */
  if (!identifier.includes("@")) {
    const { data } = await supabase
      .from("profiles")
      .select("email")
      .eq("username", identifier)
      .maybeSingle();

    if (!data) {
      alert("Username not found.");
      return;
    }

    identifier = data.email;
  }

  const { error } = await supabase.auth.signInWithPassword({
    email: identifier,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  location.href = "index.html";
};

/* GOOGLE LOGIN */
window.googleLogin = async function () {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.origin + "/index.html"
    }
  });
};
</script>

</body>
</html>
