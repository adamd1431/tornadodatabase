<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UTWX Tornado Database</title>

  <style>
    :root {
      --bg0: #020617;
      --bg1: #0b1220;
      --bg2: #0f172a;

      --card: rgba(255,255,255,0.05);
      --card2: rgba(30,41,59,0.58);

      --border: rgba(255,255,255,0.08);
      --borderStrong: rgba(255,255,255,0.16);

      --blue: #3b82f6;
      --cyan: #22d3ee;
      --purple: #8b5cf6;
      --red: #ef4444;

      --text: #ffffff;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 24px;

      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;

      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.18), transparent 35%),
        radial-gradient(circle at top right, rgba(168,85,247,0.14), transparent 35%),
        radial-gradient(circle at bottom center, rgba(34,211,238,0.10), transparent 40%),
        linear-gradient(180deg, var(--bg0), var(--bg1), var(--bg2));

      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -200px;

      background:
        radial-gradient(circle, rgba(59,130,246,0.08), transparent 60%);

      animation: floatGlow 16s ease-in-out infinite;

      z-index: -1;
      pointer-events: none;
    }

    @keyframes floatGlow {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(35px);
      }
    }

    /* ===== TITLE ===== */

    h1 {
      text-align: center;

      font-size: clamp(54px, 7vw, 76px);
      margin: 12px 0 8px;

      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;

      background:
        linear-gradient(
          90deg,
          #ffffff,
          #dbeafe,
          #7dd3fc,
          #c4b5fd,
          #ffffff
        );

      background-size: 200% auto;

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      animation: titleFlow 8s linear infinite;

      filter:
        drop-shadow(0 8px 24px rgba(59,130,246,0.24));
    }

    @keyframes titleFlow {
      to {
        background-position: 200% center;
      }
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    /* ===== NAV ===== */

    .nav {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;

      display: flex;
      justify-content: space-between;
      align-items: center;

      z-index: 999;
      pointer-events: none;
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    /* ===== BUTTONS ===== */

    button {
      position: relative;
      overflow: hidden;

      background:
        linear-gradient(
          135deg,
          rgba(59,130,246,1),
          rgba(29,78,216,1)
        );

      color: white;
      border: 1px solid rgba(255,255,255,0.08);

      padding: 11px 16px;
      border-radius: 14px;

      cursor: pointer;
      font-weight: 700;

      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        border-color 0.18s ease;

      box-shadow:
        0 10px 28px rgba(37,99,235,0.24),
        inset 0 1px 0 rgba(255,255,255,0.08);

      backdrop-filter: blur(10px);
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          120deg,
          transparent,
          rgba(255,255,255,0.14),
          transparent
        );

      transform: translateX(-120%);
      transition: 0.5s ease;
    }

    button:hover::before {
      transform: translateX(120%);
    }

    button:hover {
      transform: translateY(-3px);

      border-color: rgba(255,255,255,0.18);

      box-shadow:
        0 16px 34px rgba(37,99,235,0.34),
        0 0 24px rgba(59,130,246,0.16);
    }

    button:active {
      transform: scale(0.98);
    }

    /* ===== INPUTS ===== */

    input,
    select {
      padding: 11px 13px;

      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);

      background: rgba(15,23,42,0.72);
      color: white;

      outline: none;

      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        transform 0.15s ease;

      backdrop-filter: blur(10px);
    }

    input:hover,
    select:hover {
      border-color: rgba(255,255,255,0.16);
    }

    input:focus,
    select:focus {
      border-color: rgba(59,130,246,0.8);

      box-shadow:
        0 0 0 4px rgba(59,130,246,0.18),
        0 0 20px rgba(59,130,246,0.12);

      transform: translateY(-1px);
    }

    /* ===== HERO ===== */

    .hero {
      text-align: center;
      padding: 105px 20px 26px;
    }

    .hero p {
      font-size: 18px;
      color: #cbd5e1;
      margin-top: 10px;
    }

    /* ===== STATS ===== */

    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 18px;

      margin: 24px 0 32px;
    }

    .statBox {
      position: relative;
      overflow: hidden;

      background: rgba(255,255,255,0.045);

      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;

      padding: 24px 36px;
      min-width: 180px;

      text-align: center;

      backdrop-filter: blur(16px);

      transition:
        transform 0.2s ease,
        border-color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .statBox::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.05),
          transparent 40%
        );

      pointer-events: none;
    }

    .statBox:hover {
      transform: translateY(-5px);

      border-color: rgba(59,130,246,0.38);

      box-shadow:
        0 18px 42px rgba(0,0,0,0.32),
        0 0 26px rgba(59,130,246,0.14);
    }

    .statBox h2 {
      margin: 0;
      font-size: 34px;
      font-weight: 900;
    }

    .statBox p {
      margin-top: 7px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ===== FILTERS ===== */

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;

      justify-content: center;
      align-items: center;

      padding: 16px;
      margin-bottom: 28px;

      background: rgba(255,255,255,0.035);

      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;

      backdrop-filter: blur(14px);

      box-shadow:
        0 10px 28px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .filters select {
      min-width: 170px;
    }

    .searchBar {
      width: 100%;
      max-width: 560px;

      margin: 0 auto 18px;
      display: block;

      font-size: 15px;
      border-radius: 16px;
    }

    /* ===== CARDS ===== */

    .card {
      position: relative;
      overflow: hidden;

      background: rgba(30,41,59,0.62);

      backdrop-filter: blur(18px);

      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;

      padding: 22px;
      margin: 18px 0;

      cursor: pointer;

      transition:
        transform 0.24s ease,
        border-color 0.24s ease,
        box-shadow 0.24s ease;

      box-shadow:
        0 12px 36px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.04),
          transparent 38%
        );

      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-8px);

      border-color: rgba(59,130,246,0.42);

      box-shadow:
        0 24px 60px rgba(0,0,0,0.44),
        0 0 26px rgba(59,130,246,0.16);
    }

    /* ===== FORM ===== */

    .formBox {
      display: none;

      position: fixed;
      top: 12%;
      left: 50%;
      transform: translateX(-50%);

      width: 400px;
      max-width: 92vw;

      background: rgba(15,23,42,0.92);

      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 22px;

      padding: 24px 24px 28px;

      z-index: 1000;

      backdrop-filter: blur(18px);

      box-shadow:
        0 24px 70px rgba(0,0,0,0.60),
        0 0 0 1px rgba(59,130,246,0.08);

      animation: formPop 0.18s ease-out;
    }

    @keyframes formPop {
      from {
        transform: translateX(-50%) translateY(12px);
        opacity: 0;
      }
      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    .formGroup {
      margin-bottom: 14px;
    }

    .formActions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 16px;
    }

    .closeForm {
      position: absolute;
      top: 12px;
      right: 12px;

      width: 36px;
      height: 36px;

      border-radius: 12px;

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(239,68,68,0.12);
      color: #ef4444;

      border: 1px solid rgba(239,68,68,0.30);

      font-size: 15px;
      font-weight: 900;

      cursor: pointer;

      transition: 0.18s ease;
    }

    .closeForm:hover {
      background: rgba(239,68,68,0.22);
      transform: scale(1.05);
    }

    /* ===== BADGES ===== */

    .badge {
      display: inline-flex;
      align-items: center;

      padding: 5px 11px;

      border-radius: 999px;

      font-size: 13px;
      font-weight: 800;

      border: 1px solid rgba(255,255,255,0.10);

      background: rgba(255,255,255,0.05);

      backdrop-filter: blur(8px);
    }

    /* ===== FOOTER ===== */

    footer {
      text-align: center;

      margin-top: 70px;
      padding-bottom: 22px;

      color: #64748b;
      font-size: 13px;
    }

    /* ===== SCROLLBAR ===== */

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #09111f;
    }

    ::-webkit-scrollbar-thumb {
      background:
        linear-gradient(#334155, #475569);

      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background:
        linear-gradient(#475569, #64748b);
    }

    /* ===== MOBILE ===== */

    @media (max-width: 700px) {

      body {
        padding: 18px;
      }

      .hero {
        padding-top: 120px;
      }

      .nav {
        flex-direction: column;
        gap: 10px;
        align-items: stretch;
      }

      .nav-left,
      .nav-right {
        justify-content: center;
        flex-wrap: wrap;
      }

      .filters {
        flex-direction: column;
      }

      .filters select {
        width: 100%;
      }

      .statBox {
        width: 100%;
      }

      .card {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

<div id="guestPopup" style="
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    ">
      <div style="
        background: #1f2937;
        padding: 30px;
        border-radius: 18px;
        width: 400px;
        max-width: 90%;
        text-align: center;
        border: 1px solid #374151;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      ">
        <h2 style="margin-top:0;">Browsing as Guest</h2>

        <p style="color:#cbd5e1;">
          You are currently browsing as a guest.
          Sign in to upload tornadoes and access account features.
        </p>

      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
        <button onclick="location.href='login.html'">Sign In</button>
        <button onclick="continueGuest()">Continue as Guest</button>
      </div>
    </div>
  </div>

<div class="nav">
  <div class="nav-left">
    <button onclick="location.href='admin.html'">Admin</button>
    <button onclick="openForm()">+ Add Tornado</button>
  </div>

  <div class="nav-right">
    <button onclick="openRandomTornado()">🎲 Random</button>
    <button onclick="goProfile()">Profile</button>
  </div>
</div>

<div class="hero">
  <h1>🌪 Tornado Database</h1>
  <p>Archive, research, and explore historic tornadoes</p>
</div>

<div class="stats">
  <div class="statBox">
    <h2 id="totalCount">0</h2>
    <p>Tornadoes</p>
  </div>

  <div class="statBox">
    <h2 id="uploadCount">0</h2>
    <p>Uploads</p>
  </div>
</div>

<input id="searchInput" class="searchBar" placeholder="Search..." oninput="applyFilters()" />

<div class="filters">
  <select id="intensityFilter" onchange="applyFilters()">
    <option value="">All Intensities</option>
  </select>

  <select id="yearFilter" onchange="applyFilters()">
    <option value="">All Years</option>
  </select>

  <select id="stateFilter" onchange="applyFilters()">
    <option value="">All States</option>
  </select>

  <select id="sortFilter" onchange="applyFilters()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="strongest">Strongest</option>
    <option value="weakest">Weakest</option>
  </select>
</div>

<div id="list">Loading...</div>

<div id="formBox" class="formBox">

  <!-- CLOSE BUTTON -->
  <button class="closeForm" onclick="closeForm()">✕</button>

  <h2>Add Tornado</h2>

  <div class="formGroup">
    <input id="name" placeholder="Name">
  </div>

  <div class="formGroup">
    <input id="state" placeholder="State (Country if not in USA)">
  </div>

  <div class="formGroup">
    <input id="date" type="date">
  </div>

  <div class="formGroup">
    <select id="intensity">
      <option value="EFU">EFU</option>
      <option value="EF0">EF0</option>
      <option value="EF1">EF1</option>
      <option value="EF2">EF2</option>
      <option value="EF3">EF3</option>
      <option value="EF4">EF4</option>
      <option value="EF5">EF5</option>

      <option value="FU">FU</option>
      <option value="F0">F0</option>
      <option value="F1">F1</option>
      <option value="F2">F2</option>
      <option value="F3">F3</option>
      <option value="F4">F4</option>
      <option value="F5">F5</option>

      <option value="F0*">F0* (Blue Ayanami rating)</option>
      <option value="F1*">F1* (Blue Ayanami rating)</option>
      <option value="F2*">F2* (Blue Ayanami rating)</option>
      <option value="F3*">F3* (Blue Ayanami rating)</option>
      <option value="F4*">F4* (Blue Ayanami rating)</option>
      <option value="F5*">F5* (Blue Ayanami rating)</option>

      <option value="IFU">IFU</option>
      <option value="IF0">IF0</option>
      <option value="IF1">IF1</option>
      <option value="IF2">IF2</option>
      <option value="IF3">IF3</option>
      <option value="IF4">IF4</option>
      <option value="IF5">IF5</option>
    </select>
  </div>

  <div class="formActions">
    <button onclick="createTornado()">Submit</button>
    <button onclick="closeForm()">Cancel</button>
  </div>

</div>

<script type="module">
import { supabase } from './supabase.js';

let currentUser = null;

async function updateAuthUI() {
  const { data: { user } } = await supabase.auth.getUser();
  currentUser = user;

  const guestPopup = document.getElementById("guestPopup");

  if (!currentUser) {
    if (guestPopup) guestPopup.style.display = "flex";
  } else {
    if (guestPopup) guestPopup.style.display = "none";
  }
}

async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  const user = session?.user ?? null;

  currentUser = user;

  const guestPopup = document.getElementById("guestPopup");
  if (!guestPopup) return;

  guestPopup.style.display = user ? "none" : "flex";
}

function getIntensityGlow(intensity) {
  const c = getEFColor(intensity);
  return `0 0 18px ${c}33`;
}

function normalizeStates(t) {
  if (Array.isArray(t.states)) return t.states;

  if (typeof t.states === "string") {
    return t.states.split("-").map(s => s.trim());
  }

  if (typeof t.state === "string") {
    return t.state.split("-").map(s => s.trim());
  }

  return [];
}

function showUsernamePopup(user) {
  if (document.getElementById("usernamePopup")) return;

  document.body.insertAdjacentHTML("beforeend", `
    <div id="usernamePopup" style="
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    ">
      <div style="
        background:#1f2937;
        padding:30px;
        border-radius:16px;
        width:400px;
        text-align:center;
      ">
        <h2>Create Username</h2>

        <input
          id="newUsername"
          placeholder="Choose username"
          style="width:100%;padding:12px;margin-top:12px;border-radius:8px;background:#111827;color:white;"
        />

        <button onclick="saveUsername('${user.id}')" style="width:100%;margin-top:14px;padding:12px;">
          Save Username
        </button>
      </div>
    </div>
  `);
}

window.openRandomTornado = function () {
  if (!allTornadoes.length) {
    alert("No tornadoes loaded.");
    return;
  }

  const random =
    allTornadoes[Math.floor(Math.random() * allTornadoes.length)];

  location.href = "tornado.html?id=" + random.id;
};

window.saveUsername = async function (userId) {
  const username = document.getElementById("newUsername").value.trim();

  if (!username) {
    alert("Username required.");
    return;
  }

  const { error } = await supabase.from("profiles").insert([{
    id: userId,
    username
  }]);

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById("usernamePopup").remove();
  initAuth();
};

let allTornadoes = [];

function getEFColor(intensity) {
  if (!intensity) return "#9E9E9E";

  const i = intensity.toString().toUpperCase();

  // Unknown
  if (i.includes("U")) return "#9E9E9E";

  // SPC-style colors
  if (i.includes("0")) return "#00FF00"; // EF0/F0 - bright green
  if (i.includes("1")) return "#32CD32"; // EF1/F1 - lime green
  if (i.includes("2")) return "#FFFF00"; // EF2/F2 - yellow
  if (i.includes("3")) return "#FFA500"; // EF3/F3 - orange
  if (i.includes("4")) return "#FF0000"; // EF4/F4 - red
  if (i.includes("5")) return "#FF00FF"; // EF5/F5 - magenta

  return "#9E9E9E";
}

/* =========================
   FIXED INTENSITY HANDLER
========================= */
function formatIntensity(i) {
  if (!i) return "Unknown";

  if (typeof i === "string") return i;

  const scale = i.scale ?? "EF";
  const rating = i.rating ?? "";
  const mod = i.modifier ?? "";

  return `${scale}${rating}${mod}`;
}

function intensityValue(i) {
  if (!i) return 0;

  if (typeof i === "string") {
    return parseInt(i.replace(/\D/g, "")) || 0;
  }

  const base =
    i.scale === "EF" ? 0 :
    i.scale === "F" ? 100 :
    i.scale === "IF" ? 200 : 0;

  const rating = Number(i.rating ?? 0);

  const mod =
    i.modifier === "+" ? 0.3 :
    i.modifier === "-" ? -0.3 : 0;

  return base + rating + mod;
}

async function loadTornadoes() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  allTornadoes = data || [];
  document.getElementById("totalCount").innerText = allTornadoes.length;

  const { count } = await supabase
    .from("uploads")
    .select("*", { count: "exact", head: true })
    .eq("status", "approved");

  document.getElementById("uploadCount").innerText = count || 0;

  populateFilters();
  applyFilters();
}

function populateFilters() {
  const years = [...new Set(allTornadoes.map(t => t.date?.split("-")[0]))].filter(Boolean);
  const states = [...new Set(
    allTornadoes.flatMap(t => normalizeStates(t))
  )].filter(Boolean);

  document.getElementById("yearFilter").innerHTML =
    '<option value="">All Years</option>' +
    years.map(y => `<option>${y}</option>`).join("");

  document.getElementById("stateFilter").innerHTML =
    '<option value="">All States</option>' +
    states.map(s => `<option>${s}</option>`).join("");

  document.getElementById("intensityFilter").innerHTML =
    '<option value="">All Intensities</option>' +
    [...new Set(allTornadoes.map(t => formatIntensity(t.intensity)))]
      .map(i => `<option>${i}</option>`).join("");
}

window.goProfile = function () {
  location.href = "profile.html";
};

window.applyFilters = function () {
  let filtered = [...allTornadoes];

  const search = document.getElementById("searchInput").value.toLowerCase();
  const intensity = document.getElementById("intensityFilter").value;
  const year = document.getElementById("yearFilter").value;
  const state = document.getElementById("stateFilter").value;
  const sort = document.getElementById("sortFilter").value;

  filtered = filtered.filter(t => {
    return (
      (!search || (t.name||"").toLowerCase().includes(search) || (t.state||"").toLowerCase().includes(search)) &&
      (!intensity || formatIntensity(t.intensity) === intensity) &&
      (!year || t.date?.startsWith(year)) &&
      (!state || normalizeStates(t).includes(state))
    );
  });

  if (sort === "newest") filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (sort === "oldest") filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if (sort === "strongest") filtered.sort((a,b)=>intensityValue(b.intensity)-intensityValue(a.intensity));
  if (sort === "weakest") filtered.sort((a,b)=>intensityValue(a.intensity)-intensityValue(b.intensity));

  document.getElementById("list").innerHTML = filtered.map(t => `
    <div class="card"
         onclick="openTornado('${t.id}')"
         style="box-shadow:${getIntensityGlow(t.intensity)};">

      <h2 style="margin:0 0 6px;">
        ${t.name}
      </h2>

      <div style="margin-bottom:8px;">
        <span class="badge" style="color:${getEFColor(t.intensity)};">
          ${formatIntensity(t.intensity)}
        </span>
      </div>

      <p style="margin:4px 0; color:#94a3b8;">
        State(s) 📍: ${normalizeStates(t).length ? normalizeStates(t).join(" • ") : "N/A"}
      </p>

      <p style="margin:4px 0; color:#94a3b8;">
        📅 ${t.date || "N/A"}
      </p>

    </div>
  `).join("");
};

window.openTornado = id => location.href = 'tornado.html?id=' + id;

window.openForm = async () => {
  document.getElementById("formBox").style.display = "block";
};

window.closeForm = () => document.getElementById("formBox").style.display = "none";

window.continueGuest = function () {
  document.getElementById("guestPopup").style.display = "none";
};

window.createTornado = async function () {
  const name = document.getElementById("name").value;
  const state = document.getElementById("state").value;
  const date = document.getElementById("date").value;
  const intensity = document.getElementById("intensity").value;

  const { data: { user } } = await supabase.auth.getUser();

  let submittedBy = "Anonymous";

  if (user) {
    const { data: profile } = await supabase
      .from("profiles")
      .select("username")
      .eq("id", user.id)
      .single();

    submittedBy = profile?.username || "Anonymous";
  }

  const { error } = await supabase.from("tornadoes").insert([{
    name,
    states: state.split("-").map(s => s.trim()),
    date,
    intensity,
    status: "pending",
    submitted_by: submittedBy
  }]);

  if (error) {
    console.error(error);
    alert("Error: " + error.message);
    return;
  }

  alert("Submitted!");
  closeForm();
  loadTornadoes(); // refresh list immediately
};

loadTornadoes();
initAuth();

supabase.auth.onAuthStateChange(() => {
  initAuth();
});

</script>
