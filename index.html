<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UTWX Tornado Database</title>

  <style>
    :root {
      --bg0: #020617;
      --bg1: #08111f;
      --bg2: #0f172a;

      --card: rgba(20, 28, 45, 0.72);
      --cardHover: rgba(28, 38, 58, 0.88);

      --border: rgba(255,255,255,0.08);
      --borderStrong: rgba(255,255,255,0.14);

      --blue: #3b82f6;
      --cyan: #22d3ee;
      --purple: #8b5cf6;

      --text: #f8fafc;
      --muted: #94a3b8;
      --muted2: #64748b;

      --shadow:
        0 12px 40px rgba(0,0,0,0.42);

      --glass:
        linear-gradient(
          180deg,
          rgba(255,255,255,0.05),
          rgba(255,255,255,0.025)
        );
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 26px;
      min-height: 100vh;

      font-family: 'Segoe UI', sans-serif;

      color: var(--text);

      background:
        radial-gradient(circle at 15% 10%, rgba(59,130,246,0.16), transparent 35%),
        radial-gradient(circle at 85% 15%, rgba(139,92,246,0.14), transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(34,211,238,0.08), transparent 50%),
        linear-gradient(180deg, var(--bg0), var(--bg1), var(--bg2));

      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -300px;

      background:
        radial-gradient(circle, rgba(59,130,246,0.08), transparent 60%);

      animation: ambientGlow 18s ease-in-out infinite;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes ambientGlow {
      0%, 100% {
        transform: translateY(0px);
        opacity: 0.65;
      }

      50% {
        transform: translateY(35px);
        opacity: 1;
      }
    }

    /* ===== HERO ===== */

    .hero {
      text-align: center;
      padding: 48px 20px 24px;
    }

    h1 {
      margin: 0;

      font-size: clamp(52px, 7vw, 74px);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 0.95;

      background:
        linear-gradient(
          90deg,
          #ffffff,
          #dbeafe 35%,
          #93c5fd 65%,
          #c4b5fd
        );

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      filter:
        drop-shadow(0 12px 35px rgba(0,0,0,0.45));
    }

    .heroSub {
      margin-top: 14px;
      font-size: 17px;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    /* ===== NAV ===== */

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;

      margin-bottom: 18px;
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ===== BUTTONS ===== */

    button {
      border: none;
      cursor: pointer;

      padding: 11px 16px;
      border-radius: 14px;

      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.2px;

      color: white;

      background:
        linear-gradient(
          135deg,
          #2563eb,
          #1d4ed8
        );

      box-shadow:
        0 10px 24px rgba(37,99,235,0.24);

      transition:
        transform 0.18s ease,
        filter 0.18s ease,
        box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.08);

      box-shadow:
        0 14px 32px rgba(37,99,235,0.34);
    }

    button:active {
      transform: scale(0.98);
    }

    /* ===== STATS ===== */

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));

      gap: 18px;
      margin: 10px auto 28px;

      max-width: 900px;
    }

    .statBox {
      position: relative;

      overflow: hidden;

      background: var(--glass);
      backdrop-filter: blur(18px);

      border: 1px solid var(--border);
      border-radius: 22px;

      padding: 24px;

      box-shadow: var(--shadow);

      transition:
        transform 0.22s ease,
        border-color 0.22s ease;
    }

    .statBox::before {
      content: "";
      position: absolute;

      inset: 0;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.08),
          transparent 60%
        );

      pointer-events: none;
    }

    .statBox:hover {
      transform: translateY(-4px);

      border-color:
        rgba(59,130,246,0.28);
    }

    .statBox h2 {
      margin: 0;

      font-size: 34px;
      font-weight: 900;
    }

    .statBox p {
      margin-top: 8px;

      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ===== SEARCH ===== */

    .searchWrap {
      max-width: 720px;
      margin: 0 auto 18px;
    }

    .searchBar {
      width: 100%;

      padding: 16px 18px;

      border-radius: 18px;
      border: 1px solid var(--border);

      background:
        rgba(15,23,42,0.72);

      backdrop-filter: blur(14px);

      color: white;
      font-size: 15px;

      outline: none;

      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        background 0.2s ease;
    }

    .searchBar::placeholder {
      color: #64748b;
    }

    .searchBar:focus {
      border-color:
        rgba(59,130,246,0.55);

      background:
        rgba(15,23,42,0.92);

      box-shadow:
        0 0 0 4px rgba(59,130,246,0.18);
    }

    /* ===== FILTERS ===== */

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));

      gap: 14px;

      margin-bottom: 28px;
      padding: 18px;

      background:
        rgba(255,255,255,0.035);

      border: 1px solid var(--border);
      border-radius: 22px;

      backdrop-filter: blur(18px);

      box-shadow: var(--shadow);
    }

    select,
    input {
      width: 100%;

      padding: 12px 14px;

      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);

      background:
        rgba(15,23,42,0.82);

      color: white;
      font-size: 14px;

      outline: none;

      transition:
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    select:focus,
    input:focus {
      border-color:
        rgba(59,130,246,0.55);

      box-shadow:
        0 0 0 3px rgba(59,130,246,0.18);
    }

    /* ===== CARDS ===== */

    .card {
      position: relative;

      overflow: hidden;

      background: var(--card);
      backdrop-filter: blur(18px);

      border: 1px solid var(--border);
      border-radius: 24px;

      padding: 22px;
      margin-bottom: 18px;

      box-shadow: var(--shadow);

      transition:
        transform 0.22s ease,
        border-color 0.22s ease,
        background 0.22s ease,
        box-shadow 0.22s ease;

      cursor: pointer;
    }

    .card::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,0.06),
          transparent 60%
        );

      pointer-events: none;
    }

    .card:hover {
      transform:
        translateY(-6px);

      background:
        var(--cardHover);

      border-color:
        rgba(59,130,246,0.34);

      box-shadow:
        0 20px 50px rgba(0,0,0,0.48),
        0 0 30px rgba(59,130,246,0.10);
    }

    .card h2 {
      margin: 0 0 10px;

      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card p {
      margin: 7px 0;

      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    /* ===== BADGES ===== */

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;

      padding: 5px 12px;

      border-radius: 999px;

      font-size: 13px;
      font-weight: 800;

      border:
        1px solid rgba(255,255,255,0.12);

      background:
        rgba(255,255,255,0.05);

      backdrop-filter: blur(10px);
    }

    /* ===== FORM ===== */

    .formBox {
      display: none;

      position: fixed;
      top: 10%;
      left: 50%;

      transform: translateX(-50%);

      width: 420px;
      max-width: 94vw;

      padding: 24px 24px 28px;

      background:
        rgba(15,23,42,0.95);

      border:
        1px solid rgba(255,255,255,0.10);

      border-radius: 24px;

      backdrop-filter: blur(18px);

      box-shadow:
        0 24px 70px rgba(0,0,0,0.58);

      z-index: 2000;

      animation:
        formPop 0.18s ease-out;
    }

    @keyframes formPop {
      from {
        transform:
          translateX(-50%)
          translateY(12px);

        opacity: 0;
      }

      to {
        transform:
          translateX(-50%)
          translateY(0);

        opacity: 1;
      }
    }

    .formBox h2 {
      margin-top: 0;
      margin-bottom: 18px;

      font-size: 28px;
      font-weight: 900;
    }

    .formGroup {
      margin-bottom: 14px;
    }

    .formActions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;

      margin-top: 18px;
    }

    .closeForm {
      position: absolute;
      top: 12px;
      right: 12px;

      width: 36px;
      height: 36px;

      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 12px;

      background:
        rgba(239,68,68,0.12);

      border:
        1px solid rgba(239,68,68,0.30);

      color: #ef4444;

      font-size: 18px;
      font-weight: 900;

      cursor: pointer;

      transition:
        transform 0.18s ease,
        background 0.18s ease;
    }

    .closeForm:hover {
      background:
        rgba(239,68,68,0.20);

      transform:
        scale(1.06);
    }

    /* ===== FOOTER ===== */

    footer {
      text-align: center;

      margin-top: 70px;
      padding-bottom: 20px;

      color: var(--muted2);
      font-size: 13px;
    }

    /* ===== SCROLLBAR ===== */

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #09111f;
    }

    ::-webkit-scrollbar-thumb {
      background:
        linear-gradient(
          #334155,
          #475569
        );

      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background:
        linear-gradient(
          #475569,
          #64748b
        );
    }

    /* ===== MOBILE ===== */

    @media (max-width: 700px) {
      body {
        padding: 16px;
      }

      .nav {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-left,
      .nav-right {
        justify-content: center;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .card h2 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>

<div id="guestPopup" style="
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5000;
    ">
      <div style="
        background: #1f2937;
        padding: 30px;
        border-radius: 18px;
        width: 400px;
        max-width: 90%;
        text-align: center;
        border: 1px solid #374151;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      ">
        <h2 style="margin-top:0;">Browsing as Guest</h2>

        <p style="color:#cbd5e1;">
          You are currently browsing as a guest.
          Sign in to upload tornadoes and access account features.
        </p>

      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
        <button onclick="location.href='login.html'">Sign In</button>
        <button onclick="continueGuest()">Continue as Guest</button>
      </div>
    </div>
  </div>

<div class="nav">
  <div class="nav-left">
    <button onclick="location.href='admin.html'">Admin</button>
    <button onclick="openForm()">+ Add Tornado</button>
  </div>

  <div class="nav-right">
    <button onclick="openRandomTornado()">🎲 Random</button>
    <button onclick="goProfile()">Profile</button>
  </div>
</div>

<div class="hero">
  <h1>🌪 Tornado Database</h1>
  <p>Archive, research, and explore historic tornadoes</p>
</div>

<div class="stats">
  <div class="statBox">
    <h2 id="totalCount">0</h2>
    <p>Tornadoes</p>
  </div>

  <div class="statBox">
    <h2 id="uploadCount">0</h2>
    <p>Uploads</p>
  </div>
</div>

<input id="searchInput" class="searchBar" placeholder="Search..." oninput="applyFilters()" />

<div class="filters">
  <select id="intensityFilter" onchange="applyFilters()">
    <option value="">All Intensities</option>
  </select>

  <select id="yearFilter" onchange="applyFilters()">
    <option value="">All Years</option>
  </select>

  <select id="stateFilter" onchange="applyFilters()">
    <option value="">All States</option>
  </select>

  <select id="sortFilter" onchange="applyFilters()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="strongest">Strongest</option>
    <option value="weakest">Weakest</option>
  </select>
</div>

<div id="list">Loading...</div>

<div id="formBox" class="formBox">

  <!-- CLOSE BUTTON -->
  <button class="closeForm" onclick="closeForm()">✕</button>

  <h2>Add Tornado</h2>

  <div class="formGroup">
    <input id="name" placeholder="Name">
  </div>

  <div class="formGroup">
    <input id="state" placeholder="State (Country if not in USA)">
  </div>

  <div class="formGroup">
    <input id="date" type="date">
  </div>

  <div class="formGroup">
    <select id="intensity">
      <option value="EFU">EFU</option>
      <option value="EF0">EF0</option>
      <option value="EF1">EF1</option>
      <option value="EF2">EF2</option>
      <option value="EF3">EF3</option>
      <option value="EF4">EF4</option>
      <option value="EF5">EF5</option>

      <option value="FU">FU</option>
      <option value="F0">F0</option>
      <option value="F1">F1</option>
      <option value="F2">F2</option>
      <option value="F3">F3</option>
      <option value="F4">F4</option>
      <option value="F5">F5</option>

      <option value="F0*">F0* (Blue Ayanami rating)</option>
      <option value="F1*">F1* (Blue Ayanami rating)</option>
      <option value="F2*">F2* (Blue Ayanami rating)</option>
      <option value="F3*">F3* (Blue Ayanami rating)</option>
      <option value="F4*">F4* (Blue Ayanami rating)</option>
      <option value="F5*">F5* (Blue Ayanami rating)</option>

      <option value="IFU">IFU</option>
      <option value="IF0">IF0</option>
      <option value="IF1">IF1</option>
      <option value="IF2">IF2</option>
      <option value="IF3">IF3</option>
      <option value="IF4">IF4</option>
      <option value="IF5">IF5</option>
    </select>
  </div>

  <div class="formActions">
    <button onclick="createTornado()">Submit</button>
    <button onclick="closeForm()">Cancel</button>
  </div>

</div>

<script type="module">
import { supabase } from './supabase.js';

const listEl = document.getElementById("list");

const searchInput = document.getElementById("searchInput");

const intensityFilter = document.getElementById("intensityFilter");
const yearFilter = document.getElementById("yearFilter");
const stateFilter = document.getElementById("stateFilter");
const sortFilter = document.getElementById("sortFilter");

const formBox = document.getElementById("formBox");
const guestPopup = document.getElementById("guestPopup");
let usernamePopup = null;

const nameInput = document.getElementById("name");
const stateInput = document.getElementById("state");
const dateInput = document.getElementById("date");
const intensityInput = document.getElementById("intensity");

const totalCountEl = document.getElementById("totalCount");
const uploadCountEl = document.getElementById("uploadCount");
let currentUser = null;

async function initAuth() {
  const { data: { session } } = await supabase.auth.getSession();
  const user = session?.user ?? null;

  currentUser = user;

  const guestPopup = document.getElementById("guestPopup");
  if (!guestPopup) return;

  guestPopup.style.display = user ? "none" : "flex";
}

function getIntensityGlow(intensity) {
  const c = getEFColor(intensity);
  return `0 0 18px ${c}33`;
}

function normalizeStates(t) {
  if (Array.isArray(t.states)) return t.states;

  if (typeof t.states === "string") {
    return t.states.split("-").map(s => s.trim());
  }

  return [];
}

function showUsernamePopup(user) {
  if (document.getElementById("usernamePopup")) return;

  document.body.insertAdjacentHTML("beforeend", `
    <div id="usernamePopup" style="
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.75);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    ">
      <div style="
        background:#1f2937;
        padding:30px;
        border-radius:16px;
        width:400px;
        text-align:center;
      ">
        <h2>Create Username</h2>

        <input
          id="newUsername"
          placeholder="Choose username"
          style="width:100%;padding:12px;margin-top:12px;border-radius:8px;background:#111827;color:white;"
        />

        <button onclick="saveUsername('${user.id}')" style="width:100%;margin-top:14px;padding:12px;">
          Save Username
        </button>
      </div>
    </div>
  `);
  usernamePopup = document.getElementById("usernamePopup");
}

window.openRandomTornado = function () {
  if (!allTornadoes.length) {
    alert("No tornadoes loaded.");
    return;
  }

  const random =
    allTornadoes[Math.floor(Math.random() * allTornadoes.length)];

  location.href = "tornado.html?id=" + random.id;
};

window.saveUsername = async function (userId) {
  const input = document.getElementById("newUsername");
  const username = input?.value?.trim();

  if (!username) {
    alert("Username required.");
    return;
  }

  // optional: basic validation (prevents empty spaces / weird input)
  if (username.length < 3) {
    alert("Username must be at least 3 characters.");
    return;
  }

  const { error } = await supabase
    .from("profiles")
    .upsert([{ id: userId, username }])

  if (error) {
    alert(error.message);
    return;
  }

  const popup = document.getElementById("usernamePopup");
  if (popup) popup.remove();

  initAuth();
};

let allTornadoes = [];

function getEFColor(intensity) {
  if (!intensity) return "#9E9E9E";

  const i = intensity.toString().toUpperCase();

  // Unknown
  if (i.includes("U")) return "#9E9E9E";

  // SPC-style colors
  if (i.includes("0")) return "#00FF00"; // EF0/F0 - bright green
  if (i.includes("1")) return "#32CD32"; // EF1/F1 - lime green
  if (i.includes("2")) return "#FFFF00"; // EF2/F2 - yellow
  if (i.includes("3")) return "#FFA500"; // EF3/F3 - orange
  if (i.includes("4")) return "#FF0000"; // EF4/F4 - red
  if (i.includes("5")) return "#FF00FF"; // EF5/F5 - magenta

  return "#9E9E9E";
}

/* =========================
   FIXED INTENSITY HANDLER
========================= */
function formatIntensity(i) {
  if (!i) return "Unknown";

  if (typeof i === "string") return i;

  const scale = i.scale ?? "EF";
  const rating = i.rating ?? "";
  const mod = i.modifier ?? "";

  return `${scale}${rating}${mod}`;
}

function intensityValue(i) {
  if (!i) return 0;

  if (typeof i === "string") {
    return parseInt(i.replace(/\D/g, "")) || 0;
  }

  const base =
    i.scale === "EF" ? 0 :
    i.scale === "F" ? 100 :
    i.scale === "IF" ? 200 : 0;

  const rating = Number(i.rating ?? 0);

  const mod =
    i.modifier === "+" ? 0.3 :
    i.modifier === "-" ? -0.3 : 0;

  return base + rating + mod;
}

async function loadTornadoes() {
  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "approved");

  allTornadoes = data || [];
  totalCountEl.innerText = allTornadoes.length;

  const { count } = await supabase
    .from("uploads")
    .select("*", { count: "exact", head: true })
    .eq("status", "approved");

  uploadCountEl.innerText = count || 0;

  populateFilters();
  applyFilters();
}

function populateFilters() {

  // ===== YEARS (NUMERICAL ORDER) =====
  const years = [...new Set(
    allTornadoes
      .map(t => t.date?.split("-")[0])
      .filter(Boolean)
  )].sort((a, b) => Number(b) - Number(a));

  // ===== STATES / COUNTRIES =====
  const allLocations = [...new Set(
    allTornadoes.flatMap(t => normalizeStates(t))
  )]
    .filter(Boolean)
    .map(s => s.trim());

  // US STATES
  const usStates = [
    "Alabama","Alaska","Arizona","Arkansas","California","Colorado",
    "Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho",
    "Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana",
    "Maine","Maryland","Massachusetts","Michigan","Minnesota",
    "Mississippi","Missouri","Montana","Nebraska","Nevada",
    "New Hampshire","New Jersey","New Mexico","New York",
    "North Carolina","North Dakota","Ohio","Oklahoma","Oregon",
    "Pennsylvania","Rhode Island","South Carolina","South Dakota",
    "Tennessee","Texas","Utah","Vermont","Virginia","Washington",
    "West Virginia","Wisconsin","Wyoming", "Washington DC"
  ];

  // CANADIAN PROVINCES/TERRITORIES
  const canada = [
    "Alberta","British Columbia","Manitoba","New Brunswick",
    "Newfoundland and Labrador","Nova Scotia","Ontario",
    "Prince Edward Island","Quebec","Saskatchewan",
    "Northwest Territories","Nunavut","Yukon"
  ];

  const usaList = allLocations
    .filter(s => usStates.includes(s))
    .sort();

  const canadaList = allLocations
    .filter(s => canada.includes(s))
    .sort();

  const countries = allLocations
    .filter(s =>
      !usStates.includes(s) &&
      !canada.includes(s)
    )
    .sort();

  // ===== YEAR FILTER =====
  yearFilter.innerHTML =
    `<option value="">All Years</option>` +
    years.map(y => `
      <option value="${y}">${y}</option>
    `).join("");

  // ===== STATE FILTER =====
  stateFilter.innerHTML = `
    <option value="">All States / Countries</option>

    <optgroup label="USA States">
      ${usaList.map(s => `
        <option value="${s}">${s}</option>
      `).join("")}
    </optgroup>

    <optgroup label="Canada">
      ${canadaList.map(s => `
        <option value="${s}">${s}</option>
      `).join("")}
    </optgroup>

    <optgroup label="Countries">
      ${countries.map(s => `
        <option value="${s}">${s}</option>
      `).join("")}
    </optgroup>
  `;

  // ===== INTENSITY FILTER =====
  const intensities = [...new Set(
    allTornadoes.map(t => formatIntensity(t.intensity))
  )].sort((a, b) => intensityValue(b) - intensityValue(a));

  intensityFilter.innerHTML =
    `<option value="">All Intensities</option>` +
    intensities.map(i => `
      <option value="${i}">${i}</option>
    `).join("");
}

window.goProfile = function () {
  location.href = "profile.html";
};

window.applyFilters = function () {
  let filtered = [...allTornadoes];

  const raw = searchInput.value.toLowerCase().trim();

  const query = raw
    .split(/\s+/)
    .filter(Boolean);

  const intensity = intensityFilter.value;
  const year = yearFilter.value;
  const state = stateFilter.value;
  const sort = sortFilter.value;

  // 🔎 Smart search matcher
  function matchesSearch(t) {
    if (!query.length) return true;

    const name = (t.name || "").toLowerCase();
    const statesText = normalizeStates(t).join(" ").toLowerCase();
    const date = (t.date || "").toLowerCase();

    const haystack = `${name} ${statesText} ${date}`;

    return query.every(q =>
      haystack.includes(q)
    );
  }

  // FILTERING
  filtered = filtered.filter(t => {
    return (
      matchesSearch(t) &&
      (!intensity || formatIntensity(t.intensity) === intensity) &&
      (!year || t.date?.startsWith(year)) &&
      (!state || normalizeStates(t).includes(state))
    );
  });

  // SORTING
  if (sort === "newest") {
    filtered.sort((a, b) => new Date(b.date) - new Date(a.date || 0));
  }

  if (sort === "oldest") {
    filtered.sort((a, b) => new Date(a.date || 0) - new Date(b.date || 0));
  }

  if (sort === "strongest") {
    filtered.sort((a, b) =>
      intensityValue(b.intensity) - intensityValue(a.intensity)
    );
  }

  if (sort === "weakest") {
    filtered.sort((a, b) =>
      intensityValue(a.intensity) - intensityValue(b.intensity)
    );
  }

  const html = filtered.map(t => `
    <div class="card" data-id="${t.id}" style="
      box-shadow:${getIntensityGlow(t.intensity)};
      display:flex;
      gap:16px;
      align-items:stretch;
      flex-wrap:wrap;
    ">

      <div style="flex:1; min-width:240px;">
        <h2 style="margin:0 0 6px;">${t.name}</h2>

        <div style="margin-bottom:8px;">
          <span class="badge" style="color:${getEFColor(t.intensity)};">
            ${formatIntensity(t.intensity)}
          </span>
        </div>

        <p style="margin:4px 0; color:#94a3b8;">
          State(s) 📍:
          ${
            normalizeStates(t).length
              ? normalizeStates(t).join(" • ")
              : "N/A"
          }
        </p>

        <p style="margin:4px 0; color:#94a3b8;">
          📅 ${t.date || "N/A"}
        </p>
      </div>

      ${
        t.cover_image
          ? `
        <div style="flex:0 0 240px;">
          <img src="${t.cover_image}" style="
            width:100%;
            height:160px;
            object-fit:cover;
            border-radius:18px;
            display:block;
          ">
        </div>
        `
          : ""
      }

    </div>
  `).join("");

  listEl.innerHTML = html;
};

listEl.addEventListener("click", (e) => {
  const card = e.target.closest(".card");
  if (!card) return;

  const id = card.dataset.id;
  if (!id) return;

  openTornado(id);
});

window.openTornado = id => location.href = 'tornado.html?id=' + id;

window.openForm = () => {
  formBox.style.display = "block";
};

window.closeForm = () => formBox.style.display = "none";

window.continueGuest = function () {
  guestPopup.style.display = "none";
};

window.createTornado = async function () {
  const name = nameInput.value;
  const state = stateInput.value;
  const date = dateInput.value;
  const intensity = intensityInput.value;

  const { data: { user } } = await supabase.auth.getUser();

  let submittedBy = "Anonymous";

  if (user) {
    const { data: profile } = await supabase
      .from("profiles")
      .select("username")
      .eq("id", user.id)
      .single();

    submittedBy = profile?.username || "Anonymous";
  }

  const { error } = await supabase.from("tornadoes").insert([{
    name,
    states: state.split("-").map(s => s.trim()),
    date,
    intensity,
    status: "pending",
    submitted_by: submittedBy
  }]);

  if (error) {
    console.error(error);
    alert("Error: " + error.message);
    return;
  }

  alert("Submitted!");
  closeForm();
  loadTornadoes(); // refresh list immediately
};

loadTornadoes();
initAuth();

supabase.auth.onAuthStateChange(() => {
  initAuth();
});

</script>
