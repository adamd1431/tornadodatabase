<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin · UTWX</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;--surface:#0d1625;--card:#111b2e;--card-hover:#172032;
  --border:rgba(255,255,255,0.07);--border-hover:rgba(255,255,255,0.15);
  --text:#f0f4ff;--muted:#7a8baa;--muted2:#3d4f6a;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,0.12);--accent-b:rgba(59,130,246,0.35);
  --err:#f87171;--err-dim:rgba(248,113,113,0.10);--err-b:rgba(248,113,113,0.30);
  --ok:#22c55e;--ok-dim:rgba(34,197,94,0.10);--ok-b:rgba(34,197,94,0.30);
  --warn:#f59e0b;--warn-dim:rgba(245,158,11,0.10);--warn-b:rgba(245,158,11,0.28);
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;overflow-x:hidden}

/* NAV */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:58px;background:rgba(8,14,26,0.92);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border)}
.brand{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--text);text-decoration:none}
.brand span{color:var(--accent)}
.brand-mark{width:24px;height:24px;border-radius:7px;object-fit:cover;border:1px solid var(--border-hover);
  background:var(--surface);box-shadow:0 0 0 3px rgba(59,130,246,0.10)}
.nav-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:12px;
  font-weight:700;letter-spacing:.3px;border:1px solid var(--accent-b);color:var(--accent);background:var(--accent-dim)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;
  border:1px solid var(--border-hover);background:transparent;color:var(--muted);
  font-size:13px;font-weight:500;font-family:"Inter",sans-serif;cursor:pointer;
  transition:color .12s,background .12s,border-color .12s;text-decoration:none;white-space:nowrap}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,.2)}

/* PAGE */
.page{max-width:860px;margin:0 auto;padding:40px 24px 80px}

/* PAGE HEADER */
.page-header{margin-bottom:28px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;display:block}
.page-header h1{font-size:28px;font-weight:900;letter-spacing:-.8px}
.page-header p{font-size:14px;color:var(--muted);margin-top:5px}
.page-head-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px}
.page-head-copy{min-width:0}

/* TAB BAR */
.tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:9px 16px;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;
  background:transparent;color:var(--muted);font-size:13px;font-weight:600;font-family:"Inter",sans-serif;
  cursor:pointer;transition:color .12s,background .12s;display:inline-flex;align-items:center;gap:7px;
  margin-bottom:-1px;position:relative}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);background:var(--card);border-color:var(--border);border-bottom-color:var(--card)}
.tab-count{background:var(--surface);border:1px solid var(--border);color:var(--muted);
  font-size:11px;font-weight:700;padding:1px 7px;border-radius:99px;min-width:20px;text-align:center}
.tab.active .tab-count{background:var(--accent-dim);border-color:var(--accent-b);color:var(--accent)}

/* PANEL */
#panel{min-height:200px}

/* LOADING / EMPTY */
.state-msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.state-msg .icon{font-size:36px;margin-bottom:12px;opacity:.4}

/* SUBMISSION CARD */
.sub-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  margin-bottom:12px;overflow:hidden;transition:border-color .15s}
.sub-card:hover{border-color:var(--border-hover)}
.sub-card-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.sub-card-title{font-size:16px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
.sub-card-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.meta-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.meta-chip svg{width:12px;height:12px;opacity:.7;flex-shrink:0}
.intensity-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;
  font-size:12px;font-weight:700;letter-spacing:.3px;border:1px solid;flex-shrink:0}
.status-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:700;flex-shrink:0}
.status-pending{color:var(--warn);background:var(--warn-dim);border:1px solid var(--warn-b)}

/* UPLOAD PREVIEW */
.sub-card-preview{padding:16px 20px;border-bottom:1px solid var(--border)}
.sub-card-preview img{max-width:100%;max-height:280px;border-radius:9px;
  border:1px solid var(--border);display:block;object-fit:contain;background:var(--surface)}
.sub-card-preview .file-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;
  color:var(--accent);text-decoration:none;padding:8px 12px;border-radius:8px;
  border:1px solid var(--accent-b);background:var(--accent-dim)}
.sub-card-preview .file-link:hover{background:rgba(59,130,246,0.2)}

/* SUMMARY TEXT */
.sub-card-body{padding:14px 20px;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--muted);line-height:1.7;max-height:120px;overflow:auto}

/* ACTION ROW */
.sub-card-actions{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.sub-card-submitter{font-size:12px;color:var(--muted2)}
.action-btns{display:flex;gap:7px}
.admin-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:12px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px}
.admin-toolbar input,.admin-toolbar select{height:34px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg);color:var(--text);font-family:"Inter",sans-serif;font-size:12px;padding:0 10px;outline:none}
.admin-toolbar input{min-width:220px;flex:1}
.admin-check{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
.duplicate-chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:700;
  color:var(--warn);background:var(--warn-dim);border:1px solid var(--warn-b)}
.dashboard-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px}
.dash-card h3{font-size:15px;font-weight:800;margin-bottom:5px}
.dash-card p{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:12px}
.dash-list{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow:auto}
.dash-item{display:flex;justify-content:space-between;gap:10px;padding:8px 10px;border-radius:8px;background:var(--surface);
  color:var(--text);font-size:12px;text-decoration:none}
.dash-item span:last-child{color:var(--muted);white-space:nowrap}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 14px;border-radius:8px;border:1px solid var(--border-hover);
  background:transparent;color:var(--muted);font-size:12px;font-weight:600;
  font-family:"Inter",sans-serif;cursor:pointer;transition:color .12s,background .12s,border-color .12s;white-space:nowrap}
.btn:hover{color:var(--text);background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.2)}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-approve{color:var(--ok);border-color:var(--ok-b)}
.btn-approve:hover{background:var(--ok-dim);border-color:var(--ok-b);color:var(--ok)}
.btn-reject{color:var(--err);border-color:var(--err-b)}
.btn-reject:hover{background:var(--err-dim);border-color:var(--err-b);color:var(--err)}
.btn svg{width:12px;height:12px;flex-shrink:0}

/* ACCESS DENIED */
.denied{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 58px);padding:40px;text-align:center;gap:12px}
.denied .icon{font-size:40px;opacity:.35}
.denied h2{font-size:22px;font-weight:800;letter-spacing:-.4px}
.denied p{font-size:14px;color:var(--muted);max-width:320px;line-height:1.6}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:99px}

@media(max-width:600px){
  .page-head-row{flex-direction:column;align-items:flex-start}
  .sub-card-head{flex-direction:column;gap:10px}
  .sub-card-actions{flex-direction:column;align-items:flex-start}
  .action-btns{width:100%}
  .btn{flex:1}
}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:12px">
    <a class="brand" href="index.html"><img class="brand-mark" src="favicon.png" alt=""><span>UT</span>WX</a>
    <span class="nav-badge">Admin</span>
  </div>
  <div class="nav-right">
    <a class="nav-btn" href="index.html">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </div>
</nav>

<!-- ACCESS DENIED STATE -->
<div id="deniedState" style="display:none">
  <div class="denied">
    <div class="icon">🔒</div>
    <h2>Access denied</h2>
    <p>You don't have permission to view this page. Sign in with an admin account.</p>
    <a class="nav-btn" href="index.html" style="margin-top:8px">Go home</a>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none">
  <div class="page">

    <div class="page-header">
      <div class="page-head-row">
        <div class="page-head-copy">
          <span class="eyebrow">Admin Dashboard</span>
          <h1>Review Submissions</h1>
          <p>Approve or reject pending tornadoes, uploads, and summaries.</p>
        </div>
        <button class="btn btn-approve" id="approveAllBtn" onclick="approveAll()">Approve all</button>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tab-tornadoes" onclick="switchTab('tornadoes')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 1 0 20"/><path d="M12 2C6.5 2 2 6.5 2 12"/><path d="M12 8v4l3 3"/></svg>
        Tornadoes
        <span class="tab-count" id="count-tornadoes">—</span>
      </button>
      <button class="tab" id="tab-uploads" onclick="switchTab('uploads')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Uploads
        <span class="tab-count" id="count-uploads">—</span>
      </button>
      <button class="tab" id="tab-summaries" onclick="switchTab('summaries')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Summaries
        <span class="tab-count" id="count-summaries">—</span>
      </button>
      <button class="tab" id="tab-completeness" onclick="switchTab('completeness')">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Completeness
        <span class="tab-count" id="count-completeness">-</span>
      </button>
    </div>
    <div id="panel">
      <div class="state-msg"><div class="icon">⏳</div>Loading…</div>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const ADMIN_EMAIL = "lazerbuffalo1431@gmail.com";
let activeTab = "tornadoes";
let uploadFilterCategory = "";
let uploadFilterQuery = "";
let pendingUploadsCache = [];

// ── helpers ──
function getEFColor(intensity) {
  if (!intensity) return "#64748b";
  const i = intensity.toString().toUpperCase();
  if (i.includes("U")) return "#64748b";
  if (i.includes("0")) return "#22c55e";
  if (i.includes("1")) return "#84cc16";
  if (i.includes("2")) return "#eab308";
  if (i.includes("3")) return "#f97316";
  if (i.includes("4")) return "#ef4444";
  if (i.includes("5")) return "#d946ef";
  return "#64748b";
}

function normalizeStates(t) {
  if (Array.isArray(t.states)) return t.states;
  if (typeof t.states === "string") return t.states.split("-").map(s => s.trim());
  if (typeof t.state === "string") return t.state.split("-").map(s => s.trim());
  return [];
}

function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function fmtDate(d) {
  if (!d) return null;
  return new Date(d).toLocaleDateString("en-US", { year:"numeric", month:"short", day:"numeric" });
}

function setCount(tab, n) {
  const el = document.getElementById("count-" + tab);
  if (el) el.textContent = n;
}

async function refreshCounts() {
  const [t, u, s, all] = await Promise.all([
    supabase.from("tornadoes").select("*", { count:"exact", head:true }).eq("status","pending"),
    supabase.from("uploads").select("*", { count:"exact", head:true }).eq("status","pending"),
    supabase.from("summary_submissions").select("*", { count:"exact", head:true }).eq("status","pending"),
    supabase.from("tornadoes").select("id,name,date,intensity,cover_image,description,status"),
  ]);
  setCount("tornadoes", t.count ?? "—");
  setCount("uploads", u.count ?? "—");
  setCount("summaries", s.count ?? "—");
  const completenessRows = (all.data || []).filter(row => row.status === "approved");
  const missingBasics = completenessRows.reduce((total, row) => total
    + (!row.cover_image ? 1 : 0)
    + (!row.date ? 1 : 0)
    + (!row.intensity ? 1 : 0)
    + (!row.description ? 1 : 0), 0);
  setCount("completeness", all.error ? "-" : missingBasics);
}

// ── tab switching ──
window.switchTab = function(tab) {
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.getElementById("approveAllBtn").style.display = tab === "completeness" ? "none" : "inline-flex";
  if (tab === "tornadoes") loadTornadoes();
  else if (tab === "uploads") loadUploads();
  else if (tab === "summaries") loadSummaries();
  else if (tab === "completeness") loadCompleteness();
};

// ── action buttons ──
function setCardState(id, state) {
  const card = document.getElementById("card-" + id);
  if (!card) return;
  const btns = card.querySelectorAll(".btn-approve,.btn-reject");
  btns.forEach(b => b.disabled = state === "loading");
  if (state === "approved") {
    card.style.opacity = ".45";
    card.style.pointerEvents = "none";
    const actions = card.querySelector(".sub-card-actions");
    if (actions) actions.innerHTML = `<span style="font-size:12px;color:var(--ok)">✓ Approved</span>`;
  }
  if (state === "rejected") {
    card.style.opacity = ".45";
    card.style.pointerEvents = "none";
    const actions = card.querySelector(".sub-card-actions");
    if (actions) actions.innerHTML = `<span style="font-size:12px;color:var(--err)">✕ Rejected</span>`;
  }
}

window.approve = async function(type, id) {
  setCardState(id, "loading");
  const table = type === "tornado" ? "tornadoes" : "uploads";
  const { error } = await supabase.from(table).update({ status: "approved" }).eq("id", id);
  if (error) { console.error(error); setCardState(id, null); return; }
  setCardState(id, "approved");
  decrementCount(activeTab);
};

window.reject = async function(type, id) {
  setCardState(id, "loading");
  const table = type === "tornado" ? "tornadoes" : "uploads";
  const { error } = await supabase.from(table).delete().eq("id", id);
  if (error) { console.error(error); setCardState(id, null); return; }
  setCardState(id, "rejected");
  decrementCount(activeTab);
};

function getSelectedUploadIds() {
  return [...document.querySelectorAll(".upload-select:checked")].map(input => input.value);
}

window.toggleAllUploads = function(input) {
  document.querySelectorAll(".upload-select").forEach(box => { box.checked = input.checked; });
};

window.setUploadFilter = function(kind, value) {
  if (kind === "category") uploadFilterCategory = value;
  if (kind === "query") uploadFilterQuery = value.toLowerCase().trim();
  renderUploads(pendingUploadsCache);
};

window.approveSelectedUploads = async function() {
  const ids = getSelectedUploadIds();
  if (!ids.length) { alert("Select uploads first."); return; }
  const { error } = await supabase.from("uploads").update({ status: "approved" }).in("id", ids);
  if (error) { alert(error.message); return; }
  loadUploads();
  refreshCounts();
};

window.rejectSelectedUploads = async function() {
  const ids = getSelectedUploadIds();
  if (!ids.length) { alert("Select uploads first."); return; }
  if (!confirm(`Reject ${ids.length} selected upload${ids.length === 1 ? "" : "s"}?`)) return;
  const { error } = await supabase.from("uploads").delete().in("id", ids);
  if (error) { alert(error.message); return; }
  loadUploads();
  refreshCounts();
};

window.approveUploadAsCover = async function(id, tornadoId, encodedUrl) {
  const fileUrl = decodeURIComponent(encodedUrl);
  setCardState(id, "loading");
  const [uploadUpdate, tornadoUpdate] = await Promise.all([
    supabase.from("uploads").update({ status: "approved" }).eq("id", id),
    supabase.from("tornadoes").update({ cover_image: fileUrl, cover_position: "50% 70%" }).eq("id", tornadoId),
  ]);
  if (uploadUpdate.error || tornadoUpdate.error) {
    console.error(uploadUpdate.error || tornadoUpdate.error);
    alert((uploadUpdate.error || tornadoUpdate.error).message);
    setCardState(id, null);
    return;
  }
  setCardState(id, "approved");
  decrementCount("uploads");
};

window.approveSummary = async function(id, tornadoId, encodedText) {
  setCardState(id, "loading");
  const text = decodeURIComponent(encodedText);
  const [t1, t2] = await Promise.all([
    supabase.from("tornadoes").update({ description: text }).eq("id", tornadoId),
    supabase.from("summary_submissions").update({ status: "approved" }).eq("id", id),
  ]);
  if (t1.error || t2.error) { console.error(t1.error || t2.error); setCardState(id, null); return; }
  setCardState(id, "approved");
  decrementCount("summaries");
};

window.rejectSummary = async function(id) {
  setCardState(id, "loading");
  const { error } = await supabase.from("summary_submissions").delete().eq("id", id);
  if (error) { console.error(error); setCardState(id, null); return; }
  setCardState(id, "rejected");
  decrementCount("summaries");
};

window.approveAll = async function() {
  const btn = document.getElementById("approveAllBtn");
  const label = activeTab === "tornadoes" ? "tornadoes" : activeTab === "uploads" ? "uploads" : "summaries";
  if (!confirm(`Approve all pending ${label}?`)) return;

  const originalText = btn.textContent;
  btn.disabled = true;
  btn.textContent = "Approving...";
  document.querySelectorAll(".btn-approve,.btn-reject").forEach(b => b.disabled = true);

  try {
    let error = null;
    if (activeTab === "tornadoes") {
      ({ error } = await supabase.from("tornadoes").update({ status: "approved" }).eq("status", "pending"));
    } else if (activeTab === "uploads") {
      ({ error } = await supabase.from("uploads").update({ status: "approved" }).eq("status", "pending"));
    } else {
      const { data: rows, error: loadError } = await supabase
        .from("summary_submissions")
        .select("id,tornado_id,summary_text")
        .eq("status", "pending");
      if (loadError) throw loadError;

      for (const row of rows || []) {
        const [tornadoUpdate, summaryUpdate] = await Promise.all([
          supabase.from("tornadoes").update({ description: row.summary_text || "" }).eq("id", row.tornado_id),
          supabase.from("summary_submissions").update({ status: "approved" }).eq("id", row.id),
        ]);
        if (tornadoUpdate.error || summaryUpdate.error) throw (tornadoUpdate.error || summaryUpdate.error);
      }
    }
    if (error) throw error;

    await refreshCounts();
    if (activeTab === "tornadoes") loadTornadoes();
    else if (activeTab === "uploads") loadUploads();
    else loadSummaries();
  } catch (error) {
    console.error(error);
    alert(error.message || "Could not approve all pending items.");
    if (activeTab === "tornadoes") loadTornadoes();
    else if (activeTab === "uploads") loadUploads();
    else loadSummaries();
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
};

function decrementCount(tab) {
  const el = document.getElementById("count-" + tab);
  if (!el) return;
  const n = parseInt(el.textContent) || 1;
  el.textContent = Math.max(0, n - 1);
}

// ── SUMMARIES ──
function renderUploads(rows) {
  const categories = [...new Set(rows.map(u => u.category).filter(Boolean))].sort();
  const duplicateKeys = rows.reduce((map, u) => {
    const key = String(u.file_url || "").split("?")[0].toLowerCase();
    map.set(key, (map.get(key) || 0) + 1);
    return map;
  }, new Map());

  const filtered = rows.filter(u => {
    const haystack = `${u.tornadoes?.name || ""} ${u.category || ""} ${u.uploaded_by || ""} ${u.file_url || ""}`.toLowerCase();
    return (!uploadFilterCategory || u.category === uploadFilterCategory)
      && (!uploadFilterQuery || haystack.includes(uploadFilterQuery));
  });

  const toolbar = `
    <div class="admin-toolbar">
      <label style="display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)">
        <input class="admin-check" type="checkbox" onchange="toggleAllUploads(this)"> Select visible
      </label>
      <select onchange="setUploadFilter('category', this.value)">
        <option value="">All upload types</option>
        ${categories.map(cat => `<option value="${esc(cat)}" ${cat === uploadFilterCategory ? "selected" : ""}>${esc(cat)}</option>`).join("")}
      </select>
      <input type="search" placeholder="Filter by tornado, uploader, file..." value="${esc(uploadFilterQuery)}" oninput="setUploadFilter('query', this.value)">
      <button class="btn btn-approve" onclick="approveSelectedUploads()">Approve selected</button>
      <button class="btn btn-reject" onclick="rejectSelectedUploads()">Reject selected</button>
    </div>`;

  if (!filtered.length) {
    document.getElementById("panel").innerHTML = toolbar + `<div class="state-msg"><div class="icon">âœ…</div><p>No uploads match those filters.</p></div>`;
    return;
  }

  document.getElementById("panel").innerHTML = toolbar + filtered.map(u => {
    const isImage = /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(u.file_url || "");
    const duplicateKey = String(u.file_url || "").split("?")[0].toLowerCase();
    const duplicate = duplicateKeys.get(duplicateKey) > 1;
    const encodedUrl = encodeURIComponent(u.file_url || "");
    const previewHtml = isImage
      ? `<div class="sub-card-preview"><img src="${esc(u.file_url)}" alt="Upload preview" loading="lazy"></div>`
      : `<div class="sub-card-preview"><a class="file-link" href="${esc(u.file_url)}" target="_blank" rel="noopener">Open file</a></div>`;

    return `
    <div class="sub-card" id="card-${u.id}">
      <div class="sub-card-head">
        <input class="admin-check upload-select" type="checkbox" value="${esc(u.id)}" style="margin-top:3px">
        <div style="min-width:0">
          <div class="sub-card-title">${esc(u.tornadoes?.name) || "Unknown tornado"}</div>
          <div class="sub-card-meta" style="margin-top:6px">
            ${u.category ? `<span class="meta-chip">${esc(u.category)}</span>` : ""}
            ${u.uploaded_by ? `<span class="meta-chip">${esc(u.uploaded_by)}</span>` : ""}
            ${duplicate ? `<span class="duplicate-chip">Duplicate file</span>` : ""}
          </div>
        </div>
        <span class="status-chip status-pending" style="flex-shrink:0">Pending</span>
      </div>
      ${previewHtml}
      <div class="sub-card-actions">
        <span class="sub-card-submitter">${u.created_at ? "Uploaded " + fmtDate(u.created_at) : ""}</span>
        <div class="action-btns">
          <button class="btn btn-reject" onclick="reject('upload','${u.id}')">Reject</button>
          <button class="btn btn-approve" onclick="approve('upload','${u.id}')">Approve</button>
          ${isImage && u.tornado_id ? `<button class="btn btn-approve" onclick="approveUploadAsCover('${u.id}','${u.tornado_id}','${encodedUrl}')">Approve + cover</button>` : ""}
        </div>
      </div>
    </div>`;
  }).join("");
}

      </div>
    </div>`;
  }).join("");

// ── AUTH CHECK ──
function dashList(title, desc, items, fieldLabel) {
  const shown = items.slice(0, 24);
  return `
    <div class="dash-card">
      <h3>${esc(title)} (${items.length})</h3>
      <p>${esc(desc)}</p>
      <div class="dash-list">
        ${shown.length ? shown.map(t => `
          <a class="dash-item" href="tornado.html?id=${esc(t.id)}">
            <span>${esc(t.name || "Unnamed tornado")}</span>
            <span>${esc(fieldLabel)}</span>
          </a>`).join("") : `<div class="state-msg" style="padding:20px">Nothing here.</div>`}
      </div>
    </div>`;
}

window.loadCompleteness = async function() {
  document.getElementById("panel").innerHTML = `<div class="state-msg"><div class="icon">...</div>Loading...</div>`;
  const [{ data: tornadoes, error }, { data: uploads }] = await Promise.all([
    supabase.from("tornadoes").select("id,name,date,intensity,cover_image,description,path_image,status").eq("status", "approved"),
    supabase.from("uploads").select("tornado_id,status").eq("status", "approved"),
  ]);

  if (error) {
    document.getElementById("panel").innerHTML = `<div class="state-msg"><p>Could not load completeness data.</p></div>`;
    return;
  }

  const uploadCounts = new Map();
  (uploads || []).forEach(u => uploadCounts.set(u.tornado_id, (uploadCounts.get(u.tornado_id) || 0) + 1));
  const rows = tornadoes || [];
  const missingCover = rows.filter(t => !t.cover_image);
  const missingDate = rows.filter(t => !t.date);
  const missingRating = rows.filter(t => !t.intensity);
  const missingSummary = rows.filter(t => !t.description);
  const noUploads = rows.filter(t => !uploadCounts.get(t.id));
  const noPath = rows.filter(t => !t.path_image);

  setCount("completeness", missingCover.length + missingDate.length + missingRating.length + missingSummary.length + noUploads.length);
  document.getElementById("panel").innerHTML = `
    <div class="dashboard-grid">
      ${dashList("Missing cover", "Needs a main cover image.", missingCover, "cover")}
      ${dashList("Missing date", "Needs a documented event date.", missingDate, "date")}
      ${dashList("Missing rating", "Needs EF/F/FU intensity.", missingRating, "rating")}
      ${dashList("Missing summary", "Needs a tornado information summary.", missingSummary, "summary")}
      ${dashList("No uploads", "No approved media is attached yet.", noUploads, "media")}
      ${dashList("No path image", "No path or radar-path image is set.", noPath, "path")}
    </div>`;
};

async function init() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user || user.email !== ADMIN_EMAIL) {
    // also check profile role as fallback
    let isAdmin = false;
    if (user) {
      const { data: profile } = await supabase.from("profiles").select("is_admin, role").eq("id", user.id).maybeSingle();
      isAdmin = !!(profile?.is_admin || profile?.role === "admin");
    }
    if (!isAdmin) {
      document.getElementById("deniedState").style.display = "block";
      return;
    }
  }

  document.getElementById("adminPanel").style.display = "block";
  loadTornadoes();

  refreshCounts();
}

init();
</script>
