<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      margin: 0;
      padding: 25px;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f172a, #1f2937);
      color: white;
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 25px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-right: 8px;
    }

    button:hover {
      background: #1d4ed8;
    }

    input {
      padding: 10px;
      width: 220px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #111827;
      color: white;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid #374151;
      border-radius: 14px;
      padding: 18px;
      margin: 15px 0;
    }

    img {
      max-width: 250px;
      border-radius: 10px;
      margin-top: 10px;
    }

    a {
      color: #93c5fd;
      word-break: break-word;
    }

    .homeBtn {
      position: fixed;
      top: 15px;
      right: 15px;
    }

    .loginScreen {
      position: fixed;
      inset: 0;
      background: linear-gradient(to bottom, #0f172a, #1f2937);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .panel {
      display: none;
      max-width: 1000px;
      margin: auto;
    }

    .pendingBox {
      margin-top: 10px;
      padding: 10px;
      border: 1px dashed #fbbf24;
      border-radius: 10px;
    }

    .tabBar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #0f172a;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    .badge {
      background: rgba(59,130,246,0.2);
      color: #93c5fd;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<button class="homeBtn" onclick="location.href='index.html'">⬅ Home</button>

<!-- PANEL -->
<div id="adminPanel" class="panel">

  <h1>🌪 Tornado Archive Admin</h1>
  <p style="text-align:center; color:#94a3b8; margin-top:-10px;">
    Review submissions, uploads, and summaries
  </p>

  <div class="tabBar">
    <button onclick="loadTornadoes()">🌪 Tornadoes</button>
    <button onclick="loadUploads()">📸 Uploads</button>
  <button onclick="loadSummaries()">📝 Summaries</button>
  </div>

  <hr>

  <div id="panel">Loading...</div>
</div>

<script type="module">
import { supabase } from './supabase.js';

const ADMIN_EMAIL = "lazerbuffalo1431@gmail.com"; // replace with your actual account email
let view = "tornadoes";

async function loadSummaries() {
  view = "summaries";

  const { data: summaries } = await supabase
    .from("summary_submissions")
    .select("*")
    .eq("status", "pending");

  const { data: tornadoes } = await supabase
    .from("tornadoes")
    .select("id, name");

  const tornadoMap = {};
  tornadoes?.forEach(t => {
    tornadoMap[t.id] = t.name;
  });

  document.getElementById("panel").innerHTML =
    summaries && summaries.length
      ? summaries.map(s => `
        <div class="card">
          <p><b>Tornado:</b> ${tornadoMap[s.tornado_id] || "Unknown"}</p>
          <p>${s.summary_text}</p>

          <button onclick='approveSummarySubmission(
            "${s.id}",
            "${s.tornado_id}",
            ${JSON.stringify(JSON.stringify(s.summary_text))}
          )'>
            Approve
          </button>
        </div>
      `).join("")
      : "<p>No pending summaries.</p>";
}

async function checkAdmin() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("Please sign in first.");
    location.href = "login.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    document.body.innerHTML = `
      <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial;
        color:white;
        background:linear-gradient(to bottom,#0f172a,#1f2937);
      ">
        <h1>Access Denied</h1>
      </div>
    `;
    return;
  }

  document.getElementById("adminPanel").style.display = "block";

  loadTornadoes();
}

// 🌪 LOAD TORNADOES
async function loadTornadoes() {
  view = "tornadoes";

  const { data } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("status", "pending");

  const safe = data || [];

  document.getElementById("panel").innerHTML =
    safe.length ? safe.map(t => `
      <div class="card">

        <h3>${t.name || "Unnamed Tornado"}</h3>

        <p><b>State:</b> ${normalizeStates(t).join(" - ") || "N/A"}</p>
        <p><b>Date:</b> ${t.date || "N/A"}</p>
        <p>
          <b>Intensity:</b>
          <span class="badge"
            style="
              background:${getEFColor(t.intensity)}22;
              border:1px solid ${getEFColor(t.intensity)};
              color:${getEFColor(t.intensity)};
            "
          >
            ${t.intensity || "N/A"}
          </span>
        </p>

        <p>${t.description || ""}</p>

        <br>

        <button onclick="approve('tornado','${t.id}')">Approve Tornado</button>
        <button onclick="reject('tornado','${t.id}')">Reject</button>

      </div>
    `).join("")
    : "<p>No tornadoes found.</p>";
}

function normalizeStates(t) {
  if (Array.isArray(t.states)) return t.states;
  if (typeof t.states === "string") return t.states.split("-").map(s => s.trim());
  if (typeof t.state === "string") return t.state.split("-").map(s => s.trim());
  return [];
}

function getEFColor(intensity) {
  if (!intensity) return "#9E9E9E";

  const i = intensity.toString().toUpperCase();

  // Unknown
  if (i.includes("U")) return "#9E9E9E";

  // SPC-style colors
  if (i.includes("0")) return "#00FF00"; // EF0
  if (i.includes("1")) return "#32CD32"; // EF1
  if (i.includes("2")) return "#FFFF00"; // EF2
  if (i.includes("3")) return "#FFA500"; // EF3
  if (i.includes("4")) return "#FF0000"; // EF4
  if (i.includes("5")) return "#FF00FF"; // EF5

  return "#9E9E9E";
}

// 📸 LOAD UPLOADS
async function loadUploads() {
  view = "uploads";

  const { data } = await supabase
    .from("uploads")
    .select("*, tornadoes(name)")
    .eq("status", "pending");

  const safe = data || [];

  document.getElementById("panel").innerHTML =
    safe.length ? safe.map(u => `
      <div class="card">

        <p><b>Tornado:</b> ${u.tornadoes?.name || "Unknown"}</p>
        <p><b>Category:</b> ${u.category || "N/A"}</p>
        <p><b>Uploaded By:</b> ${u.uploaded_by || "Anonymous"}</p>

        ${
          u.category === "writeups"
            ? `<a href="${u.file_url}" target="_blank">${u.file_url}</a>`
            : /\.(jpg|jpeg|png|gif|webp)$/i.test(u.file_url)
              ? `<img src="${u.file_url}">`
              : `<a href="${u.file_url}" target="_blank">${u.file_url}</a>`
        }

        <br><br>

        <button onclick="approve('upload','${u.id}')">Approve</button>
        <button onclick="reject('upload','${u.id}')">Reject</button>

      </div>
    `).join("")
    : "<p>No uploads found.</p>";
}

// ✅ APPROVE / REJECT
window.approve = async function(type, id) {
  const table = type === "tornado" ? "tornadoes" : "uploads";

  await supabase.from(table)
    .update({ status: "approved" })
    .eq("id", id);

  refresh();
};

window.reject = async function(type, id) {
  const table = type === "tornado" ? "tornadoes" : "uploads";

  await supabase.from(table)
    .delete()
    .eq("id", id);

  refresh();
};

// 📝 APPROVE SUMMARY
window.approveSummarySubmission = async function(id, tornado_id, text) {
  console.log("clicked approve", id, tornado_id, text);

  try {
    text = JSON.parse(text);

    // Update tornado description
    const tornadoUpdate = await supabase
      .from("tornadoes")
      .update({ description: text })
      .eq("id", tornado_id);

    console.log("tornado update:", tornadoUpdate);

    // Mark summary as approved
    const summaryUpdate = await supabase
      .from("summary_submissions")
      .update({ status: "approved" })
      .eq("id", id)
      .select();

    console.log("summary update error:", summaryUpdate.error);
    console.log("summary update data:", summaryUpdate.data);

    // Refresh summaries panel
    loadSummaries();

  } catch (err) {
    console.error("approveSummarySubmission error:", err);
  }
};

// 🔄 REFRESH
function refresh() {
  if (view === "tornadoes") loadTornadoes();
  else if (view === "uploads") loadUploads();
  else if (view === "summaries") loadSummaries();
}

window.loadTornadoes = loadTornadoes;
window.loadUploads = loadUploads;
window.loadSummaries = loadSummaries;

window.addEventListener("DOMContentLoaded", async () => {
  try {
    await checkAdmin();
  } catch (err) {
    console.error(err);
    document.getElementById("panel").innerHTML =
      "<p style='color:red'>Error loading admin panel. Open console (F12) to see details.</p>";
  }
});

</script>

</body>
</html>
