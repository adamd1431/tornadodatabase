<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UTWX Weather Simulator</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

#topBar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:1000;
  background:rgba(0,0,0,.7);
  padding:12px;
  border-radius:12px;
}

#legend{
  position:fixed;
  bottom:20px;
  left:20px;
  width:220px;
  background:rgba(0,0,0,.75);
  padding:10px;
  border-radius:12px;
  font-size:13px;
  z-index:1000;
}

button{
  margin:2px;
  padding:8px 12px;
  cursor:pointer;
}

canvas{ display:block; }
</style>
</head>

<body>

<div id="topBar">
  <button onclick="setMode('radar')">Radar</button>
  <button onclick="setMode('cape')">CAPE</button>
  <button onclick="setMode('dewpoint')">Dewpoint</button>
  <button onclick="setMode('temperature')">Temperature</button>
  <button onclick="setMode('shear')">Wind Shear</button>
  <button onclick="setMode('stp')">STP</button>
</div>

<div id="legend"></div>
<canvas id="canvas"></canvas>

<script>
/* =========================
   SETUP
========================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const GRID_X = 240;
const GRID_Y = 140;

const DX = canvas.width / GRID_X;
const DY = canvas.height / GRID_Y;

let mode = "radar";
let t = 0;

const cells = Array.from({length: GRID_Y}, (_, y) =>
  Array.from({length: GRID_X}, (_, x) => ({
    temperature: 95 - (y/GRID_Y)*35,
    dewpoint: 72 - (y/GRID_Y)*25,
    cape: 0,
    windU: 0,
    windV: 0,
    shear: 0,
    stp: 0
  }))
);

const storms = [];

/* =========================
   CONTROLS
========================= */
function setMode(m){
  mode = m;
}

/* =========================
   ATMOSPHERE MODEL
========================= */
function updateAtmosphere(){
  t++;

  for(let y=0;y<GRID_Y;y++){
    const lat = y/GRID_Y;
    const south = lat;

    for(let x=0;x<GRID_X;x++){
      const c = cells[y][x];

      // smoother thermodynamics
      c.temperature += (Math.random()-0.5)*0.25 + (1-south)*0.01;
      c.dewpoint += (south-0.5)*0.015;

      c.temperature *= 0.9997;
      c.dewpoint *= 0.9997;

      c.temperature = Math.max(40, Math.min(105, c.temperature));
      c.dewpoint = Math.max(20, Math.min(80, c.dewpoint));

      // jet stream
      const jet = Math.exp(-Math.pow(lat - 0.25, 2)/0.01);
      const wave = Math.sin(x*0.01 + t*0.003);

      c.windU = (40 + jet*120) * wave;
      c.windV = Math.sin(lat*10 + t*0.003) * 5;

      // CAPE (stabilized)
      const instab = c.temperature - (85 - c.dewpoint);
      c.cape = Math.max(0, instab * 100);

      // shear
      c.shear = Math.hypot(c.windU, c.windV);

      // STP (clamped + stable scaling)
      const lcl = Math.max(0, 2000 - 20*(c.temperature - c.dewpoint));
      const esrh = c.shear * 10;

      c.stp =
        (c.cape/2000) *
        (lcl/2000) *
        (esrh/200) *
        (c.shear/100);

      c.stp = Math.max(0, Math.min(10, c.stp));
    }
  }
}

/* =========================
   STORMS
========================= */
function spawnStorms(){
  if(storms.length > 8) return;

  if(Math.random() < 0.2){
    const x = (Math.random()*GRID_X)|0;
    const y = (Math.random()*GRID_Y)|0;

    const c = cells[y][x];

    if(c.cape > 1000 && c.shear > 20){
      storms.push({
        x,y,
        vx:c.windU*0.002,
        vy:c.windV*0.002,
        intensity:20,
        spin:Math.random()*0.2,
        rain:Array.from({length:60}, () => ({
          x:x+(Math.random()-0.5)*5,
          y:y+(Math.random()-0.5)*5,
          life:1
        }))
      });
    }
  }
}

function updateStorms(){
  for(const s of storms){
    const cx = (s.x|0);
    const cy = (s.y|0);

    const c = cells[cy]?.[cx];
    if(!c) continue;

    s.vx = s.vx*0.97 + c.windU*0.0001;
    s.vy = s.vy*0.97 + c.windV*0.0001;

    s.x += s.vx;
    s.y += s.vy;

    s.x = Math.max(0, Math.min(GRID_X-1, s.x));
    s.y = Math.max(0, Math.min(GRID_Y-1, s.y));

    const cx2 = s.x;
    const cy2 = s.y;

    for(const p of s.rain){
      const dx = p.x - cx2;
      const dy = p.y - cy2;
      const d = Math.hypot(dx,dy)+0.001;

      const tx = -dy/d;
      const ty = dx/d;

      p.x += tx*0.15 - dx/d*0.02 + c.windU*0.00005;
      p.y += ty*0.15 - dy/d*0.02 + c.windV*0.00005;

      p.life *= 0.98;
    }

    for(let i=0;i<3;i++){
      s.rain.push({
        x:s.x+(Math.random()-0.5)*3,
        y:s.y+(Math.random()-0.5)*3,
        life:1
      });
    }

    s.rain = s.rain.filter(p => p.life > 0.05);

    const capeBoost = c.cape/4000;
    s.intensity = Math.max(0, s.intensity*0.99 + capeBoost);
  }

  for(let i=storms.length-1;i>=0;i--){
    if(storms[i].intensity < 3) storms.splice(i,1);
  }
}

/* =========================
   RENDERING
========================= */
function color(cell){
  if(mode==="cape"){
    const v = Math.min(255, cell.cape/10);
    return `rgb(${v},0,0)`;
  }

  if(mode==="dewpoint"){
    return `rgb(0,${Math.min(255,cell.dewpoint*3)},255)`;
  }

  if(mode==="temperature"){
    const t = cell.temperature;
    if(t<40) return "#4a00ff";
    if(t<60) return "#00ccff";
    if(t<80) return "#ffff00";
    return "#ff3300";
  }

  if(mode==="shear"){
    const v = Math.min(255,cell.shear*2);
    return `rgb(255,${255-v},0)`;
  }

  if(mode==="stp"){
    const v = Math.min(255,cell.stp*30);
    return `rgb(${v},0,${255-v})`;
  }

  return "#000";
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<GRID_Y;y++){
    for(let x=0;x<GRID_X;x++){
      ctx.fillStyle = color(cells[y][x]);
      ctx.fillRect(x*DX,y*DY,DX+1,DY+1);
    }
  }

  if(mode==="radar"){
    for(const s of storms){
      for(const p of s.rain){
        ctx.fillStyle =
          p.life<0.3?"#00ff00":
          p.life<0.6?"#ffff00":
          "#ff0000";

        ctx.fillRect(p.x*DX,p.y*DY,2,2);
      }
    }
  }
}

/* =========================
   LEGEND
========================= */
function legend(){
  const el = document.getElementById("legend");

  el.innerHTML =
    mode==="radar" ? "<b>Radar</b>" :
    mode==="cape" ? "<b>CAPE</b>" :
    mode==="dewpoint" ? "<b>Dewpoint</b>" :
    mode==="temperature" ? "<b>Temperature</b>" :
    mode==="shear" ? "<b>Shear</b>" :
    "<b>STP</b>";
}

/* =========================
   LOOP
========================= */
function loop(){
  updateAtmosphere();
  spawnStorms();
  updateStorms();
  draw();
  legend();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
