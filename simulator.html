<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WSR-88D · 04 May 1999 · Oklahoma Outbreak</title>
<meta name="theme-color" content="#080e1a">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;
  --surface:#0d1625;
  --card:#111b2e;
  --card-hover:#172032;
  --border:rgba(255,255,255,.07);
  --border-hover:rgba(255,255,255,.14);
  --text:#f0f4ff;
  --muted:#7a8baa;
  --muted2:#3d4f6a;
  --accent:#3b82f6;
  --accent-strong:#60a5fa;
  --accent-dim:rgba(59,130,246,.12);
  --spc-active:#e78324;
  --spc-glow:rgba(231,131,36,.35);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:"Inter",sans-serif;color:var(--text)}
canvas{position:absolute;top:0;left:0;pointer-events:none}
#sc{pointer-events:all}

#header{position:absolute;top:0;left:0;right:0;height:40px;background:rgba(8,14,26,.9);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;z-index:200;pointer-events:all}
#logo{padding:0 14px;font-size:10px;font-weight:800;letter-spacing:.16em;color:var(--text);
  border-right:1px solid var(--border);height:100%;display:flex;align-items:center;white-space:nowrap}
#logo span{color:var(--accent)}
#viewTabs{display:flex;height:100%;border-right:1px solid var(--border)}
.vtab{padding:0 14px;font-size:9px;font-weight:800;letter-spacing:.1em;cursor:default;
  color:var(--muted);border:none;background:none;height:100%;display:flex;align-items:center;
  border-right:1px solid var(--border);transition:color .15s,background .15s,border-color .15s}
.vtab:hover{background:rgba(255,255,255,.06);color:var(--text)}
.vtab.active{background:var(--accent-dim);color:var(--text);border-bottom:2px solid var(--accent)}
#prodBar{display:flex;height:100%;flex:1;overflow-x:auto}
.ptab{padding:0 11px;font-size:9px;font-weight:800;letter-spacing:.08em;cursor:pointer;
  color:var(--muted);border:none;background:none;height:100%;white-space:nowrap;
  border-right:1px solid var(--border);display:flex;align-items:center;transition:color .15s,background .15s,border-color .15s}
.ptab:hover{background:rgba(255,255,255,.06);color:var(--text)}
.ptab.active{background:var(--accent-dim);color:#fff;border-bottom:2px solid var(--accent)}

#spcToggleWrap{display:flex;align-items:center;height:100%;padding:0 2px;border-right:1px solid var(--border);flex-shrink:0}
#spcToggleBtn{
  height:26px;padding:0 11px;
  font-family:"Inter",sans-serif;font-size:9px;font-weight:800;letter-spacing:.1em;
  color:var(--muted);background:transparent;
  border:1px solid transparent;
  cursor:pointer;white-space:nowrap;
  transition:color .15s,background .15s,border-color .15s,box-shadow .15s;
  display:flex;align-items:center;gap:5px;
}
#spcToggleBtn .spc-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted);transition:background .15s,box-shadow .15s;flex-shrink:0;
}
#spcToggleBtn.spc-on{
  color:var(--spc-active);
  border-color:rgba(231,131,36,.45);
  background:rgba(231,131,36,.1);
  box-shadow:0 0 10px var(--spc-glow);
}
#spcToggleBtn.spc-on .spc-dot{
  background:var(--spc-active);
  box-shadow:0 0 6px var(--spc-glow);
}
#spcToggleBtn:hover{background:rgba(255,255,255,.06);color:var(--text)}
#spcToggleBtn.spc-on:hover{background:rgba(231,131,36,.16);}

#siteSel{display:flex;align-items:center;padding:0 10px;gap:6px;height:100%;
  border-left:1px solid var(--border);background:rgba(13,22,37,.72);margin-left:auto;flex-shrink:0}
#siteSelect{background:var(--surface);border:1px solid var(--border-hover);color:var(--text);
  font-family:"Inter",sans-serif;font-size:11px;font-weight:800;letter-spacing:.03em;min-width:190px;height:24px;
  padding:0 9px;border-radius:8px;outline:none;display:flex;align-items:center;white-space:nowrap}
#siteCoord{font-size:7px;color:var(--muted2);text-align:center}

#clk{position:absolute;top:48px;right:8px;background:rgba(13,22,37,.94);
  border:1px solid var(--border);padding:7px 10px;text-align:right;z-index:150;line-height:1.85;pointer-events:none}
#ctZ{font-size:16px;font-weight:800;color:var(--text);letter-spacing:.04em}
#cdZ{font-size:8px;color:var(--muted);letter-spacing:.1em}
#prodLbl{font-size:8px;color:var(--accent-strong);letter-spacing:.06em;margin-top:1px}
#tiltLbl{font-size:8px;color:var(--muted2);letter-spacing:.06em}

#al{position:absolute;top:48px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;z-index:160}
.aw{font-size:8px;font-weight:700;letter-spacing:.07em;padding:3px 10px;border:1px solid;white-space:nowrap}
.tor{background:#2a0000;color:#ff5050;border-color:#aa0000;animation:blink .9s infinite}
.pds{background:#3a1200;color:#ff9a38;border-color:#d95f02;animation:blink .75s infinite}
.emg{background:#330033;color:#ff66ff;border-color:#ff00ff;animation:blink .55s infinite}
.tow{background:#1c1600;color:#ffe040;border-color:#998800}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

#sideProducts{position:absolute;top:48px;left:8px;display:none;flex-direction:column;gap:4px;
  z-index:155;pointer-events:all;max-height:min(300px,calc(100vh - 128px));overflow-y:auto;overscroll-behavior:contain}
.side-title{padding:3px 4px 2px;font-size:7px;color:var(--muted2);letter-spacing:.12em;text-transform:uppercase}
.ctab{width:74px;height:26px;background:rgba(13,22,37,.94);border:1px solid var(--border);
  color:var(--muted);font-family:"Inter",sans-serif;font-size:9px;font-weight:800;letter-spacing:.08em;
  cursor:pointer;transition:color .15s,background .15s,border-color .15s}
.ctab:hover{background:rgba(255,255,255,.06);border-color:var(--border-hover);color:var(--text)}
.ctab.active{background:var(--accent-dim);border-color:rgba(59,130,246,.45);color:#fff}

#lgnd{position:absolute;bottom:8px;left:8px;background:rgba(13,22,37,.94);
  border:1px solid var(--border);padding:8px 10px;z-index:150;min-width:145px;pointer-events:none}
#lgnd .lt{font-size:8px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.lr{display:flex;align-items:center;gap:5px;margin-bottom:2px;font-size:8px;color:var(--muted)}
.ls{width:22px;height:7px;flex-shrink:0}

#lgndSpc{position:absolute;bottom:8px;left:162px;background:rgba(13,22,37,.94);
  border:1px solid rgba(231,131,36,.35);padding:8px 10px;z-index:150;min-width:110px;pointer-events:none;display:none}
#lgndSpc .lt{font-size:8px;color:var(--spc-active);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}

#stats{position:absolute;bottom:8px;right:8px;background:rgba(13,22,37,.94);
  border:1px solid var(--border);padding:8px 10px;font-size:9px;color:var(--muted);
  line-height:2.1;z-index:150;min-width:165px;max-height:calc(100vh - 120px);overflow-y:auto;pointer-events:all}
.sh{font-size:8px;color:var(--accent-strong);letter-spacing:.11em;text-transform:uppercase;
  border-bottom:1px solid var(--border);margin-bottom:3px;padding-bottom:2px}
#stats b{color:var(--text);float:right;font-weight:500}
.sdiv{border-top:1px solid var(--border);margin:3px 0}
.srow{cursor:pointer;padding:2px 3px;display:flex;justify-content:space-between;gap:6px;line-height:1.6}
.srow:hover{background:rgba(255,255,255,.06)}
.srow.sel{background:var(--accent-dim);color:var(--text)}

#zoomCtrl{position:absolute;top:48px;left:90px;display:none;flex-direction:column;gap:3px;z-index:150;pointer-events:all}
.zbtn{width:28px;height:28px;background:rgba(13,22,37,.94);border:1px solid var(--border-hover);color:var(--muted);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;line-height:1}
.zbtn:hover{background:var(--card-hover);color:var(--text)}
#zoomLbl{background:rgba(13,22,37,.94);border:1px solid var(--border);font-size:8px;color:var(--muted);
  padding:2px 3px;text-align:center;letter-spacing:.05em}
#tiltCtrl{background:rgba(13,22,37,.94);border:1px solid var(--border);margin-top:4px;padding:3px 2px;
  display:flex;flex-direction:column;gap:1px;align-items:center}
.thdr{font-size:7px;color:var(--muted2);letter-spacing:.06em;padding:1px 0}
.tbtn{width:26px;height:17px;background:transparent;border:none;color:var(--muted);
  font-size:6.5px;cursor:pointer;letter-spacing:.03em}
.tbtn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.tbtn.tsel{background:var(--accent-dim);color:#fff;font-weight:700}

#curInfo{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  background:rgba(13,22,37,.94);border:1px solid var(--border);font-size:8px;color:var(--muted);
  padding:3px 10px;letter-spacing:.07em;z-index:150;white-space:nowrap;pointer-events:none;display:none}

#tip{position:absolute;display:none;background:rgba(13,22,37,.96);border:1px solid var(--border-hover);
  font-size:8px;color:var(--text);padding:4px 8px;z-index:400;
  letter-spacing:.05em;line-height:1.7;white-space:pre;pointer-events:none}

/* Hover value readout */
#hoverVal{
  position:absolute;display:none;
  background:rgba(6,11,22,.97);
  border:1px solid rgba(96,165,250,.45);
  border-radius:2px;
  font-size:9px;font-weight:700;font-family:"Inter",sans-serif;
  color:var(--text);
  padding:5px 9px;
  z-index:500;
  letter-spacing:.06em;
  line-height:1.65;
  white-space:pre;
  pointer-events:none;
  box-shadow:0 2px 12px rgba(0,0,0,.6);
}
#hoverVal .hv-label{color:var(--muted);font-size:7.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;display:block;margin-bottom:1px}
#hoverVal .hv-value{color:#f0f4ff;font-size:13px;font-weight:800;letter-spacing:.02em;display:block}
#hoverVal .hv-unit{color:var(--muted);font-size:8px;font-weight:500}
#hoverVal .hv-coords{color:var(--muted2);font-size:7px;font-weight:500;letter-spacing:.06em;display:block;margin-top:2px;border-top:1px solid rgba(255,255,255,.06);padding-top:2px}

#loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;color:var(--muted);font-size:10px;letter-spacing:.25em;
  text-transform:uppercase;background:var(--bg);z-index:999}
#loadBar{width:220px;height:2px;background:var(--surface)}
#loadFill{height:100%;background:var(--accent);width:0%;transition:width .35s}
#loadMsg{font-size:8px;color:var(--muted2);letter-spacing:.18em}
</style>
</head>
<body>
<canvas id="mc"></canvas>
<canvas id="rc"></canvas>
<canvas id="oc"></canvas>
<canvas id="sc"></canvas>

<div id="loading">
  <div>WSR-88D Simulation Loading</div>
  <div id="loadBar"><div id="loadFill"></div></div>
  <div id="loadMsg">INITIALIZING…</div>
</div>

<div id="header">
  <div id="logo">WSR&#8209;88D <span>◆</span> NWS</div>
  <div id="viewTabs">
    <button class="vtab active" id="vNat" type="button">NATIONAL RADAR</button>
  </div>
  <div id="prodBar"></div>
  <div id="spcToggleWrap">
    <button id="spcToggleBtn" type="button" onclick="toggleSPC()">
      <span class="spc-dot"></span>SPC OUTLOOK
    </button>
  </div>
  <div id="siteSel">
    <div>
      <div id="siteSelect" aria-label="Radar site"></div>
      <div id="siteCoord">35.33°N 97.28°W</div>
    </div>
  </div>
</div>
<div id="sideProducts"></div>

<div id="clk">
  <div id="ctZ">18:00Z</div>
  <div id="cdZ">04 MAY 1999</div>
  <div id="prodLbl">REFLECTIVITY</div>
  <div id="tiltLbl">NATIONAL RADAR</div>
</div>
<div id="al"></div>

<div id="zoomCtrl">
  <button class="zbtn" onclick="doZoom(1.4)">+</button>
  <div id="zoomLbl">124nm</div>
  <button class="zbtn" onclick="doZoom(1/1.4)">−</button>
  <div id="tiltCtrl"><div class="thdr">TILT</div></div>
</div>

<div id="lgnd"><div class="lt" id="ltt">Reflectivity (dBZ)</div><div id="lb"></div></div>
<div id="lgndSpc">
  <div class="lt">SPC Outlook</div>
  <div id="lbSpc"></div>
</div>

<div id="stats"></div>
<div id="curInfo"></div>
<div id="tip"></div>
<!-- Hover value readout panel -->
<div id="hoverVal"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
const LL=-126,RL=-65,BL=23,TL=51;
const GX=130,GY=76;
const HOFF=40;
const RGX=460,RGY=280;
const NM_KM=1.852;
const MAX_NM=96;
const TILTS=[0.5,1.5,2.4,3.4,4.3,6.0,9.9,14.6,19.5];

let W=innerWidth,H=innerHeight;
let proj=null,viewMode='national',prodMode='ref';
let spcOverlay=false;
let tick=0,simMin=18*60;
let lastFrameTs=null,simDeltaMin=0;
let lastRadarScanMin=-Infinity;
const RADAR_SCAN_INTERVAL_MIN=3;
let radarZoom=1,panX=0,panY=0;
let natZoom=1,natPanX=0,natPanY=0;
let dragging=false,lastMX=0,lastMY=0;
let curTilt=0;
let sitePxList=[];

// Track mouse position globally for hover readout
let mouseX=0,mouseY=0;

const MC=document.getElementById('mc');
const RC=document.getElementById('rc');
const OC=document.getElementById('oc');
const SC=document.getElementById('sc');
const mx=MC.getContext('2d');
const rx=RC.getContext('2d');
const ox=OC.getContext('2d');

let usData=null,mapDirty=true,radarDirty=true,natRadarCache=null,lastFieldDrawMin=-Infinity;

function resizeAll(){
  W=innerWidth;H=innerHeight;
  natRadarCache=null;
  radarDirty=true;
  [MC,RC,OC,SC].forEach(c=>{c.width=W;c.height=H;});
  if(proj){
    applyNatView();
  }
}
window.addEventListener('resize',resizeAll);

let gp=[],cw=10,ch=10;

function natBaseScale(){return Math.min(W*1.08,(H-HOFF)*1.5);}

function mkProj(){
  return d3.geoAlbersUsa().scale(natBaseScale()*natZoom).translate([W/2+natPanX,(H+HOFF)/2+natPanY]);
}

function applyNatView(){
  if(!proj)return;
  proj.scale(natBaseScale()*natZoom).translate([W/2+natPanX,(H+HOFF)/2+natPanY]);
  natRadarCache=null;
  radarDirty=true;
  buildGrid();
  mapDirty=true;
}

function buildGrid(){
  if(!proj)return;
  const a=proj([LL,BL]),b=proj([LL+(RL-LL)/(GX-1),BL]),c2=proj([LL,BL+(TL-BL)/(GY-1)]);
  cw=a&&b?Math.abs(b[0]-a[0])*1.65+1:W/GX*1.65;
  ch=a&&c2?Math.abs(c2[1]-a[1])*1.65+1:(H-HOFF)/GY*1.65;
  gp=[];
  for(let j=0;j<GY;j++){
    gp[j]=[];
    for(let i=0;i<GX;i++) gp[j][i]=proj([LL+i/(GX-1)*(RL-LL),BL+j/(GY-1)*(TL-BL)]);
  }
}

const cells=[];
for(let j=0;j<GY;j++){
  cells[j]=[];
  for(let i=0;i<GX;i++)
    cells[j][i]={lat:BL+j/(GY-1)*(TL-BL),lon:LL+i/(GX-1)*(RL-LL),
      cape:0,cin:-999,srh:0,stp:0,temp:70,td:40,wu:0,wv:0,ju:80,jv:0,shear:0,lcl:2000,lapse:6};
}

function noise2(x,y,s){return Math.sin(x*s*1.3+y*s*.8)*Math.cos(y*s*.9-x*s*.4);}
function clamp01(x){return Math.max(0,Math.min(1,x));}
function smoothstep(a,b,x){
  const t=clamp01((x-a)/(b-a));
  return t*t*(3-2*t);
}

function moistureAxisLon(lat,t=simMin){
  const hrs=(t-18*60)/60;
  const north=Math.max(0,lat-28.5);
  const bend=-94.1-.34*Math.min(north,8.5)+.28*Math.max(0,north-8.5);
  return bend+hrs*.1+.3*Math.sin((lat-31.5)*.5+hrs*.22);
}

function gulfMoisture(lat,lon,t=simMin,bd=null,ji=null){
  bd=bd||boundaryForcing(lat,lon,t);
  ji=ji||jetInfluence(lat,lon,t);
  const axis=moistureAxisLon(lat,t);
  const cross=lon-axis;
  const plume=Math.exp(-(cross*cross)/15.5)*smoothstep(25.5,30,lat)*(1-smoothstep(43.5,47.5,lat));
  const broadReturn=Math.exp(-((lat-34.5)**2)/120)*smoothstep(-103.5,-98.5,lon)*(1-smoothstep(-84,-78,lon));
  const gulfPool=Math.exp(-((lat-28.5)**2)/22-((lon+92.5)**2)/42);
  const confluence=Math.exp(-((bd.dryDist-.65)**2)/4.2)*Math.exp(-((lat-35.5)**2)/70);
  const eastDilution=1-.18*smoothstep(5.5,13,cross);
  const drylineGate=.48+.52*smoothstep(-.65,1.25,bd.dryDist);
  const frontGate=1-smoothstep(.15,2.9,bd.frontDist);
  const jetPull=clamp01((ji.lift||0)*.24+(ji.ventilation||0)*.12);
  const fetch=clamp01((plume*.72+broadReturn*.5+gulfPool*.3+confluence*.16)*eastDilution*(0.72+jetPull*.28)*drylineGate*frontGate);
  return{axis,fetch,confluence,jetPull};
}

function jetCoreLat(lon,t=simMin){
  const hrs=(t-18*60)/60;
  const east=hrs*.32;
  const wave=(lon+100-east)*Math.PI/17;
  const trough=-2.7*Math.exp(-((lon+101-east*.62)**2)/70);
  const ridge=1.7*Math.exp(-((lon+88-east*.45)**2)/130);
  return 38.2+3.1*Math.sin(wave)+1.0*Math.sin(wave*2.1+.7)+trough+ridge;
}

function jetWind(lat,lon,t=simMin){
  const coreLat=jetCoreLat(lon,t);
  const dy=lat-coreLat;
  const core=Math.exp(-(dy*dy)/8.5);
  const hrs=(t-18*60)/60;
  const streakA=Math.exp(-((lon+99-hrs*.24)**2)/160-(dy*dy)/6.5);
  const streakB=Math.exp(-((lon+87-hrs*.18)**2)/220-((dy+1.1)**2)/9);
  const speed=62+88*core+46*streakA+30*streakB;
  const slope=(jetCoreLat(lon+.35,t)-jetCoreLat(lon-.35,t))/.7;
  const dir=Math.atan2(slope,1);
  return{u:speed*Math.cos(dir),v:speed*Math.sin(dir)*.82,coreLat,speed};
}

function jetInfluence(lat,lon,t=simMin,jet=jetWind(lat,lon,t)){
  const offset=lat-jet.coreLat;
  const core=Math.exp(-(offset*offset)/9);
  const streak=Math.max(0,(jet.speed-85)/75);
  const leftExit=Math.exp(-((offset-1.4)**2)/7)*streak;
  const rightEntrance=Math.exp(-((offset+1.1)**2)/7)*streak*.8;
  const downstream=jetWind(lat,lon+1.2,t).speed-jetWind(lat,lon-1.2,t).speed;
  const diffluence=Math.max(0,downstream/42);
  const lift=Math.min(1.8,core*.22+leftExit*.58+rightEntrance*.5+diffluence*.35);
  const ventilation=Math.min(1.7,.35+streak*.55+core*.45);
  const shearBoost=Math.min(1.65,jet.speed/105);
  return{jet,lift,ventilation,shearBoost,offset,core,streak};
}

function drylineLon(lat,t=simMin){
  const hrs=(t-18*60)/60;
  const diurnal=Math.max(0,Math.sin((t/60-9)*Math.PI/13));
  const bulge=.55*diurnal*Math.exp(-((lat-35.5)**2)/18);
  const wave=.32*Math.sin((lat-32.5)*.72+hrs*.35);
  return -102.25+(lat-35)*.26+hrs*.13+bulge+wave;
}

function coldFrontLat(lon,t=simMin){
  const hrs=(t-18*60)/60;
  return 40.2+.18*(lon+98)-hrs*.05+.55*Math.sin((lon+101)*.2);
}

function boundaryForcing(lat,lon,t=simMin){
  const dryL=drylineLon(lat,t);
  const dryDist=lon-dryL;
  const frontLat=coldFrontLat(lon,t);
  const frontDist=lat-frontLat;
  const dryline=Math.exp(-(dryDist*dryDist)/1.35);
  const front=Math.exp(-(frontDist*frontDist)/3.8);
  const triple=Math.exp(-(frontDist*frontDist)/2.2-((dryDist-.25)**2)/2.4);
  const eastDry=smoothstep(-.45,1.25,dryDist);
  const southFront=smoothstep(-.65,1.55,-frontDist);
  const plains=smoothstep(25.5,29.5,lat)*(1-smoothstep(44,47,lat));
  const warm=clamp01(eastDry*southFront*plains);
  const cold=clamp01(smoothstep(.15,2.9,frontDist));
  const dry=clamp01(1-smoothstep(-1.15,.75,dryDist));
  return{dryL,dryDist,frontDist,dryline,front,triple,warm,cold,dry,eastDry,southFront,
    lift:Math.min(2.3,dryline*.75+front*.45+triple*.95)};
}

function diurnalHeating(t=simMin){
  return Math.max(0,Math.sin((t/60-8.2)*Math.PI/13.2));
}

function warmSectorWeight(lat,lon,t=simMin,bd=null,moist=null){
  bd=bd||boundaryForcing(lat,lon,t);
  moist=moist||gulfMoisture(lat,lon,t,bd);
  const southPlains=(1-smoothstep(40.5,45.5,lat))*smoothstep(27.5,31,lat);
  const eastWarm=smoothstep(-.55,2.5,bd.dryDist);
  return clamp01(southPlains*bd.southFront*eastWarm*smoothstep(.08,.75,moist.fetch+bd.eastDry*.2+moist.confluence*.14));
}

function calcCapePotential(c,lat,lon,bd,moist,ji,eml,diurnal){
  const moistDepth=smoothstep(54,68,c.td);
  const heat=smoothstep(68,88,c.temp);
  const lapseTerm=Math.max(0,c.lapse-6.1)*430;
  const drylineFocus=Math.exp(-((bd.dryDist-.75)**2)/8.5);
  const warm=warmSectorWeight(lat,lon,simMin,bd,moist);
  const capRelease=smoothstep(-170,-35,c.cin);
  const base=(c.td-54)*185+(c.temp-72)*95+lapseTerm+eml*520+
    ji.ventilation*160+bd.lift*185+moist.confluence*220+drylineFocus*170+warm*360-bd.cold*1850;
  return Math.max(0,Math.min(7800,base*Math.pow(clamp01(moistDepth*.72+heat*.28),.9)*
    (.5+warm*.62)*(diurnal*.7+.3)*(capRelease*.28+.72)));
}

function updateShear(c,lat,lon,warm){
  const ji=jetInfluence(lat,lon,simMin);
  c.jetLift=ji.lift;
  c.jetVent=ji.ventilation;
  c.jetSpeed=ji.jet.speed;
  const su=c.ju*.24-c.wu,sv=c.jv*.24-c.wv;
  c.shear=Math.sqrt(su*su+sv*sv);
  if(warm<.08){c.srh=0;return;}
  const hel=su*(-c.wv)-sv*(-c.wu);
  const sreg=Math.exp(-((lat-36.5)**2)/22-((lon+98.5)**2)/85);
  const llj2=Math.exp(-((lon+97)**2)/70-((lat-36)**2)/40);
  const warmWeight=clamp01(warm);
  c.srh=Math.max(0,Math.min(1000,(hel*3.2*sreg*ji.shearBoost+llj2*280+ji.lift*95+Math.sqrt(su*su+sv*sv)*2.5)*warmWeight+(Math.random()-.5)*18));
}

function initAtm(){
  for(let j=0;j<GY;j++) for(let i=0;i<GX;i++){
    const c=cells[j][i];
    const{lat,lon}=c;
    const bd=boundaryForcing(lat,lon,simMin);
    const dlat=lat-35.5,dlon=lon+97.5;
    const warm=bd.warm;
    const jet=jetWind(lat,lon,simMin);
    const ji=jetInfluence(lat,lon,simMin,jet);
    const moist=gulfMoisture(lat,lon,simMin,bd,ji);
    const eml=Math.exp(-((lon+101)**2)/500);
    const ns=noise2(lon,lat,0.22);
    const diurnal=diurnalHeating(simMin);
    const warmSector=warmSectorWeight(lat,lon,simMin,bd,moist);
    const lowCloud=(1-diurnal)*warmSector*(1-smoothstep(.55,1.35,ji.ventilation));

    const dryFrac=clamp01(1-smoothstep(-.75,1.05,bd.dryDist));
    const coldFrac=clamp01(bd.cold);
    const westCool=Math.max(0,-104-lon)*1.15+Math.exp(-((lon+107)**2)/90-((lat-39)**2)/55)*9;
    const terrainCool=westCool*(.45+.55*dryFrac);
    const baseTemp=64+diurnal*13-(lat-34)*.5+(lon+98)*.12+ns*1.05;
    const drylineHeat=dryFrac*(8+diurnal*8+eml*2.2)+Math.max(0,-bd.dryDist)*diurnal*.85;
    const moistCooling=moist.fetch*(1.5+lowCloud*2.4)+lowCloud*3.5;
    c.temp=Math.max(35,Math.min(101,baseTemp+drylineHeat+bd.dryline*1.15+ji.lift*.45-
      coldFrac*(14+diurnal*3)-terrainCool-moistCooling));

    const baseTd=44+moist.fetch*25+warmSector*4.2+moist.confluence*4.8+bd.eastDry*2.2-
      dryFrac*(22+diurnal*5)-coldFrac*9-Math.max(0,lat-38.5)*.85+ns*1.1;
    c.td=Math.max(4,Math.min(78,baseTd));

    if(warm>.25&&moist.fetch>.14){
      const llj=Math.exp(-((lon-moist.axis)**2)/8)*smoothstep(28,36,lat);
      c.wu=-3-llj*9+moist.confluence*-2+(Math.random()-.5)*3;
      c.wv=-16-llj*17-moist.jetPull*5+(Math.random()-.5)*4;
    } else if(bd.dry>.55){
      c.wu=14+(Math.random()-.5)*3;c.wv=8+(Math.random()-.5)*2;
    } else {
      const a=Math.atan2(dlon,-dlat);
      c.wu=Math.cos(a)*12;c.wv=Math.sin(a)*10;
    }

    c.ju=jet.u;
    c.jv=jet.v;

    c.lapse=Math.min(10.3,6.0+eml*1.85+ji.ventilation*.22+bd.dry*.38+diurnal*.28+(Math.random()-.5)*.25);
    c.cin=Math.max(-450,Math.min(0,-50-eml*105-bd.dry*72+bd.lift*72+ji.lift*62+moist.confluence*25+
      Math.max(0,c.td-60)*2.4+diurnal*18+(Math.random()-.5)*12));
    c.cape=calcCapePotential(c,lat,lon,bd,moist,ji,eml,diurnal);

    updateShear(c,lat,lon,Math.max(warm,moist.fetch*.95));

    c.lcl=Math.max(50,(c.temp-c.td)*125+(Math.random()-.5)*60);
    calcSTP(c);
  }
}

function capBreakFactor(cin){
  if(cin>-15)return .62;
  if(cin>-70)return 1;
  if(cin>-125)return .7;
  if(cin>-175)return .32;
  return 0;
}

function effectiveBulkShearTerm(shearKt){
  if(shearKt<25)return 0;
  return Math.min(1.5,shearKt/40);
}

function severeShearFactor(shearKt){
  if(shearKt<25)return 0;
  if(shearKt<38)return .25+(shearKt-25)/13*.55;
  if(shearKt<58)return .8+(shearKt-38)/20*.2;
  if(shearKt<78)return 1;
  return Math.max(.35,1-(shearKt-78)/45);
}

function tornadoLclFactor(lcl){
  if(lcl<500)return .92;
  if(lcl<1000)return 1;
  if(lcl<1500)return .65+(1500-lcl)/500*.35;
  if(lcl<2200)return .18+(2200-lcl)/700*.42;
  return .08;
}

function moistureFactor(c){
  return smoothstep(54,64,c.td||0);
}

function buoyancyFactor(cape){
  if(cape<500)return 0;
  if(cape<1500)return (cape-500)/1000;
  if(cape<3500)return 1+(cape-1500)/4000;
  return 1.5+Math.min(.45,(cape-3500)/5000);
}

function boundaryLiftScore(c){
  const bd=boundaryForcing(c.lat,c.lon,simMin);
  return Math.min(2.2,bd.dryline*.58+bd.front*.38+bd.triple*.86+
    (c.jetLift||0)*.42+(c.jetVent||0)*.1);
}

function stormModeFor(c,shearKt,coldPool=0){
  if(shearKt<32)return 'multicell';
  if((c.lcl||0)>1650||(c.td||0)<58)return 'lp';
  if(((c.td||0)>66&&(c.srh||0)>220)||coldPool>.72)return 'hp';
  return 'classic';
}

function calcSTP(c){
  if(c.cape<100||c.cin<-200){c.stp=0;return;}
  const shearKt=(c.shear||0)*1.94;
  const capeT=Math.max(0,Math.min(3,c.cape/1500));
  const srhT=Math.max(0,Math.min(3,c.srh/150));
  const shearT=effectiveBulkShearTerm(shearKt);
  const lclT=clamp01((2000-c.lcl)/1500);
  const ct=c.cin>-50?1:clamp01((200+c.cin)/150);
  const moistT=.85+moistureFactor(c)*.15;
  const jetSupport=1+Math.min(.32,(c.jetLift||0)*.11+(c.jetVent||0)*.07);
  c.stp=Math.max(0,Math.min(20,capeT*srhT*shearT*lclT*ct*moistT*jetSupport));
}

function updAtm(dtMin){
  const tH=(simMin/60)%24;
  const diurnal=Math.max(0,Math.sin((tH-8)*Math.PI/14));
  for(let j=0;j<GY;j++) for(let i=0;i<GX;i++){
    const c=cells[j][i];
    const{lat,lon}=c;
    const jet=jetWind(lat,lon,simMin);
    const ji=jetInfluence(lat,lon,simMin,jet);
    const jetBlend=1-Math.exp(-dtMin/25);
    c.ju=c.ju*(1-jetBlend)+jet.u*jetBlend;
    c.jv=c.jv*(1-jetBlend)+jet.v*jetBlend;
    const bd=boundaryForcing(lat,lon,simMin);
    const warm=bd.warm;
    const moist=gulfMoisture(lat,lon,simMin,bd,ji);
    const dp=Math.exp(-((lon-bd.dryL)**2)/6);
    const warmSector=warmSectorWeight(lat,lon,simMin,bd,moist);
    const lowCloud=(1-diurnal)*warmSector*(1-smoothstep(.55,1.35,ji.ventilation));
    const dryFrac=clamp01(1-smoothstep(-.75,1.05,bd.dryDist));
    const coldFrac=clamp01(bd.cold);
    const targetTd=44+moist.fetch*26+moist.confluence*4.8+warmSector*4+bd.eastDry*2.2-
      dryFrac*(22+diurnal*7)-coldFrac*12-Math.max(0,lat-39)*.8;
    const tdRate=.006+moist.fetch*.024+moist.jetPull*.012+warmSector*.01;
    const dryMix=dryFrac*(.012+diurnal*.045)+coldFrac*.018+Math.max(0,-bd.dryDist-.25)*diurnal*.018;
    c.td=Math.max(4,Math.min(79,c.td+(targetTd-c.td)*tdRate*dtMin-dryMix*dtMin));
    const westCool=Math.max(0,-104-lon)*1.05+Math.exp(-((lon+107)**2)/90-((lat-39)**2)/55)*7.5;
    const targetTemp=64+diurnal*13-(lat-34)*.5+(lon+98)*.12+dryFrac*(8+diurnal*8)+
      Math.max(0,-bd.dryDist)*diurnal*.8+bd.dryline*1.15+ji.lift*.45-
      coldFrac*(14+diurnal*3)-westCool*(.45+.55*dryFrac)-moist.fetch*(1.5+lowCloud*2.4)-lowCloud*3.5;
    c.temp=Math.max(35,Math.min(101,c.temp+(targetTemp-c.temp)*(.007+diurnal*.014)*dtMin+bd.dryline*.018*diurnal*dtMin));
    const targetLapse=Math.min(10.4,6.05+Math.exp(-((lon+101)**2)/500)*1.85+ji.ventilation*.22+bd.dry*.4+diurnal*.3);
    c.lapse=c.lapse+(targetLapse-c.lapse)*(1-Math.exp(-dtMin/75));
    const cinDelta=diurnal*(0.11+dp*.43+ji.lift*.78+bd.lift*.9+moist.confluence*.26+Math.max(0,c.td-63)*.035)-
      (1-diurnal)*0.055-bd.dry*.06-bd.cold*.08;
    c.cin=Math.min(0,c.cin+cinDelta*dtMin*.62);
    if(diurnal>0.05){
      const eml=Math.exp(-((lon+101)**2)/500);
      const moistFuel=Math.max(0,c.td-56)/17;
      const targetCape=calcCapePotential(c,lat,lon,bd,moist,ji,eml,diurnal);
      const capeBlend=1-Math.exp(-dtMin/48);
      c.cape=Math.max(0,Math.min(7800,c.cape*(1-capeBlend)+targetCape*capeBlend+
        diurnal*(moistFuel*.9+bd.lift*.62+moist.confluence*.42)*dtMin));
    }
    c.lcl=Math.max(50,(c.temp-c.td)*125);
    const lljF=tH>21||tH<6?1.4:0.8;
    const lowBlend=1-Math.exp(-dtMin/90);
    const axisPull=Math.exp(-((lon-moist.axis)**2)/10);
    c.wv=c.wv*(1-lowBlend)+(-17*lljF-10*axisPull*moist.fetch)*lowBlend+(Math.random()-.5)*0.08*Math.sqrt(dtMin);
    c.wu=c.wu*(1-lowBlend)+(-3-7*axisPull*moist.fetch)*lowBlend+(Math.random()-.5)*0.08*Math.sqrt(dtMin);
    updateShear(c,lat,lon,Math.max(warm,moist.fetch*.95));
    calcSTP(c);
  }
}

const refGrid=new Float32Array(RGX*RGY);
const velGrid=new Float32Array(RGX*RGY);
const velUGrid=new Float32Array(RGX*RGY);
const velVGrid=new Float32Array(RGX*RGY);
const zdrGrid=new Float32Array(RGX*RGY);
const ccGrid =new Float32Array(RGX*RGY);

function clearGrids(){
  refGrid.fill(0);velGrid.fill(0);velUGrid.fill(0);velVGrid.fill(0);zdrGrid.fill(0);ccGrid.fill(0);
}

function kmDeg(lat){
  const c=Math.cos(lat*Math.PI/180);
  return{dlon:1/(111*c),dlat:1/111};
}

function stormMotion(c,lat){
  const lowU=c.wu,lowV=-c.wv;
  const upperU=c.ju*.24,upperV=c.jv*.24;
  const su=upperU-lowU,sv=upperV-lowV;
  const sh=Math.hypot(su,sv)||1;
  const ji=jetInfluence(lat,c.lon??-97,simMin);
  const meanU=lowU*.42+c.ju*.22+5.5+ji.ventilation*1.6;
  const meanV=lowV*.38+c.jv*.18+4.8+ji.lift*2.4;
  const dev=3.5+Math.min(10,sh*.24)+ji.lift*1.1;
  const rmU=Math.max(7,meanU+(sv/sh)*dev*.55);
  const rmV=Math.max(3.5,meanV-(su/sh)*dev*.32);
  const ang=Math.atan2(rmV,rmU);
  const raw=Math.sqrt(rmU*rmU+rmV*rmV);
  const speedKmh=Math.max(34,Math.min(112,raw*2.15+ji.jet.speed*.12+ji.ventilation*2.8));
  const kmPerMin=speedKmh/60;
  const kd=kmDeg(lat);
  return{vlon:Math.cos(ang)*kmPerMin*kd.dlon,vlat:Math.sin(ang)*kmPerMin*kd.dlat,speedKmh};
}

function paintStorm(s){
  const kd=kmDeg(s.lat);
  const intF=Math.min(1,s.intensity/65);
  const head=Math.atan2(s.vlat,s.vlon);
  const DLon=RL-LL,DLat=TL-BL;
  const peakDbz=50+intF*24;
  const ffdDbz=31+intF*17;
  const rfdDbz=34+intF*15;
  const anvilDbz=10+intF*9;
  const vent=Math.max(0,Math.min(1.7,s.jetVent||0));
  const lift=Math.max(0,Math.min(1.8,s.jetLift||0));
  const streak=Math.max(0,Math.min(1.6,((s.jetSpeed||0)-90)/75));
  const hp=s.mode==='hp'?1:0,lp=s.mode==='lp'?1:0,multi=s.mode==='multicell'?1:0;
  const jetShape=1+vent*.12+streak*.08;
  const coreKm=(4+intF*7.5+lift*.55)*(1+hp*.12-lp*.12+multi*.32);
  const ffdLen=(28+intF*60)*jetShape*(1+hp*.18-lp*.12-multi*.22);
  const ffdW=(9+intF*19)*(1+lift*.04)*(1+hp*.26-lp*.22+multi*.28);
  const rfdKm=(9+intF*18)*(1+lift*.07)*(1+hp*.1-multi*.2);
  const hookR=coreKm*(2.1+intF*.55)*(1+lift*.18+hp*.08-multi*.55);
  const anvilKm=(36+intF*72)*(1+vent*.14+streak*.12+lp*.12);

  function blob(cx,cy,ax,ay,rot,peak,bg,nAmt){
    const bx=Math.max(ax,ay)*1.5;
    const i0=Math.max(0,Math.floor((cx-bx-LL)/DLon*(RGX-1)));
    const i1=Math.min(RGX-1,Math.ceil((cx+bx-LL)/DLon*(RGX-1)));
    const j0=Math.max(0,Math.floor((cy-bx-BL)/DLat*(RGY-1)));
    const j1=Math.min(RGY-1,Math.ceil((cy+bx-BL)/DLat*(RGY-1)));
    const cr=Math.cos(rot),sr=Math.sin(rot);
    for(let jj=j0;jj<=j1;jj++){
      const lat2=BL+jj/(RGY-1)*DLat;
      for(let ii=i0;ii<=i1;ii++){
        const lon2=LL+ii/(RGX-1)*DLon;
        const dx=lon2-cx,dy=lat2-cy;
        const lx=cr*dx+sr*dy,ly=-sr*dx+cr*dy;
        const edge=nAmt?(nAmt*.7*Math.sin(ii*.42+jj*.31+s.noiseOff)+nAmt*.38*Math.sin(ii*.17-jj*.29+s.noiseOff*1.9)):0;
        const nd=edge*(.35+.65*Math.min(1,Math.sqrt(lx*lx+ly*ly)/Math.max(ax,ay)));
        const dn=(lx/ax)**2+(ly/ay)**2+nd;
        if(dn>1.02)continue;
        const t=Math.pow(Math.max(0,1-dn),1.25);
        const dbz=bg+(peak-bg)*t*t;
        const idx=jj*RGX+ii;
        if(dbz>refGrid[idx]){
          refGrid[idx]=dbz;
          zdrGrid[idx]=dbz>50?2.0+intF*3:dbz>35?1.2:0.4;
          ccGrid[idx]=s.hasTorn&&s.tStr>.25&&dn<0.12?0.55+Math.random()*.22:0.92+Math.random()*.07;
        }
      }
    }
  }

  function hookArc(cx,cy,rln,rlt,a0,a1,wln,peak){
    for(let si=0;si<=40;si++){
      const a=a0+(a1-a0)*si/40;
      blob(cx+Math.cos(a)*rln,cy+Math.sin(a)*rlt,wln,wln*.62,a,peak,peak-16,.035);
    }
  }

  function carve(cx,cy,ax,ay,rot,amt){
    const bx=Math.max(ax,ay)*1.3;
    const i0=Math.max(0,Math.floor((cx-bx-LL)/DLon*(RGX-1)));
    const i1=Math.min(RGX-1,Math.ceil((cx+bx-LL)/DLon*(RGX-1)));
    const j0=Math.max(0,Math.floor((cy-bx-BL)/DLat*(RGY-1)));
    const j1=Math.min(RGY-1,Math.ceil((cy+bx-BL)/DLat*(RGY-1)));
    const cr=Math.cos(rot),sr=Math.sin(rot);
    for(let jj=j0;jj<=j1;jj++){
      const lat2=BL+jj/(RGY-1)*DLat;
      for(let ii=i0;ii<=i1;ii++){
        const lon2=LL+ii/(RGX-1)*DLon;
        const dx=lon2-cx,dy=lat2-cy;
        const lx=cr*dx+sr*dy,ly=-sr*dx+cr*dy;
        const dn=(lx/ax)**2+(ly/ay)**2;
        if(dn>=1)continue;
        const idx=jj*RGX+ii;
        refGrid[idx]=Math.max(0,refGrid[idx]-amt*(1-dn)*(1-dn));
      }
    }
  }

  const anvA=head+.18;
  blob(s.lon+Math.cos(anvA)*anvilKm*.82*kd.dlon,s.lat+Math.sin(anvA)*anvilKm*.82*kd.dlat,
       anvilKm*kd.dlon*1.15,anvilKm*.3*kd.dlat,head+.06,anvilDbz,3,.12);

  const ffdA=head+.62;
  blob(s.lon+Math.cos(ffdA)*ffdLen*.55*kd.dlon,s.lat+Math.sin(ffdA)*ffdLen*.55*kd.dlat,
       ffdLen*kd.dlon,ffdW*kd.dlat,ffdA,ffdDbz,12,.08);

  blob(s.lon+Math.cos(ffdA)*ffdLen*.25*kd.dlon,s.lat+Math.sin(ffdA)*ffdLen*.25*kd.dlat,
       ffdLen*.28*kd.dlon,ffdW*.52*kd.dlat,ffdA-.16,peakDbz-4,30,.035);

  const rfdA=head-Math.PI*.72;
  blob(s.lon+Math.cos(rfdA)*rfdKm*.6*kd.dlon,s.lat+Math.sin(rfdA)*rfdKm*.6*kd.dlat,
       rfdKm*.64*kd.dlon,rfdKm*.38*kd.dlat,head-.32,rfdDbz,17,.06);

  if(!multi){
    hookArc(s.lon,s.lat,hookR*kd.dlon,hookR*kd.dlat,
            head+Math.PI*.65,head+Math.PI*1.72,coreKm*.28*kd.dlon,peakDbz-3);
  }else{
    blob(s.lon-Math.cos(head)*coreKm*.85*kd.dlon,s.lat-Math.sin(head)*coreKm*.85*kd.dlat,
         coreKm*.78*kd.dlon,coreKm*.52*kd.dlat,head+.4,peakDbz-8,22,.08);
  }

  blob(s.lon,s.lat,coreKm*.74*kd.dlon,coreKm*.96*kd.dlat,head+.2,peakDbz,peakDbz-18,.025);

  const notchA=head-Math.PI*.55;
  if(!multi){
    carve(s.lon+Math.cos(notchA)*coreKm*.88*kd.dlon,s.lat+Math.sin(notchA)*coreKm*.88*kd.dlat,
          coreKm*.82*kd.dlon,coreKm*.46*kd.dlat,head-.22,48+intF*18);
  }

  const mesoKm=coreKm;
  const rA=head-Math.PI/2;
  const mCx=s.lon+Math.cos(rA)*mesoKm*.4*kd.dlon;
  const mCy=s.lat+Math.sin(rA)*mesoKm*.4*kd.dlat;
  const shearKt=s.shearKt||42;
  const rotEnv=severeShearFactor(shearKt)*(.55+Math.min(1.25,(s.srh||0)/320)*.45);
  const modeRot=multi?.38:lp?.72:hp?.9:1;
  const cycleRot=s.cycling?1.12:1;
  const tornRot=s.hasTorn?1.28+(s.tStr||0)*.7+(s.tEF||0)*.15:1;
  const stormVar=s.rotSeed||1;
  const rotMax=Math.min(112,(10+intF*30+rotEnv*24+(s.stp||0)*2.2)*modeRot*cycleRot*tornRot*stormVar);
  const mScan=mesoKm*(2.15+rotEnv*1.15+hp*.45-multi*.45);
  const transU=(s.vlon/kd.dlon)*16.667;
  const transV=(s.vlat/kd.dlat)*16.667;
  const inflowDir=head+Math.PI*.7+(s.velPhase||0)*.18;
  const mi0=Math.max(0,Math.floor((mCx-mScan*kd.dlon-LL)/DLon*(RGX-1)));
  const mi1=Math.min(RGX-1,Math.ceil((mCx+mScan*kd.dlon-LL)/DLon*(RGX-1)));
  const mj0=Math.max(0,Math.floor((mCy-mScan*kd.dlat-BL)/DLat*(RGY-1)));
  const mj1=Math.min(RGY-1,Math.ceil((mCy+mScan*kd.dlat-BL)/DLat*(RGY-1)));
  for(let jj=mj0;jj<=mj1;jj++){
    for(let ii=mi0;ii<=mi1;ii++){
      const lon2=LL+ii/(RGX-1)*DLon,lat2=BL+jj/(RGY-1)*DLat;
      const dxKm=(lon2-mCx)/kd.dlon,dyKm=(lat2-mCy)/kd.dlat;
      const dist=Math.sqrt(dxKm*dxKm+dyKm*dyKm);
      if(dist>mScan)continue;
      const angC=Math.atan2(dyKm,dxKm);
      const ring=dist/Math.max(1,mScan*.42);
      const rot=rotMax*Math.min(1,ring)*Math.exp(-Math.max(0,ring-1)*.72)*Math.max(0,1-dist/mScan*.18);
      const conv=(4+intF*8+hp*3-multi*2)*Math.max(0,1-dist/mScan);
      const inflowGate=Math.max(0,Math.cos(angC-inflowDir));
      const inflow=(5+intF*11)*(s.inflow??1)*inflowGate*Math.max(0,1-dist/mScan);
      const turb=(Math.sin(ii*.37+jj*.19+s.noiseOff)*1.8+Math.sin(ii*.12-jj*.27+s.noiseOff*1.7)*1.2)*intF;
      const u=transU*.68-Math.sin(angC)*rot-Math.cos(angC)*conv+Math.cos(inflowDir)*inflow+Math.cos(head)*turb;
      const v=transV*.68+Math.cos(angC)*rot-Math.sin(angC)*conv+Math.sin(inflowDir)*inflow+Math.sin(head)*turb;
      const idx=jj*RGX+ii;
      if(Math.hypot(u,v)>Math.hypot(velUGrid[idx],velVGrid[idx])){
        velUGrid[idx]=u;
        velVGrid[idx]=v;
        velGrid[idx]=rot*Math.max(0,1-dist/mScan);
      }
    }
  }
}

const storms=[],tpaths=[],rpts=[];
let nTorn=0,totalRpts=0;

function mkStorm(lat,lon,cape,srh,cin){
  if(!proj)return null;
  const p=proj([lon,lat]);if(!p)return null;
  const gi=Math.min(GX-1,Math.max(0,Math.round((lon-LL)/(RL-LL)*(GX-1))));
  const gj=Math.min(GY-1,Math.max(0,Math.round((lat-BL)/(TL-BL)*(GY-1))));
  const c=cells[gj]?.[gi]||{lat,lon,wu:-4,wv:-20,ju:90,jv:-5,shear:20,cape,srh,cin,td:60,lcl:1200,jetLift:0,jetVent:0,jetSpeed:90};
  const mot=stormMotion(c,lat);
  const shearKt=(c.shear||0)*1.94;
  const capeF=buoyancyFactor(c.cape);
  const shearF=severeShearFactor(shearKt);
  const force=boundaryLiftScore(c);
  const mode=stormModeFor(c,shearKt,0);
  return{lat,lon,px:p[0],py:p[1],
    vlon:mot.vlon,vlat:mot.vlat,speedKmh:mot.speedKmh,
    intensity:5+capeF*8+shearF*8+force*2,
    maxI:24+capeF*20+Math.min(1.6,srh/250)*7+shearF*16+(c.jetLift||0)*5+(c.jetVent||0)*3,
    age:0,cape,srh,cin,
    shearKt,stp:c.stp||0,lcl:c.lcl||1200,
    jetLift:c.jetLift||0,jetVent:c.jetVent||0,jetSpeed:c.jetSpeed||0,
    mode,coldPool:.12,inflow:1,
    rotSeed:.72+Math.random()*.72,velPhase:Math.random()*Math.PI*2,
    hasTorn:false,tAge:0,tStr:0,tEF:0,tLife:0,
    noiseOff:Math.random()*200,noiseSpd:.04+Math.random()*.05,
    cycleN:0,nextCycle:42+Math.random()*70,cycleAge:99,cycling:false};
}

function stormEnvScore(c){
  const bd=boundaryForcing(c.lat,c.lon,simMin);
  if(bd.warm<.18||c.cape<650||c.cin<-210||c.td<50)return 0;
  const shearKt=(c.shear||0)*1.94;
  const forceT=boundaryLiftScore(c);
  if(forceT<.25&&c.cin<-25)return 0;
  const capeT=buoyancyFactor(c.cape);
  const capT=capBreakFactor(c.cin);
  const shearT=severeShearFactor(shearKt);
  const lclT=tornadoLclFactor(c.lcl);
  const moistT=moistureFactor(c);
  const srhT=.62+Math.min(.95,c.srh/320);
  const discreteT=c.cin>-10?.58:1;
  return capeT*capT*shearT*(.55+moistT*.45)*(.65+lclT*.35)*srhT*Math.min(1.8,forceT)*discreteT;
}

function stormSpacingOk(c,minKm){
  const kd=kmDeg(c.lat);
  return !storms.some(s=>Math.hypot((s.lon-c.lon)/kd.dlon,(s.lat-c.lat)/kd.dlat)<minKm);
}

function spawnStorm(dtMin){
  if(storms.length>=12)return;
  let best=null;
  for(let a=0;a<70;a++){
    const j=Math.floor(Math.random()*GY),i=Math.floor(Math.random()*GX);
    const c=cells[j]?.[i];
    if(!c)continue;
    const bd=boundaryForcing(c.lat,c.lon,simMin);
    const boundaryBias=bd.dryline+bd.front*.65+bd.triple*1.15;
    if(boundaryBias<.18&&Math.random()<.86)continue;
    const score=stormEnvScore(c);
    if(score<=0)continue;
    const minSpacing=120+Math.max(0,1.45-score)*36;
    if(!stormSpacingOk(c,minSpacing))continue;
    const weighted=score*(.82+Math.min(.7,boundaryBias*.22)+Math.random()*.12);
    if(weighted>.26&&(!best||weighted>best.score))best={c,score:weighted};
  }
  if(!best)return;
  const chance=Math.min(.12,dtMin*(.006+best.score*.026));
  if(Math.random()>chance)return;
  const ns=mkStorm(best.c.lat,best.c.lon,best.c.cape,best.c.srh,best.c.cin);
  if(ns)storms.push(ns);
}

function seedInitialStorms(){
  if(storms.length>0)return;
  const seedCands=[];
  for(let j=0;j<GY;j++)for(let i=0;i<GX;i++){
    const c=cells[j]?.[i];
    if(!c||c.lon<-104||c.lon>-90||c.lat<30||c.lat>42)continue;
    const score=stormEnvScore(c);
    if(score<.42)continue;
    const bd=boundaryForcing(c.lat,c.lon,simMin);
    seedCands.push({c,score:score+c.stp*.2+bd.triple*.36+bd.dryline*.18+(c.jetLift||0)*.2+Math.random()*.16});
  }
  seedCands.sort((a,b)=>b.score-a.score);
  for(const{c}of seedCands){
    if(storms.length>=5)break;
    if(!stormSpacingOk(c,125))continue;
    const ns=mkStorm(c.lat,c.lon,c.cape,c.srh,c.cin);
    if(!ns)continue;
    ns.age=25+Math.random()*70;
    ns.intensity=Math.min(ns.maxI,ns.intensity+6+Math.random()*12);
    ns.cycling=ns.age>45&&Math.random()<.45;
    ns.cycleAge=ns.cycling?5+Math.random()*14:99;
    ns.nextCycle=ns.age+34+Math.random()*65;
    storms.push(ns);
  }
}

function applyStormFeedback(s,dtMin){
  if(s.age<12||s.intensity<10)return;
  const kd=kmDeg(s.lat);
  const cp=s.coldPool||0;
  const radius=Math.min(110,32+s.intensity*.75+cp*24);
  const i0=Math.max(0,Math.floor((s.lon-radius*kd.dlon-LL)/(RL-LL)*(GX-1)));
  const i1=Math.min(GX-1,Math.ceil((s.lon+radius*kd.dlon-LL)/(RL-LL)*(GX-1)));
  const j0=Math.max(0,Math.floor((s.lat-radius*kd.dlat-BL)/(TL-BL)*(GY-1)));
  const j1=Math.min(GY-1,Math.ceil((s.lat+radius*kd.dlat-BL)/(TL-BL)*(GY-1)));
  const mvx=s.vlon/kd.dlon,mvy=s.vlat/kd.dlat,ml=Math.hypot(mvx,mvy)||1;
  const ux=mvx/ml,uy=mvy/ml,intF=Math.min(1,s.intensity/60);
  for(let j=j0;j<=j1;j++)for(let i=i0;i<=i1;i++){
    const c=cells[j]?.[i];if(!c)continue;
    const dx=(c.lon-s.lon)/kd.dlon,dy=(c.lat-s.lat)/kd.dlat;
    const dist=Math.hypot(dx,dy);if(dist>radius)continue;
    const along=dx*ux+dy*uy;
    const wake=Math.exp(-(dist*dist)/(radius*radius*.42))*(along<12?1:.18);
    const edge=Math.exp(-((dist-radius*.52)**2)/(radius*radius*.035))*(along>-radius*.75?1:.45);
    c.temp=Math.max(35,c.temp-dtMin*wake*(.026+intF*.04+cp*.035));
    c.td=Math.max(5,c.td-dtMin*wake*(.006+intF*.011)+edge*dtMin*(.004+intF*.006));
    c.cape=Math.max(0,c.cape*Math.exp(-dtMin*wake*(.0015+intF*.0016+cp*.0012)));
    c.cape=Math.min(9000,c.cape+edge*dtMin*(.35+intF*.7));
    c.cin=Math.min(0,c.cin-dtMin*wake*(.1+intF*.26+cp*.16)+edge*dtMin*(.08+intF*.18));
    c.srh=Math.max(0,Math.min(1000,c.srh+edge*dtMin*(.35+intF*.75)));
    c.lcl=Math.max(50,(c.temp-c.td)*125);
    calcSTP(c);
  }
}

function updStorms(dtMin){
  nTorn=0;
  for(const s of storms){
    s.lon+=s.vlon*dtMin;s.lat+=s.vlat*dtMin;
    if(s.lon<LL+1||s.lon>RL-1||s.lat<BL+1||s.lat>TL-1){s.intensity*=Math.exp(-dtMin/12);continue;}
    const p=proj?proj([s.lon,s.lat]):null;if(p){s.px=p[0];s.py=p[1];}
    const gi=Math.min(GX-1,Math.max(0,Math.round((s.lon-LL)/(RL-LL)*(GX-1))));
    const gj=Math.min(GY-1,Math.max(0,Math.round((s.lat-BL)/(TL-BL)*(GY-1))));
    const c=cells[gj]?.[gi];
    s.age+=dtMin;s.noiseOff+=s.noiseSpd*dtMin;
    if(c){
      const mot=stormMotion(c,s.lat);
      const turnBlend=1-Math.exp(-dtMin/12);
      s.vlon=s.vlon*(1-turnBlend)+mot.vlon*turnBlend;
      s.vlat=s.vlat*(1-turnBlend)+mot.vlat*turnBlend;
      s.speedKmh=mot.speedKmh;
      s.jetLift=c.jetLift||0;
      s.jetVent=c.jetVent||0;
      s.jetSpeed=c.jetSpeed||0;
      const shearKt=(c.shear||0)*1.94;
      s.cape=c.cape;
      s.srh=c.srh;
      s.cin=c.cin;
      s.stp=c.stp||0;
      s.lcl=c.lcl||1200;
      s.shearKt=shearKt;
      const mature=s.age<18?0:s.age<45?(s.age-18)/27:s.age<210?1:Math.max(0,1-(s.age-210)/110);
      const capFactor=capBreakFactor(c.cin);
      const shearFactor=severeShearFactor(shearKt);
      const lclFactor=tornadoLclFactor(c.lcl);
      const moistFactor=moistureFactor(c);
      const force=boundaryLiftScore(c);
      const targetCold=clamp01((s.intensity/62)*(1.16-shearFactor*.36)*
        (.72+Math.max(0,c.lcl-900)/2300+Math.max(0,62-c.td)/38+(s.mode==='hp'? .18:0)));
      const coldBlend=1-Math.exp(-dtMin/28);
      s.coldPool=(s.coldPool||0)*(1-coldBlend)+targetCold*coldBlend;
      const coldBalance=clamp01(1-Math.max(0,s.coldPool-(.45+shearFactor*.38))*1.1);
      const gustBoost=1+Math.min(.18,Math.max(0,s.coldPool-.25)*.22);
      const inflow=capFactor*shearFactor*(.55+moistFactor*.45)*coldBalance;
      s.inflow=inflow;
      const ingest=(buoyancyFactor(c.cape)*.62+Math.min(1.4,c.srh/300)*.18+
        force*.26+(c.jetLift||0)*.16+(c.jetVent||0)*.12)*mature*inflow*gustBoost;
      const undercut=Math.max(0,s.coldPool-(.65+shearFactor*.22));
      const decayBase=95+Math.min(70,(c.jetVent||0)*36)+shearFactor*34;
      const decay=Math.exp(-dtMin/(decayBase/(1+undercut*1.4)));
      s.maxI=22+buoyancyFactor(c.cape)*21+Math.min(1.6,c.srh/250)*8+
        shearFactor*18+(c.jetLift||0)*5+(c.jetVent||0)*3;
      s.intensity=Math.min(s.maxI,Math.max(0,s.intensity*decay+ingest*dtMin*.45-undercut*dtMin*.13));
      if(s.age>20)s.mode=stormModeFor(c,shearKt,s.coldPool);
      if(!Number.isFinite(s.cycleAge))s.cycleAge=99;
      s.cycleAge+=dtMin;
      if(s.age>=s.nextCycle&&s.intensity>20&&shearFactor>.45){
        s.cycleN++;
        s.cycling=true;
        s.cycleAge=0;
        s.intensity=Math.min(s.maxI,s.intensity*(.9+Math.random()*.12)+(c.jetLift||0)*.65);
        s.nextCycle=s.age+Math.max(26,42+Math.random()*72-(c.jetLift||0)*7-shearFactor*6);
      }
      if(s.cycleAge>30)s.cycling=false;
      let cycleWindow=.68;
      if(s.cycling)cycleWindow=s.cycleAge<3?.72:s.cycleAge<18?1.35:s.cycleAge<28?.9:.62;
      const torIndex=Math.max(0,c.stp-.35)*Math.min(1.35,s.intensity/45)*lclFactor*
        coldBalance*capFactor*(.65+Math.min(1.1,c.srh/260))*cycleWindow*mature;
      if(!s.hasTorn&&s.intensity>28&&torIndex>.22&&s.mode!=='multicell'){
        if(Math.random()<Math.min(.16,torIndex*.0075*dtMin)){
          s.hasTorn=true;s.tAge=0;s.tStr=0;
          s.tEF=Math.min(5,Math.max(0,Math.floor((torIndex*.9+c.stp*.22+s.intensity/38+Math.random()*1.1)/1.9)));
          s.tLife=6+Math.random()*32+Math.min(20,c.srh/34);
          totalRpts++;
          rpts.push({lat:s.lat,lon:s.lon,ef:s.tEF,age:0,px:s.px,py:s.py});
          tpaths.push({pts:[{lat:s.lat,lon:s.lon,px:s.px,py:s.py}],ef:s.tEF,active:true,sr:s,age:0,lastPtAge:0});
        }
      }
      if(s.hasTorn){
        s.tAge+=dtMin;
        const fr=s.tAge/s.tLife;
        const envStr=clamp01(torIndex/4);
        s.tStr=Math.min(1,s.tAge/4)*(fr<.65?1:Math.max(0,1-(fr-.65)/.35))*(.75+envStr*.35);
        if(s.tAge>=s.tLife||coldBalance<.18||c.cin<-190)s.hasTorn=false;
      }
    }
    applyStormFeedback(s,dtMin);
    if(s.hasTorn)nTorn++;
  }
  for(const tp of tpaths){
    tp.age+=dtMin;
    if(tp.active&&tp.sr.hasTorn){
      if(tp.age-(tp.lastPtAge||0)>.25){
        tp.pts.push({lat:tp.sr.lat,lon:tp.sr.lon,px:tp.sr.px,py:tp.sr.py});
        tp.lastPtAge=tp.age;
      }
    }
    else tp.active=false;
  }
  for(const r of rpts){r.age+=dtMin;if(proj){const p=proj([r.lon,r.lat]);if(p){r.px=p[0];r.py=p[1];}}}
  for(let i=storms.length-1;i>=0;i--)if(storms[i].intensity<1)storms.splice(i,1);
  for(let i=tpaths.length-1;i>=0;i--)if(!tpaths[i].active&&tpaths[i].age>240)tpaths.splice(i,1);
}

const DBZ_LUT=new Uint32Array(256);
function hexToABGR(h){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return(255<<24)|(b<<16)|(g<<8)|r;
}
(()=>{

    [50,'#fd9500'],[55,'#fd0000'],[60,'#d40000'],[65,'#bc0000'],[70,'#f800fd'],[75,'#9854c6']];
  for(let d=0;d<256;d++){

})();

function velCol32(v){
  if(Math.abs(v)<2)return 0;
  const t=Math.min(1,Math.abs(v)/72);
  if(v<0){const g=Math.round(70+t*185);return(255<<24)|(0<<16)|(g<<8)|0;}
  else{const r=Math.round(70+t*185);return(255<<24)|(0<<16)|(0<<8)|r;}
}
function zdrCol32(v){
  if(v<0.4)return 0;if(v<1.5)return hexToABGR('#0300f4');
  if(v<2.5)return hexToABGR('#02fd02');if(v<3.5)return hexToABGR('#fdf802');
  return hexToABGR('#f800fd');
}
function ccCol32(v){
  if(v<0.3)return 0;if(v>0.97)return hexToABGR('#04e9e7');
  if(v>0.93)return hexToABGR('#02fd02');if(v>0.88)return hexToABGR('#fdf802');
  if(v>0.80)return hexToABGR('#fd9500');return hexToABGR('#f800fd');
}

function lc(a,b,t){
  t=Math.max(0,Math.min(1,t));
  return'#'+[0,2,4].map(i=>{const A=parseInt(a.slice(1+i,3+i),16),B=parseInt(b.slice(1+i,3+i),16);
    return Math.round(A+(B-A)*t).toString(16).padStart(2,'0');}).join('');
}

function spcRisk(c){
  if(!c||c.cape<150)return 0;
  const shearKt=(c.shear||0)*1.94;
  const capT=capBreakFactor(c.cin);
  const lclT=tornadoLclFactor(c.lcl);
  const capeT=buoyancyFactor(c.cape);
  const srhT=Math.min(2.2,c.srh/180);
  const shearT=severeShearFactor(shearKt);
  const forcing=boundaryLiftScore(c);
  const moisture=moistureFactor(c);
  const coverage=stormEnvScore(c)*1.15+forcing*.22;
  const severe=capeT*shearT*capT*(.55+moisture*.45)*(.45+Math.min(1.1,forcing)*.55);
  const tornado=capeT*srhT*effectiveBulkShearTerm(shearKt)*lclT*capT*(1+Math.min(.3,(c.jetLift||0)*.12));
  return Math.max(0,coverage*1.2+severe*.92+tornado*.78+Math.sqrt(Math.max(0,c.stp))*1.12);
}

  if(prodMode==='jet'){

    if(jetKt<90)return lc('#111827','#1d4ed8',(jetKt-65)/25);
    if(jetKt<110)return lc('#1d4ed8','#06b6d4',(jetKt-90)/20);
    if(jetKt<130)return lc('#06b6d4','#facc15',(jetKt-110)/20);
    if(jetKt<155)return lc('#facc15','#f97316',(jetKt-130)/25);
    return lc('#f97316','#f8fafc',Math.min(1,(jetKt-155)/45));
  }
  if(prodMode==='shear'){
    if(shearKt<20)return null;
    if(shearKt<35)return lc('#102a43','#2b6cb0',(shearKt-20)/15);
    if(shearKt<45)return lc('#2b6cb0','#38a169',(shearKt-35)/10);
    if(shearKt<60)return lc('#38a169','#ecc94b',(shearKt-45)/15);
    if(shearKt<75)return lc('#ecc94b','#e53e3e',(shearKt-60)/15);
    return lc('#e53e3e','#faf5ff',Math.min(1,(shearKt-75)/25));
  }
  if(prodMode==='lcl'){
    if(lcl<250)return lc('#e0f7fa','#38bdf8',lcl/250);
    if(lcl<750)return lc('#38bdf8','#22c55e',(lcl-250)/500);
    if(lcl<1250)return lc('#22c55e','#facc15',(lcl-750)/500);
    if(lcl<2000)return lc('#facc15','#f97316',(lcl-1250)/750);
    return lc('#f97316','#7c2d12',Math.min(1,(lcl-2000)/1200));
  }
  if(prodMode==='cin'){
    if(cape<100&&cin<-300)return null;
    if(cin<-450)return lc('#2e1065','#111827',Math.min(1,(-cin-450)/300));
    if(cin<-250)return lc('#7f1d1d','#2e1065',(-cin-250)/200);
    if(cin<-150)return lc('#dc2626','#7f1d1d',(-cin-150)/100);
    if(cin<-75)return lc('#f97316','#dc2626',(-cin-75)/75);
    if(cin<-25)return lc('#facc15','#f97316',(-cin-25)/50);
    return lc('#2f855a','#facc15',Math.max(0,-cin)/25);
  }
  return null;
}

function smoothCell(i,j){
  let wSum=0,out={lat:0,lon:0,cape:0,cin:0,srh:0,stp:0,temp:0,td:0,shear:0,lcl:0,ju:0,jv:0,jetSpeed:0,jetLift:0,jetVent:0};
  for(let y=-1;y<=1;y++)for(let x=-1;x<=1;x++){
    const c=cells[j+y]?.[i+x];if(!c)continue;
    const w=(x===0&&y===0)?4:(x===0||y===0)?2:1;
    wSum+=w;
    out.lat+=c.lat*w;out.lon+=c.lon*w;
    out.cape+=c.cape*w;out.cin+=c.cin*w;out.srh+=c.srh*w;out.stp+=c.stp*w;
    out.temp+=c.temp*w;out.td+=c.td*w;out.shear+=c.shear*w;out.lcl+=c.lcl*w;
    out.ju+=c.ju*w;out.jv+=c.jv*w;out.jetSpeed+=(c.jetSpeed||Math.hypot(c.ju,c.jv))*w;
    out.jetLift+=(c.jetLift||0)*w;out.jetVent+=(c.jetVent||0)*w;
  }
  for(const k in out)out[k]/=wSum||1;
  return out;
}

function sampleAtmosphere(lat,lon){
  if(lat<BL||lat>TL||lon<LL||lon>RL)return null;
  const gx=(lon-LL)/(RL-LL)*(GX-1),gy=(lat-BL)/(TL-BL)*(GY-1);
  const i0=Math.max(0,Math.min(GX-1,Math.floor(gx)));
  const j0=Math.max(0,Math.min(GY-1,Math.floor(gy)));
  const i1=Math.min(GX-1,i0+1),j1=Math.min(GY-1,j0+1);
  const tx=gx-i0,ty=gy-j0;
  const out={lat,lon,cape:0,cin:0,srh:0,stp:0,temp:0,td:0,shear:0,lcl:0,ju:0,jv:0,jetSpeed:0,jetLift:0,jetVent:0};
  const add=(c,w)=>{
    if(!c)return;
    out.cape+=c.cape*w;out.cin+=c.cin*w;out.srh+=c.srh*w;out.stp+=c.stp*w;
    out.temp+=c.temp*w;out.td+=c.td*w;out.shear+=c.shear*w;out.lcl+=c.lcl*w;
    out.ju+=c.ju*w;out.jv+=c.jv*w;out.jetSpeed+=(c.jetSpeed||Math.hypot(c.ju,c.jv))*w;
    out.jetLift+=(c.jetLift||0)*w;out.jetVent+=(c.jetVent||0)*w;
  };
  add(cells[j0]?.[i0],(1-tx)*(1-ty));
  add(cells[j0]?.[i1],tx*(1-ty));
  add(cells[j1]?.[i0],(1-tx)*ty);
  add(cells[j1]?.[i1],tx*ty);
  return out;
}

function smoothScalarGrid(vals,w,h,passes=2){
  let src=vals,dst=new Float32Array(vals.length);
  for(let p=0;p<passes;p++){
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      let sum=0,ws=0;
      for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++){
        const nx=x+xx,ny=y+yy;
        if(nx<0||ny<0||nx>=w||ny>=h)continue;
        const wt=(xx===0&&yy===0)?4:(xx===0||yy===0)?2:1;
        sum+=src[ny*w+nx]*wt;ws+=wt;
      }
      dst[y*w+x]=sum/ws;
    }
    const tmp=src;src=dst;dst=tmp;
  }
  return src;
}

function spcRiskGrid(){
  const vals=new Float32Array(GX*GY);
  for(let j=0;j<GY;j++)for(let i=0;i<GX;i++){
    const c=smoothCell(i,j);
    vals[j*GX+i]=spcRisk(c);
  }
  return smoothScalarGrid(vals,GX,GY,3);
}

  return Math.max(min,base/Math.pow(Math.max(.18,z),.55));
}

function pickSpacedSites(candidates,minDist,selectedId){
  const sorted=[...candidates].sort((a,b)=>{
    const as=a.site.id===selectedId,bs=b.site.id===selectedId;
    if(as!==bs)return as?-1:1;
    const ap=SITE_PRIORITY[a.site.id]??4,bp=SITE_PRIORITY[b.site.id]??4;
    if(ap!==bp)return ap-bp;
    return a.site.lon-b.site.lon||b.site.lat-a.site.lat;
  });
  const picked=[];
  for(const c of sorted){
    const isSel=c.site.id===selectedId;
    if(!isSel&&picked.some(p=>Math.hypot(c.px-p.px,c.py-p.py)<minDist))continue;
    picked.push(c);
  }
  return picked;
}

function cellForLatLon(lat,lon){
  const gi=Math.min(GX-1,Math.max(0,Math.round((lon-LL)/(RL-LL)*(GX-1))));
  const gj=Math.min(GY-1,Math.max(0,Math.round((lat-BL)/(TL-BL)*(GY-1))));
  return cells[gj]?.[gi]||null;
}

function tornadoThreatLevel(s){
  if(!s||!s.hasTorn)return 'tor';
  const c=cellForLatLon(s.lat,s.lon)||{};
  const threat=(s.tEF||0)+(s.tStr||0)*1.55+Math.max(0,(s.intensity||0)-45)/22+
    Math.min(1.4,(c.stp||0)/5)+Math.min(1,(c.srh||0)/350);
  if(((s.tEF||0)>=4&&(s.tStr||0)>.48)||threat>6.25)return 'emg';
  if(((s.tEF||0)>=3&&(s.tStr||0)>.32)||threat>4.75)return 'pds';
  return 'tor';
}

function drawWarningPolygon(storm,toPx,stroke='rgba(255,30,30,.9)',fill='rgba(200,0,0,.035)',lineWidth=1.6){
  const kd=kmDeg(storm.lat);
  const mvx=storm.vlon/kd.dlon,mvy=storm.vlat/kd.dlat;
  const ml=Math.hypot(mvx,mvy)||1;
  const fx=mvx/ml,fy=mvy/ml;
  const rx=-fy,ry=fx;
  const lenKm=64+Math.min(28,storm.speedKmh*.18);
  const halfKm=15+Math.min(8,storm.intensity*.08);
  const backKm=8;
  const corners=[
    [-backKm,-halfKm],
    [lenKm,-halfKm],
    [lenKm,halfKm],
    [-backKm,halfKm],
  ].map(([f,r])=>toPx(
    storm.lat+(fy*f+ry*r)*kd.dlat,
    storm.lon+(fx*f+rx*r)*kd.dlon
  )).filter(Boolean);
  if(corners.length<4)return;
  ox.beginPath();
  ox.moveTo(corners[0].x,corners[0].y);
  for(let i=1;i<corners.length;i++)ox.lineTo(corners[i].x,corners[i].y);
  ox.closePath();
  ox.strokeStyle=stroke;ox.lineWidth=lineWidth;ox.stroke();
  ox.fillStyle=fill;ox.fill();
}

function traceSPCContour(contour,ctx){
  let any=false;
  ctx.beginPath();
  for(const poly of contour.coordinates){
    for(const ring of poly){
      let started=false;
      for(const pt of ring){
        const gx=Math.max(0,Math.min(GX-1,pt[0]));
        const gy=Math.max(0,Math.min(GY-1,pt[1]));
        const lon=LL+gx/(GX-1)*(RL-LL);
        const lat=BL+gy/(GY-1)*(TL-BL);
        const pp=proj([lon,lat]);
        if(!pp){started=false;continue;}
        started?ctx.lineTo(pp[0],pp[1]):ctx.moveTo(pp[0],pp[1]);
        started=true;any=true;
      }
      if(started)ctx.closePath();
    }
  }
  return any;
}

function drawSPCLabels(vals,ctx){
  const placed=[];
  ctx.save();
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.font='800 12px Inter, sans-serif';
  for(let ci=SPC_CATS.length-1;ci>=0;ci--){
    const cat=SPC_CATS[ci],next=SPC_CATS[ci+1]?.thr??Infinity;
    let sx=0,sy=0,ws=0,count=0;
    for(let j=0;j<GY;j++)for(let i=0;i<GX;i++){
      const v=vals[j*GX+i];
      if(v<cat.thr||v>=next)continue;
      const w=Math.max(.2,Math.min(v,next)-cat.thr+.15);
      sx+=i*w;sy+=j*w;ws+=w;count++;
    }
    if(ws<=0||count<7)continue;
    const lon=LL+(sx/ws)/(GX-1)*(RL-LL);
    const lat=BL+(sy/ws)/(GY-1)*(TL-BL);
    const pp=proj([lon,lat]);if(!pp)continue;
    if(placed.some(p=>Math.hypot(p.x-pp[0],p.y-pp[1])<62))continue;
    placed.push({x:pp[0],y:pp[1]});
    ctx.lineWidth=4;
    ctx.strokeStyle='rgba(8,14,26,.78)';
    ctx.strokeText(cat.label,pp[0],pp[1]);
    ctx.fillStyle=cat.color;
    ctx.fillText(cat.label,pp[0],pp[1]);
  }
  ctx.restore();
}

function drawSPCOutlook(ctx, asOverlay=false){
  if(!proj||!window.d3||!d3.contours)return;
  const vals=spcRiskGrid();
  const contours=d3.contours().size([GX,GY]).smooth(true).thresholds(SPC_CATS.map(c=>c.thr))(vals);
  const cats=asOverlay?SPC_OVERLAY_CATS:SPC_CATS;
  ctx.save();
  ctx.lineJoin='round';
  ctx.lineCap='round';
  if(asOverlay){
    ctx.globalAlpha=0.82;
  }
  for(const contour of contours){
    const cat=cats.find(c=>c.thr===contour.value);
    if(!cat||!traceSPCContour(contour,ctx))continue;
    ctx.fillStyle=cat.fill;
    ctx.strokeStyle=cat.stroke;
    ctx.lineWidth=asOverlay?2.6:2.2;
    ctx.fill('evenodd');
    ctx.stroke();
  }
  ctx.globalAlpha=1;
  ctx.restore();
  drawSPCLabels(vals,ctx);
}

function drawField(){
  rx.clearRect(0,0,W,H);
  if(!proj)return;
  const step=natZoom>1.8?3:natZoom<.75?5:4;
  rx.save();
  rx.globalAlpha=.88;
  for(let y=HOFF;y<H;y+=step){
    for(let x=0;x<W;x+=step){
      const ll=proj.invert([x+step*.5,y+step*.5]);
      if(!ll)continue;
      const c=sampleAtmosphere(ll[1],ll[0]);
      if(!c)continue;
      const col=fieldColor(c);
      if(!col)continue;
      rx.fillStyle=col;
      rx.fillRect(x,y,step+1,step+1);
    }
  }
  rx.restore();
  if(spcOverlay) drawSPCOutlook(rx, true);
}

function getNatRadarCache(){
  if(natRadarCache&&natRadarCache.w===W&&natRadarCache.h===H)return natRadarCache;
  const len=W*H;
  const gi=new Float32Array(len),gj=new Float32Array(len);
  gi.fill(-1);gj.fill(-1);
  const DLon=RL-LL,DLat=TL-BL;
  for(let py=HOFF;py<H;py++){
    for(let px=0;px<W;px++){
      const ll=proj.invert([px+.5,py+.5]);
      if(!ll)continue;
      const lon=ll[0],lat=ll[1];
      if(lat<BL||lat>TL||lon<LL||lon>RL)continue;
      const off=py*W+px;
      gi[off]=(lon-LL)/DLon*(RGX-1);
      gj[off]=(lat-BL)/DLat*(RGY-1);
    }
  }
  natRadarCache={w:W,h:H,gi,gj};
  return natRadarCache;
}

function drawNatRadar(){
  rx.clearRect(0,0,W,H);
  if(!proj)return;
  const isVel=prodMode==='vel',isCc=prodMode==='cc';
  const cache=getNatRadarCache();
  const site=getSite();
  if(W<=0||H<=0||!Number.isFinite(W)||!Number.isFinite(H))return;
  const imgd=rx.createImageData(W,H);
  const u32=new Uint32Array(imgd.data.buffer);
  for(let off=HOFF*W;off<u32.length;off++){
    const gi=cache.gi[off];if(gi<0)continue;
    const gj=cache.gj[off];
    let col32=0;
    if(isVel){
      const v=sampleRadialVelocity(gi,gj,site);
      if(Math.abs(v)>2)col32=velCol32(v);
    }else if(isCc){
      const v=sampleGrid(ccGrid,gi,gj);
      if(v>0.3)col32=ccCol32(v);
    }else{
      const d=Math.floor(sampleGrid(refGrid,gi,gj));
      if(d>=5&&d<256)col32=DBZ_LUT[d];
    }
    if(col32)u32[off]=col32;
  }
  rx.putImageData(imgd,0,0);
  if(spcOverlay) drawSPCOutlook(rx, true);
}

function getScopeGeom(){
  const site=getSite();
  const cosLat=Math.max(.25,Math.cos(site.lat*Math.PI/180));
  const usableW=Math.max(280,W-24);
  const usableH=Math.max(220,H-HOFF-24);
  const rangeKm=MAX_NM*NM_KM;
  const pxPerKmBase=Math.min(usableW,usableH)/(rangeKm*2.15);
  const pxPerKm=pxPerKmBase*radarZoom;
  const displayR=rangeKm*pxPerKm;
  const cx=W/2+panX,cy=HOFF+(H-HOFF)/2+panY;
  return{site,cx,cy,displayR,pxPerKm,rangeKm,pxPerKmBase,cosLat};
}

function px2ll(px,py,g){
  const dxKm=(px-g.cx)/g.pxPerKm;
  const dyKm=(py-g.cy)/g.pxPerKm;
  return{lat:g.site.lat-dyKm/111,lon:g.site.lon+dxKm/(111*g.cosLat),
    distKm:Math.sqrt(dxKm*dxKm+dyKm*dyKm)};
}

function radarMapProjection(g){
  return d3.geoTransform({
    point(lon,lat){
      const p=ll2px(lat,lon,g);
      this.stream.point(p.x,p.y);
    }
  });
}

function sampleGrid(grid,gx,gy){
  if(gx<0||gy<0||gx>RGX-1||gy>RGY-1)return 0;
  const x0=Math.floor(gx),y0=Math.floor(gy);
  const x1=Math.min(RGX-1,x0+1),y1=Math.min(RGY-1,y0+1);
  const tx=gx-x0,ty=gy-y0;
  const a=grid[y0*RGX+x0],b=grid[y0*RGX+x1],c=grid[y1*RGX+x0],d=grid[y1*RGX+x1];
  return a*(1-tx)*(1-ty)+b*tx*(1-ty)+c*(1-tx)*ty+d*tx*ty;
}

function sampleRadialVelocity(gx,gy,site){
  const u=sampleGrid(velUGrid,gx,gy),v=sampleGrid(velVGrid,gx,gy);
  if(Math.hypot(u,v)<1.5)return 0;
  const lon=LL+gx/(RGX-1)*(RL-LL),lat=BL+gy/(RGY-1)*(TL-BL);
  const cosLat=Math.max(.25,Math.cos(site.lat*Math.PI/180));
  const dx=(lon-site.lon)*111*cosLat,dy=(lat-site.lat)*111;
  const dist=Math.hypot(dx,dy)||1;
  const beamU=dx/dist,beamV=dy/dist;
  const rangeAtten=dist<18?.62+dist/18*.38:dist>230?Math.max(.65,1-(dist-230)/220):1;
  return (u*beamU+v*beamV)*rangeAtten;
}

function drawPPI(){
  rx.clearRect(0,0,W,H);
  const g=getScopeGeom();if(!g)return;
  const{cx,cy,displayR,rangeKm}=g;
  const isVel=prodMode==='vel',isZdr=prodMode==='zdr',isCc=prodMode==='cc';
  const DLon=RL-LL,DLat=TL-BL;
  const x0=Math.max(0,Math.floor(cx-displayR));
  const x1=Math.min(W-1,Math.ceil(cx+displayR));
  const y0=Math.max(HOFF,Math.floor(cy-displayR));
  const y1=Math.min(H-1,Math.ceil(cy+displayR));
  if(x1<=x0||y1<=y0)return;
  const bw=x1-x0+1,bh=y1-y0+1;
  if(bw<=0||bh<=0||!Number.isFinite(bw)||!Number.isFinite(bh))return;
  const imgd=rx.createImageData(bw,bh);
  const u32=new Uint32Array(imgd.data.buffer);
  for(let py=y0;py<=y1;py++){
    for(let px=x0;px<=x1;px++){
      const pt=px2ll(px,py,g);
      if(pt.distKm>rangeKm)continue;
      const lat2=pt.lat,lon2=pt.lon;
      if(lat2<BL||lat2>TL||lon2<LL||lon2>RL)continue;
      const gi=(lon2-LL)/DLon*(RGX-1);
      const gj=(lat2-BL)/DLat*(RGY-1);
      let col32=0;
      if(isVel){const v=sampleRadialVelocity(gi,gj,g.site);if(Math.abs(v)>2)col32=velCol32(v);}
      else if(isZdr){const v=sampleGrid(zdrGrid,gi,gj);if(v>0.3)col32=zdrCol32(v);}
      else if(isCc){const v=sampleGrid(ccGrid,gi,gj);if(v>0.3)col32=ccCol32(v);}
      else{const d=Math.floor(sampleGrid(refGrid,gi,gj));if(d>=5&&d<256)col32=DBZ_LUT[d];}
      if(col32)u32[(py-y0)*bw+(px-x0)]=col32;
    }
  }
  rx.putImageData(imgd,x0,y0);
  if(spcOverlay) drawSPCOutlook(rx, true);
}

const EFCOL=['#ffff50','#ffb030','#ff6010','#ff1010','#cc0000','#880088'];

function drawOverlay(){
  ox.clearRect(0,0,W,H);
  if(viewMode==='national')drawNatOverlay();
  else drawPPIOverlay();
}

function drawJetStream(toPx,inView){
  const pts=[];
  for(let lon=LL+1;lon<=RL-1;lon+=.55){
    const lat=jetCoreLat(lon,simMin);
    const p=toPx(lat,lon);
    if(!p)continue;
    if(inView&&!inView(lat,lon,p))continue;
    if(p.x<-120||p.x>W+120||p.y<HOFF-120||p.y>H+120)continue;
    pts.push(p);
  }
  if(pts.length<3)return;
  function trace(){
    ox.beginPath();
    ox.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++)ox.lineTo(pts[i].x,pts[i].y);
  }
  ox.save();
  ox.lineCap='round';ox.lineJoin='round';
  trace();ox.strokeStyle='rgba(45,190,255,.12)';ox.lineWidth=13;ox.stroke();
  trace();ox.strokeStyle='rgba(95,215,255,.28)';ox.lineWidth=6;ox.stroke();
  ox.setLineDash([12,10]);ox.lineDashOffset=-(simMin*.35);
  trace();ox.strokeStyle='rgba(230,250,255,.58)';ox.lineWidth=1.4;ox.stroke();
  ox.setLineDash([]);
  const shift=Math.floor((simMin*.18)%12);
  for(let i=6+shift;i<pts.length-2;i+=12){
    const a=pts[i],b=pts[i+1];
    const ang=Math.atan2(b.y-a.y,b.x-a.x),sz=6;
    ox.beginPath();
    ox.moveTo(b.x,b.y);
    ox.lineTo(b.x-sz*Math.cos(ang-.55),b.y-sz*Math.sin(ang-.55));
    ox.lineTo(b.x-sz*Math.cos(ang+.55),b.y-sz*Math.sin(ang+.55));
    ox.closePath();
    ox.fillStyle='rgba(230,250,255,.62)';ox.fill();
  }
  ox.restore();
}

function drawNatOverlay(){
  if(!proj)return;
  if(prodMode==='jet'){
    drawJetStream((lat,lon)=>{
      const pp=proj([lon,lat]);
      return pp?{x:pp[0],y:pp[1]}:null;
    });
  }
  for(const city of CITIES){
    if(city.pop<2)continue;
    const pp=proj([city.lon,city.lat]);if(!pp)continue;
    if(pp[0]<0||pp[0]>W||pp[1]<HOFF||pp[1]>H)continue;
    const r=city.pop>=3?3:2;
    ox.beginPath();ox.arc(pp[0],pp[1],r,0,Math.PI*2);
    ox.fillStyle=city.pop>=3?'rgba(230,230,190,.65)':'rgba(170,170,130,.45)';ox.fill();
    ox.font=`${city.pop>=3?'bold ':''}${city.pop>=3?8:7}px Courier New`;
    ox.fillStyle=city.pop>=3?'rgba(220,220,180,.7)':'rgba(160,160,120,.5)';
    ox.fillText(city.n,pp[0]+r+2,pp[1]+3);
  }
  if(!isRadarProduct()&&storms.length>0){
    ox.beginPath();let f=true;
    for(const[lo,la]of[[-104,30.5],[-94,30.5],[-87,44.5],[-99,44.5]]){
      const pp=proj([lo,la]);if(!pp)continue;
      f?ox.moveTo(pp[0],pp[1]):ox.lineTo(pp[0],pp[1]);f=false;
    }
    ox.closePath();
    ox.strokeStyle='rgba(255,215,0,.4)';ox.lineWidth=1.4;ox.setLineDash([5,4]);ox.stroke();ox.setLineDash([]);
    ox.fillStyle='rgba(255,215,0,.012)';ox.fill();
  }
  for(const tp of tpaths){
    if(tp.pts.length<2)continue;
    const al=tp.active?.9:Math.max(0,.5-tp.age/1000);
    ox.globalAlpha=al;ox.strokeStyle=EFCOL[tp.ef]||'#ff1010';
    ox.lineWidth=Math.max(1,(tp.ef+1)*.8);ox.setLineDash(tp.active?[]:[3,4]);
    ox.beginPath();let started=false;
    for(const pt of tp.pts){
      const p=proj([pt.lon,pt.lat]);if(!p)continue;
      started?ox.lineTo(p[0],p[1]):ox.moveTo(p[0],p[1]);
      started=true;
    }
    ox.stroke();ox.globalAlpha=1;ox.setLineDash([]);
  }
  for(const s of storms){
    if(!s.hasTorn)continue;
    const ws=warningStyleFor(tornadoThreatLevel(s));
    drawWarningPolygon(s,(lat,lon)=>{
      const p=proj([lon,lat]);
      return p?{x:p[0],y:p[1]}:null;
    },ws.stroke,ws.fill,ws.lineWidth);
  }
  for(const r of rpts){
    if(!r.px)continue;
    const al=r.age<40?1:Math.max(.08,1-(r.age-40)/1300);
    ox.globalAlpha=al;
    const ts=Math.max(3,W*.004);
    ox.beginPath();ox.moveTo(r.px,r.py-ts);ox.lineTo(r.px+ts*.86,r.py+ts*.5);ox.lineTo(r.px-ts*.86,r.py+ts*.5);ox.closePath();
    ox.fillStyle=r.ef>=4?'#ff00ff':r.ef>=3?'#ff1010':r.ef>=2?'#ff5500':'#ff9900';ox.fill();
    ox.strokeStyle='rgba(255,255,255,.2)';ox.lineWidth=.4;ox.stroke();
    ox.globalAlpha=1;
  }
  sitePxList=[];
  const sel=getSite();
  const candidates=[];
  for(const site of SITES){
    const p=proj([site.lon,site.lat]);if(!p)continue;
    if(p[0]<0||p[0]>W||p[1]<HOFF||p[1]>H)continue;
    candidates.push({site,px:p[0],py:p[1]});
  }
  for(const sp of pickSpacedSites(candidates,siteSpacing('national'),sel.id)){
    const{site,px,py}=sp;
    const isSel=site.id===sel.id;
    const dotR=isSel?4.2:3.2;
    sitePxList.push({px,py,r:isSel?9:7,site});
    ox.beginPath();ox.arc(px,py,dotR+3.5,0,Math.PI*2);
    ox.fillStyle=isSel?'rgba(96,165,250,.16)':'rgba(96,165,250,.09)';ox.fill();
    ox.beginPath();ox.arc(px,py,dotR,0,Math.PI*2);
    ox.fillStyle=isSel?'rgba(150,210,255,.96)':'rgba(96,165,250,.75)';ox.fill();
    ox.strokeStyle=isSel?'rgba(255,255,255,.8)':'rgba(190,225,255,.5)';
    ox.lineWidth=isSel?1.3:.9;ox.stroke();
  }
}

function ll2px(lat,lon,g){
  const{cx,cy,pxPerKm,site,cosLat}=g;
  const dxKm=(lon-site.lon)*111*cosLat;
  const dyKm=(lat-site.lat)*111;
  return{x:cx+dxKm*pxPerKm,y:cy-dyKm*pxPerKm,distKm:Math.sqrt(dxKm*dxKm+dyKm*dyKm)};
}

function drawPPIOverlay(){
  const g=getScopeGeom();if(!g)return;
  const{cx,cy,rangeKm,pxPerKm,site}=g;

  ox.save();
  ox.beginPath();ox.rect(0,HOFF,W,H-HOFF);ox.clip();

  for(const city of CITIES){
    const{x,y,distKm}=ll2px(city.lat,city.lon,g);
    if(distKm>rangeKm*1.08)continue;
    if(radarZoom<0.6&&city.pop<2)continue;
    if(radarZoom<1.1&&city.pop<1)continue;
    const r=city.pop>=3?3:city.pop>=2?2.2:1.6;
    ox.beginPath();ox.arc(x,y,r,0,Math.PI*2);
    ox.fillStyle=city.pop>=3?'rgba(255,255,200,.8)':city.pop>=2?'rgba(200,200,150,.65)':'rgba(160,160,120,.5)';ox.fill();
    ox.font=`${city.pop>=3?'bold ':''}${city.pop>=3?9:city.pop>=2?8:7}px Courier New`;
    ox.fillStyle=city.pop>=3?'rgba(255,255,200,.9)':'rgba(200,200,150,.7)';
    ox.fillText(city.n,x+r+3,y+3);
  }

  for(const tp of tpaths){
    if(tp.pts.length<2)continue;
    const al=tp.active?.9:Math.max(0,.5-tp.age/900);
    ox.globalAlpha=al;ox.strokeStyle=EFCOL[tp.ef]||'#ff1010';
    ox.lineWidth=Math.max(1.5,(tp.ef+1)*.85);ox.setLineDash(tp.active?[]:[3,4]);
    ox.beginPath();
    for(let pi=0;pi<tp.pts.length;pi++){
      const pt=tp.pts[pi];
      const{x,y}=ll2px(pt.lat,pt.lon,g);
      pi===0?ox.moveTo(x,y):ox.lineTo(x,y);
    }
    ox.stroke();ox.globalAlpha=1;ox.setLineDash([]);
  }

  for(const r of rpts){
    const{x,y,distKm}=ll2px(r.lat,r.lon,g);
    if(distKm>rangeKm)continue;
    const al=r.age<40?1:Math.max(.1,1-(r.age-40)/1200);
    ox.globalAlpha=al;
    const ts=7;
    ox.beginPath();ox.moveTo(x,y-ts);ox.lineTo(x+ts*.86,y+ts*.5);ox.lineTo(x-ts*.86,y+ts*.5);ox.closePath();
    ox.fillStyle=r.ef>=4?'#ff00ff':r.ef>=3?'#ff1010':r.ef>=2?'#ff5500':'#ff9900';ox.fill();
    ox.strokeStyle='rgba(255,255,255,.3)';ox.lineWidth=.5;ox.stroke();
    ox.font='bold 7px Courier New';ox.fillStyle='#fff';ox.textAlign='center';
    ox.fillText(`EF${r.ef}`,x,y+ts+9);ox.textAlign='left';
    ox.globalAlpha=1;
  }

  for(const s of storms){
    const{x,y,distKm}=ll2px(s.lat,s.lon,g);
    if(distKm>rangeKm*1.15)continue;
    const iR=6;
    if(s.hasTorn){
      const motLen=Math.hypot(s.vlon,s.vlat)||.0001;
      const scale=pxPerKm;
      const fxp=s.vlon/motLen*scale*55,fyp=s.vlat/motLen*scale*55;
      const rxp=-s.vlat/motLen*scale*18,ryp=s.vlon/motLen*scale*18;
      ox.beginPath();
      ox.moveTo(x-rxp,y-ryp);ox.lineTo(x+fxp-rxp,y+fyp-ryp);
      ox.lineTo(x+fxp+rxp,y+fyp+ryp);ox.lineTo(x+rxp,y+ryp);
      ox.closePath();
      ox.strokeStyle='rgba(255,0,0,.9)';ox.lineWidth=1.8;ox.stroke();
      ox.fillStyle='rgba(180,0,0,.05)';ox.fill();
      ox.font='bold 8px Courier New';ox.fillStyle='#ff5050';ox.textAlign='center';
      ox.fillText('⚠ TOR',x,y-iR-9);ox.textAlign='left';
    }
    const motLen2=Math.hypot(s.vlon,s.vlat)||.0001;
    const aLen=Math.min(rangeKm*pxPerKm*.18,42);
    const axp=s.vlon/motLen2*aLen,ayp=s.vlat/motLen2*aLen;
    ox.beginPath();ox.moveTo(x,y);ox.lineTo(x+axp,y+ayp);
    ox.strokeStyle='rgba(255,255,100,.7)';ox.lineWidth=1.5;ox.stroke();
    const hA=Math.atan2(ayp,axp);const hL=6;
    ox.beginPath();ox.moveTo(x+axp,y+ayp);
    ox.lineTo(x+axp-hL*Math.cos(hA-.5),y+ayp-hL*Math.sin(hA-.5));
    ox.lineTo(x+axp-hL*Math.cos(hA+.5),y+ayp-hL*Math.sin(hA+.5));
    ox.closePath();ox.fillStyle='rgba(255,255,100,.7)';ox.fill();
  }

  ox.restore();

  sitePxList=[];
  const candidates=[];
  for(const s of SITES){
    const p=ll2px(s.lat,s.lon,g);
    if(p.x<5||p.x>W-5||p.y<HOFF+5||p.y>H-5)continue;
    candidates.push({site:s,px:p.x,py:p.y,distKm:p.distKm});
  }
  for(const sp of pickSpacedSites(candidates,siteSpacing('radar'),site.id)){
    const s=sp.site,p={x:sp.px,y:sp.py};
    const isSel=s.id===site.id;
    const dotR=isSel?6.5:5;
    sitePxList.push({px:p.x,py:p.y,r:isSel?11:9,site:s});
    ox.beginPath();ox.arc(p.x,p.y,dotR+4,0,Math.PI*2);
    ox.fillStyle=isSel?'rgba(96,165,250,.18)':'rgba(96,165,250,.12)';ox.fill();
    ox.beginPath();ox.arc(p.x,p.y,dotR,0,Math.PI*2);
    ox.fillStyle=isSel?'rgba(150,210,255,.98)':'rgba(80,170,255,.88)';ox.fill();
    ox.strokeStyle=isSel?'rgba(255,255,255,.9)':'rgba(210,235,255,.65)';
    ox.lineWidth=isSel?1.6:1.1;ox.stroke();
    if(isSel){
      ox.beginPath();ox.arc(p.x,p.y,dotR+7,0,Math.PI*2);
      ox.strokeStyle='rgba(96,165,250,.48)';ox.lineWidth=1.4;ox.stroke();
      ox.font='bold 9px Courier New';ox.fillStyle='rgba(220,240,255,.95)';
      ox.fillText(s.id,p.x+dotR+7,p.y-7);
    }
  }
}

function doZoom(f,mx2=W/2,my2=(H+HOFF)/2){
  if(viewMode==='national'){
    const old=natZoom;
    const nz=Math.max(.75,Math.min(8,natZoom*f));
    if(nz===old)return;
    const k=nz/old,baseX=W/2,baseY=(H+HOFF)/2;
    natPanX=mx2-(mx2-(baseX+natPanX))*k-baseX;
    natPanY=my2-(my2-(baseY+natPanY))*k-baseY;
    natZoom=nz;
    applyNatView();
    updZoomLbl();
    return;
  }
  const nz=Math.max(.18,Math.min(12,radarZoom*f));
  panX*=nz/radarZoom;panY*=nz/radarZoom;
  radarZoom=nz;mapDirty=true;updZoomLbl();
}
function updZoomLbl(){
  document.getElementById('zoomLbl').textContent=viewMode==='national'?Math.round(natZoom*100)+'%':Math.round(MAX_NM/radarZoom)+'nm';
}

// ─── HOVER VALUE READOUT ──────────────────────────────────────────────────────
// Returns { label, value, unit, extra } or null for the current cursor position
function getHoverValue(px, py) {
  if(py < HOFF) return null;

  let lat=null, lon=null;

  if(viewMode === 'national') {
    if(!proj) return null;
    const ll = proj.invert([px, py]);
    if(!ll) return null;
    lon = ll[0]; lat = ll[1];
    if(lat<BL||lat>TL||lon<LL||lon>RL) return null;
  } else {
    const g = getScopeGeom();
    if(!g) return null;
    const pt = px2ll(px, py, g);
    if(pt.distKm > g.rangeKm) return null;
    lat = pt.lat; lon = pt.lon;
    if(lat<BL||lat>TL||lon<LL||lon>RL) return null;
  }

  const DLon = RL-LL, DLat = TL-BL;
  const gi = (lon-LL)/DLon*(RGX-1);
  const gj = (lat-BL)/DLat*(RGY-1);

  // Radar products: sample the radar grids
  if(prodMode === 'ref') {
    const v = sampleGrid(refGrid, gi, gj);
    if(v < 5) return { label:'REFLECTIVITY', value:'ND', unit:'', lat, lon };
    return { label:'REFLECTIVITY', value: v.toFixed(0), unit:'dBZ', lat, lon };
  }
  if(prodMode === 'vel') {
    const site = getSite();
    const v = sampleRadialVelocity(gi, gj, site);
    if(Math.abs(v) < 2) return { label:'RADIAL VEL', value:'ND', unit:'', lat, lon };
    const dir = v < 0 ? 'IN' : 'OUT';
    return { label:'RADIAL VEL', value: (v >= 0 ? '+' : '') + v.toFixed(1), unit:`m/s (${dir})`, lat, lon };
  }
  if(prodMode === 'cc') {
    const v = sampleGrid(ccGrid, gi, gj);
    if(v < 0.3) return { label:'CORR COEFF', value:'ND', unit:'', lat, lon };
    return { label:'CORR COEFF', value: v.toFixed(3), unit:'ρHV', lat, lon };
  }
  if(prodMode === 'zdr') {
    const v = sampleGrid(zdrGrid, gi, gj);
    if(v < 0.3) return { label:'DIFF REFL', value:'ND', unit:'', lat, lon };
    return { label:'DIFF REFL', value: v.toFixed(1), unit:'dB', lat, lon };
  }

  // Met field products: sample the atmosphere
  const c = sampleAtmosphere(lat, lon);
  if(!c) return null;
  const shearKt = (c.shear||0)*1.94;
  const jetKt = c.jetSpeed||Math.hypot(c.ju||0,c.jv||0);

  if(prodMode === 'cape') {
    if(c.cape < 250) return { label:'CAPE', value:'<250', unit:'J/kg', lat, lon };
    return { label:'CAPE', value: Math.round(c.cape).toLocaleString(), unit:'J/kg', lat, lon };
  }
  if(prodMode === 'srh') {
    if(c.srh < 50) return { label:'0-3km SRH', value:'<50', unit:'m²/s²', lat, lon };
    return { label:'0-3km SRH', value: Math.round(c.srh), unit:'m²/s²', lat, lon };
  }
  if(prodMode === 'stp') {
    return { label:'STP', value: c.stp.toFixed(2), unit:'', lat, lon };
  }
  if(prodMode === 'td') {
    return { label:'DEWPOINT', value: Math.round(c.td), unit:'°F', lat, lon };
  }
  if(prodMode === 'temp') {
    return { label:'TEMPERATURE', value: Math.round(c.temp), unit:'°F', lat, lon };
  }
  if(prodMode === 'jet') {
    if(jetKt < 65) return { label:'JET STREAM', value:'<65', unit:'kt', lat, lon };
    return { label:'JET STREAM', value: Math.round(jetKt), unit:'kt', lat, lon };
  }
  if(prodMode === 'shear') {
    if(shearKt < 20) return { label:'0-6km SHEAR', value:'<20', unit:'kt', lat, lon };
    return { label:'0-6km SHEAR', value: Math.round(shearKt), unit:'kt', lat, lon };
  }
  if(prodMode === 'lcl') {
    return { label:'LCL HEIGHT', value: Math.round(c.lcl).toLocaleString(), unit:'m AGL', lat, lon };
  }
  if(prodMode === 'cin') {
    return { label:'CIN', value: Math.round(c.cin), unit:'J/kg', lat, lon };
  }
  return null;
}

function updHoverVal(px, py) {
  const hv = document.getElementById('hoverVal');

  // Check if we're hovering a site dot — if so, hide value readout
  for(const sp of sitePxList) {
    if(Math.hypot(px-sp.px, py-sp.py) < sp.r*2) { hv.style.display='none'; return; }
  }

  const info = getHoverValue(px, py);
  if(!info) { hv.style.display='none'; return; }

  const coordStr = `${info.lat.toFixed(2)}°N  ${Math.abs(info.lon).toFixed(2)}°W`;

  let valueHTML;
  if(info.value === 'ND') {
    valueHTML = `<span class="hv-value" style="color:var(--muted)">NO DATA</span>`;
  } else {
    valueHTML = `<span class="hv-value">${info.value}<span class="hv-unit"> ${info.unit}</span></span>`;
  }

  hv.innerHTML = `<span class="hv-label">${info.label}</span>${valueHTML}<span class="hv-coords">${coordStr}</span>`;
  hv.style.display = 'block';

  // Position: offset from cursor, keep on screen
  const pad = 14;
  let tx = px + pad;
  let ty = py + pad;
  const hvW = hv.offsetWidth || 120;
  const hvH = hv.offsetHeight || 60;
  if(tx + hvW > W - 8) tx = px - hvW - pad;
  if(ty + hvH > H - 8) ty = py - hvH - pad;
  if(tx < 8) tx = 8;
  if(ty < HOFF + 4) ty = HOFF + 4;
  hv.style.left = tx + 'px';
  hv.style.top  = ty + 'px';
}

function updCursorInfo(mx2,my2){
  const ci=document.getElementById('curInfo');
  if(viewMode!=='radar'){ci.style.display='none';return;}
  const g=getScopeGeom();if(!g){ci.style.display='none';return;}
  const{cx,cy,displayR,pxPerKm,rangeKm,site,cosLat}=g;
  const dx=mx2-cx,dy=my2-cy,distPx=Math.sqrt(dx*dx+dy*dy);
  if(distPx>displayR){ci.textContent='OUTSIDE COVERAGE';ci.style.display='block';return;}
  const kmPerPx=1/pxPerKm;
  const dxKm=dx*kmPerPx,dyKm=dy*kmPerPx;
  const distKm=Math.sqrt(dxKm*dxKm+dyKm*dyKm),distNm=distKm/NM_KM;
  const az=((Math.atan2(dx,-dy)*180/Math.PI)+360)%360;
  const lat2=site.lat-dyKm/111,lon2=site.lon+dxKm/(111*cosLat);
  const gi=Math.round((lon2-LL)/(RL-LL)*(RGX-1)),gj=Math.round((lat2-BL)/(TL-BL)*(RGY-1));
  let dbzStr='ND';
  if(gi>=0&&gi<RGX&&gj>=0&&gj<RGY){const v=refGrid[gj*RGX+gi];if(v>=5)dbzStr=v.toFixed(0)+' dBZ';}
  ci.textContent=`AZ ${az.toFixed(1)}°  RNG ${distNm.toFixed(1)}nm  REF ${dbzStr}  ${lat2.toFixed(2)}°N ${Math.abs(lon2).toFixed(2)}°W`;
  ci.style.display='block';
}

function loop(ts){
  if(lastFrameTs===null)lastFrameTs=ts||performance.now();
  const now=ts||performance.now();
  const dtMs=Math.max(0,now-lastFrameTs);
  lastFrameTs=now;
  simDeltaMin=Math.min(.75,dtMs/250);
  simMin+=simDeltaMin;
  tick++;
  updAtm(simDeltaMin);
  spawnStorm(simDeltaMin);
  updStorms(simDeltaMin);
  if(simMin-lastRadarScanMin>=RADAR_SCAN_INTERVAL_MIN){
    clearGrids();
    for(const s of storms)paintStorm(s);
    lastRadarScanMin=simMin;
    radarDirty=true;
  }
  const mapWasDirty=mapDirty;
  if(mapDirty)drawMap();
  if(viewMode==='national'){
    if(prodMode==='ref'||prodMode==='vel'||prodMode==='cc'){
      if(radarDirty||mapWasDirty){drawNatRadar();radarDirty=false;}
    }
    else if(mapWasDirty||simMin-lastFieldDrawMin>=.55){
      drawField();
      lastFieldDrawMin=simMin;
    }
  } else {
    drawPPI();
  }
  drawOverlay();
  if(tick%5===0)updUI();
  requestAnimationFrame(loop);
}

buildSiteSelect();updSiteLbl();setView('national');

const lf=document.getElementById('loadFill'),lm2=document.getElementById('loadMsg');
lf.style.width='15%';lm2.textContent='LOADING MAP DATA…';

d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us=>{
  lf.style.width='55%';lm2.textContent='INITIALIZING ATMOSPHERE…';
  usData=us;
  proj=mkProj();
  buildGrid();
  resizeAll();
  initAtm();
  seedInitialStorms();
  lf.style.width='90%';lm2.textContent='STARTING SIMULATION…';
  setTimeout(()=>{
    lf.style.width='100%';
    setTimeout(()=>{
      document.getElementById('loading').style.display='none';
      drawMap();
      requestAnimationFrame(loop);
    },180);
  },250);
}).catch(err=>{
  console.warn('Map failed',err);
  lm2.textContent='RUNNING WITHOUT MAP';lf.style.width='100%';
  setTimeout(()=>{
    document.getElementById('loading').style.display='none';
    proj=mkProj();buildGrid();resizeAll();initAtm();seedInitialStorms();
    requestAnimationFrame(loop);
  },700);
});
</script>
