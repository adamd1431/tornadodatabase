<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UTWX Weather Simulator</title>

<style>

body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

#topBar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:1000;

  background:rgba(0,0,0,.7);
  padding:12px;
  border-radius:12px;
}

button{
  margin:2px;
  padding:8px 12px;
  cursor:pointer;
}

canvas{
  display:block;
}

</style>
</head>
<body>

<div id="topBar">

  <button onclick="displayMode='radar'">
    Radar
  </button>

  <button onclick="displayMode='cape'">
    CAPE
  </button>

  <button onclick="displayMode='dewpoint'">
    Dewpoint
  </button>

  <button onclick="displayMode='temperature'">
    Temperature
  </button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas =
  document.getElementById("canvas");

const ctx =
  canvas.getContext("2d");

canvas.width =
  window.innerWidth;

canvas.height =
  window.innerHeight;

const GRID_X = 240;
const GRID_Y = 140;

const cells = [];

const storms = [];

let displayMode = "radar";

let simTime = 0;

for(let y=0;y<GRID_Y;y++){

  cells[y]=[];

  for(let x=0;x<GRID_X;x++){

    cells[y][x]={

      temperature:
        60 + Math.random()*30,

      dewpoint:
        40 + Math.random()*25,

      cape:0,

      windU:0,

      windV:0,

      precipitation:0

    };

  }
}

function updateAtmosphere(){

  simTime++;

  for(let y=0;y<GRID_Y;y++){

    for(let x=0;x<GRID_X;x++){

      const cell = cells[y][x];

      const southFactor =
        y / GRID_Y;

      cell.temperature +=
        (Math.random()-0.5)*0.2;

      cell.dewpoint +=
        southFactor * 0.05;

      const jet =
        Math.sin(
          x*0.03 +
          simTime*0.003
        );

      cell.windU =
        jet*80;

      cell.windV =
        Math.cos(
          x*0.02 +
          simTime*0.002
        )*20;

      cell.cape =
        Math.max(
          0,
          (cell.temperature-cell.dewpoint+35)*80
        );

    }
  }

}

function spawnStorms(){
  for(let i=0;i<2;i++){

    const x = Math.floor(Math.random()*GRID_X);
    const y = Math.floor(Math.random()*GRID_Y);

    const cell = cells[y][x];

    if (
      cell.cape > 1500 &&
      Math.random() < 0.01
    ) {

      const storm = {
        x,
        y,

        vx: 0.2 + Math.random()*0.2,
        vy: 0.02,

        intensity: 20,

        rotation: Math.random() * Math.PI * 2,
        spin: 0.08 + Math.random() * 0.05,

        updraft: [],
        rain: []
      };

      storm.rain = [];

      for (let i = 0; i < 80; i++) {
        storm.rain.push({
          x: storm.x + (Math.random() - 0.5) * 6,
          y: storm.y + (Math.random() - 0.5) * 6,
          life: 1
        });
      }

      storms.push(storm);
    }
  }
}

function updateStorms(){

  storms.forEach(storm => {

    const gridX =
      Math.floor(storm.x);

    const gridY =
      Math.floor(storm.y);

    if(
      !cells[gridY] ||
      !cells[gridY][gridX]
    ) return;

    const cell =
      cells[gridY][gridX];

    const windX =
      cell.windU * 0.00015;

    const windY =
      cell.windV * 0.00015;

    storm.vx =
      storm.vx * 0.97 +
      windX;

    storm.vy =
      storm.vy * 0.97 +
      windY;

    storm.x +=
      storm.vx;

    storm.y +=
      storm.vy;

    const centerX =
      storm.x;

    const centerY =
      storm.y;

    const rotationStrength =
      0.15;

    const inflowStrength =
      0.02;

    const envWindFactor =
      0.00005;

    for(
      let i=0;
      i<storm.rain.length;
      i++
    ){

      const p =
        storm.rain[i];

      const dx =
        p.x - centerX;

      const dy =
        p.y - centerY;

      const dist =
        Math.sqrt(
          dx*dx +
          dy*dy
        ) + 0.001;

      const tangentialX =
        -dy / dist;

      const tangentialY =
        dx / dist;

      const inflowX =
        -dx / dist *
        inflowStrength;

      const inflowY =
        -dy / dist *
        inflowStrength;

      p.x +=
        tangentialX *
        rotationStrength +
        inflowX;

      p.y +=
        tangentialY *
        rotationStrength +
        inflowY;

      p.x +=
        cell.windU *
        envWindFactor;

      p.y +=
        cell.windV *
        envWindFactor;

      p.life *=
        0.98;

    }

    for(
      let i=0;
      i<5;
      i++
    ){

      storm.rain.push({

        x:
          storm.x +
          (Math.random()-0.5)*4,

        y:
          storm.y +
          (Math.random()-0.5)*4,

        life:1

      });

    }

    storm.rain =
      storm.rain.filter(
        p => p.life > 0.05
      );

    storm.rotation +=
      storm.spin * 0.02;

    storm.intensity *=
      0.999;

  });

}

function drawRadar(){

  const cw =
    canvas.width / GRID_X;

  const ch =
    canvas.height / GRID_Y;

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  for(let y=0;y<GRID_Y;y++){

    for(let x=0;x<GRID_X;x++){

      const cell =
        cells[y][x];

      let color="#000";

      if(displayMode==="cape"){

        const v =
          Math.min(
            255,
            cell.cape/20
          );

        color =
          `rgb(${v},0,0)`;
      }

      else if(displayMode==="dewpoint"){

        const v =
          Math.max(
            0,
            Math.min(
              255,
              cell.dewpoint*3
            )
          );

        color =
          `rgb(0,${v},255)`;
      }

      else if(displayMode==="temperature"){

        const v =
          Math.max(
            0,
            Math.min(
              255,
              cell.temperature*3
            )
          );

        color =
          `rgb(${v},${v/2},0)`;
      }

      ctx.fillStyle=color;

      ctx.fillRect(
        x*cw,
        y*ch,
        cw+1,
        ch+1
      );
    }
  }

  if(displayMode==="radar"){

    storms.forEach(storm=>{

      const px =
        storm.x * cw;

      const py =
        storm.y * ch;

      const radius =
        storm.intensity * 0.25;

      const sin =
        Math.sin(storm.rotation);

      const cos =
        Math.cos(storm.rotation);

      // 🔥 velocity-aware hook echo (FIX)
      const hookOffsetX =
        cos * radius * 1.8 - sin * radius * 1.2;

      const hookOffsetY =
        sin * radius * 1.8 + cos * radius * 1.2;

      const core =
        ctx.createRadialGradient(
          px,
          py,
          0,
          px,
          py,
          radius
        );

      core.addColorStop(0, "rgba(255,0,255,0.25)");
      core.addColorStop(0.3, "rgba(255,0,0,0.15)");
      core.addColorStop(1, "rgba(0,0,0,0)");

      ctx.fillStyle = core;

      ctx.beginPath();
      ctx.arc(px, py, radius, 0, Math.PI*2);
      ctx.fill();

      const hook =
        ctx.createRadialGradient(
          px + hookOffsetX,
          py + hookOffsetY,
          0,
          px + hookOffsetX,
          py + hookOffsetY,
          radius * 1.6
        );

      hook.addColorStop(0, "rgba(0,255,0,0.18)");
      hook.addColorStop(0.4, "rgba(255,255,0,0.10)");
      hook.addColorStop(1, "rgba(0,0,0,0)");

      ctx.fillStyle = hook;

      ctx.beginPath();
      ctx.arc(
        px + hookOffsetX,
        py + hookOffsetY,
        radius * 1.6,
        0,
        Math.PI*2
      );

      ctx.fill();

    });

    storms.forEach(storm=>{

      const px =
        storm.x * cw;

      const py =
        storm.y * ch;

      const size =
        storm.intensity * 0.3;

      ctx.strokeStyle="rgba(0,200,255,0.12)";
      ctx.lineWidth=2;

      ctx.beginPath();
      ctx.moveTo(px-size,py);
      ctx.lineTo(px+size,py);
      ctx.stroke();

      ctx.strokeStyle="rgba(255,0,150,0.12)";

      ctx.beginPath();
      ctx.moveTo(px,py-size);
      ctx.lineTo(px,py+size);
      ctx.stroke();

    });
  }
}

function loop(){

  updateAtmosphere();

  spawnStorms();

  updateStorms();

  drawRadar();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
