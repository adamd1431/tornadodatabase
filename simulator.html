<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UTWX Weather Simulator</title>

<style>

body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

#topBar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:1000;

  background:rgba(0,0,0,.7);
  padding:12px;
  border-radius:12px;
}

button{
  margin:2px;
  padding:8px 12px;
  cursor:pointer;
}

canvas{
  display:block;
}

</style>
</head>
<body>

<div id="topBar">

  <button onclick="displayMode='radar'">
    Radar
  </button>

  <button onclick="displayMode='cape'">
    CAPE
  </button>

  <button onclick="displayMode='dewpoint'">
    Dewpoint
  </button>

  <button onclick="displayMode='temperature'">
    Temperature
  </button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas =
  document.getElementById("canvas");

const ctx =
  canvas.getContext("2d");

canvas.width =
  window.innerWidth;

canvas.height =
  window.innerHeight;

const GRID_X = 240;
const GRID_Y = 140;

const cells = [];

const storms = [];

let displayMode = "radar";

let simTime = 0;

for(let y=0;y<GRID_Y;y++){

  cells[y]=[];

  for(let x=0;x<GRID_X;x++){

    cells[y][x]={

      temperature:
        60 + Math.random()*30,

      dewpoint:
        40 + Math.random()*25,

      cape:0,

      windU:0,

      windV:0,

      precipitation:0

    };

  }
}

function updateAtmosphere(){

  simTime++;

  for(let y=0;y<GRID_Y;y++){

    for(let x=0;x<GRID_X;x++){

      const cell = cells[y][x];

      const southFactor =
        y / GRID_Y;

      cell.temperature +=
        (Math.random()-0.5)*0.2;

      cell.dewpoint +=
        southFactor * 0.05;

      const jet =
        Math.sin(
          x*0.03 +
          simTime*0.003
        );

      cell.windU =
        jet*80;

      cell.windV =
        Math.cos(
          x*0.02 +
          simTime*0.002
        )*20;

      cell.cape =
        Math.max(
          0,
          (cell.temperature-cell.dewpoint+35)*80
        );

    }
  }

}

function spawnStorms(){

  for(let i=0;i<2;i++){

    const x =
      Math.floor(
        Math.random()*GRID_X
      );

    const y =
      Math.floor(
        Math.random()*GRID_Y
      );

    const cell =
      cells[y][x];

    if(
      cell.cape > 1500 &&
      Math.random() < 0.01
    ){

      storms.push({
        x,
        y,
        intensity: 20,

        updraft: [],
        rain: [],
        rotation: Math.random() * Math.PI * 2
      });

    }

    for (let i = 0; i < 25; i++) {

      storm.rain.push({
        x: storm.x + (Math.random()-0.5)*3,
        y: storm.y + (Math.random()-0.5)*3,
        life: 1
      });

    }

  }

}

function updateStorms(){

  storms.forEach(storm=>{

    const x = Math.floor(storm.x);
    const y = Math.floor(storm.y);

    if (cells[y] && cells[y][x]) {

      const cell = cells[y][x];

      storm.x += cell.windU * 0.0002;
      storm.y += cell.windV * 0.0002;

    }

    storm.intensity *= 0.999;

  });

}

function drawRadar(){

  const cw =
    canvas.width / GRID_X;

  const ch =
    canvas.height / GRID_Y;

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  for(let y=0;y<GRID_Y;y++){

    for(let x=0;x<GRID_X;x++){

      const cell =
        cells[y][x];

      let color="#000";

      if(displayMode==="cape"){

        const v =
          Math.min(
            255,
            cell.cape/20
          );

        color =
          `rgb(${v},0,0)`;

      }

      else if(
        displayMode==="dewpoint"
      ){

        const v =
          Math.max(
            0,
            Math.min(
              255,
              cell.dewpoint*3
            )
          );

        color =
          `rgb(0,${v},255)`;

      }

      else if(
        displayMode==="temperature"
      ){

        const v =
          Math.max(
            0,
            Math.min(
              255,
              cell.temperature*3
            )
          );

        color =
          `rgb(${v},${v/2},0)`;

      }

      ctx.fillStyle=color;

      ctx.fillRect(
        x*cw,
        y*ch,
        cw+1,
        ch+1
      );

    }
  }

  if (displayMode === "radar") {

  storms.forEach(storm => {

    // make storm leave precipitation trail
    if (!storm.rain) storm.rain = [];

    // spawn rain continuously
    if (Math.random() < 0.4) {
      storm.rain.push({
        x: storm.x + (Math.random() - 0.5) * 2,
        y: storm.y + (Math.random() - 0.5) * 2,
        life: 1
      });
    }

    // draw rain particles
    storm.rain.forEach(p => {

      p.life *= 0.97;

      const px = p.x * (canvas.width / GRID_X);
      const py = p.y * (canvas.height / GRID_Y);

      ctx.fillStyle = `rgba(255,0,0,${p.life})`;
      ctx.fillRect(px, py, 2, 2);

    });

    // cleanup dead particles
    storm.rain = storm.rain.filter(p => p.life > 0.05);

  });

}

function loop(){

  updateAtmosphere();

  spawnStorms();

  updateStorms();

  drawRadar();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
