<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UTWX Weather Simulator</title>

<style>

body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

#topBar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:1000;

  background:rgba(0,0,0,.7);
  padding:12px;
  border-radius:12px;
}

#legend{
  position:fixed;
  bottom:20px;
  left:20px;

  width:220px;

  background:rgba(0,0,0,.75);

  padding:10px;

  border-radius:12px;

  color:white;

  font-size:13px;

  z-index:1000;
}

button{
  margin:2px;
  padding:8px 12px;
  cursor:pointer;
}

canvas{
  display:block;
}

</style>
</head>
<body>

<div id="topBar">

  <button onclick="displayMode='radar'">
    Radar
  </button>

  <button onclick="displayMode='cape'">
    CAPE
  </button>

  <button onclick="displayMode='dewpoint'">
    Dewpoint
  </button>

  <button onclick="displayMode='temperature'">
    Temperature
  </button>

</div>

<div id="legend"></div>

<canvas id="canvas"></canvas>

<script>

const canvas =
  document.getElementById("canvas");

const ctx =
  canvas.getContext("2d");

canvas.width =
  window.innerWidth;

canvas.height =
  window.innerHeight;

const GRID_X = 240;
const GRID_Y = 140;

const cells = [];

const storms = [];

let displayMode = "radar";

let simTime = 0;

for(let y=0;y<GRID_Y;y++){

  cells[y]=[];

  for(let x=0;x<GRID_X;x++){

    cells[y][x]={

      temperature:
        95 - (y/GRID_Y)*35,

      dewpoint:
        72 - (y/GRID_Y)*25,

      cape:0,

      windU:0,

      windV:0,

      precipitation:0

    };

  }
}

function updateAtmosphere(){

  simTime++;

  for(let y=0;y<GRID_Y;y++){

    for(let x=0;x<GRID_X;x++){

      const cell = cells[y][x];

      const southFactor =
        y / GRID_Y;

      cell.temperature +=
        (Math.random()-0.5)*0.2;

      cell.dewpoint +=
        southFactor * 0.005;

      cell.temperature =
        Math.max(
          40,
          Math.min(
            105,
            cell.temperature
          )
        );

      cell.dewpoint =
        Math.max(
          20,
          Math.min(
            80,
            cell.dewpoint
          )
        );

      const jet =
        Math.sin(
          x*0.03 +
          simTime*0.003
        );

      cell.windU =
        jet*80;

      cell.windV =
        Math.cos(
          x*0.02 +
          simTime*0.002
        )*20;

      const instability =
        cell.temperature - (85 - cell.dewpoint);

      cell.cape =
        Math.max(0, instability * 120);

    }
  }

}

function spawnStorms(){
  for(let i=0;i<2;i++){

    const x = Math.floor(Math.random()*GRID_X);
    const y = Math.floor(Math.random()*GRID_Y);

    const cell = cells[y][x];

    if (
      cell.cape > 1500 &&
      Math.random() < 0.01
    ) {

      const shear =
        Math.abs(
          Math.sin(
            x * 0.03 +
            simTime * 0.003
          )
        );

      const storm = {

        x,
        y,

        vx: cell.windU * 0.003,
        vy: cell.windV * 0.003,

        intensity: 20,

        rotation:
          Math.random() * Math.PI * 2,

        spin:
          shear * 0.3,

        updraft: [],
        rain: []

      };

      storm.rain = [];

      for (let i = 0; i < 80; i++) {
        storm.rain.push({
          x: storm.x + (Math.random() - 0.5) * 6,
          y: storm.y + (Math.random() - 0.5) * 6,
          life: 1
        });
      }

      storms.push(storm);
    }
  }
}

function updateStorms(){

  storms.forEach(storm => {

    const gridX =
      Math.floor(storm.x);

    const gridY =
      Math.floor(storm.y);

    if(
      !cells[gridY] ||
      !cells[gridY][gridX]
    ) continue;

    const cell =
      cells[gridY][gridX];

    const windX =
      cell.windU * 0.00015;

    const windY =
      cell.windV * 0.00015;

    storm.vx =
      storm.vx * 0.97 +
      windX;

    storm.vy =
      storm.vy * 0.97 +
      windY;

    storm.x +=
      storm.vx;

    storm.y +=
      storm.vy;

    const centerX =
      storm.x;

    const centerY =
      storm.y;

    const rotationStrength =
      0.15;

    const inflowStrength =
      0.02;

    const envWindFactor =
      0.00005;

    for(
      let i=0;
      i<storm.rain.length;
      i++
    ){

      const p =
        storm.rain[i];

      const dx =
        p.x - centerX;

      const dy =
        p.y - centerY;

      const dist =
        Math.sqrt(
          dx*dx +
          dy*dy
        ) + 0.001;

      const tangentialX =
        -dy / dist;

      const tangentialY =
        dx / dist;

      const inflowX =
        -dx / dist *
        inflowStrength;

      const inflowY =
        -dy / dist *
        inflowStrength;

      p.x +=
        tangentialX *
        rotationStrength +
        inflowX;

      p.y +=
        tangentialY *
        rotationStrength +
        inflowY;

      p.x +=
        cell.windU *
        envWindFactor;

      p.y +=
        cell.windV *
        envWindFactor;

      p.life *=
        0.98;

    }

    for(
      let i=0;
      i<5;
      i++
    ){

      storm.rain.push({

        x:
          storm.x +
          (Math.random()-0.5)*4,

        y:
          storm.y +
          (Math.random()-0.5)*4,

        life:1

      });

    }

    storm.rain =
      storm.rain.filter(
        p => p.life > 0.05
      );

    storm.rotation +=
      storm.spin * 0.02;

    storm.intensity *=
      0.999;
    storm.intensity -= 0.02;
    storm.intensity +=
      (cell.cape/3000) * 0.25;
    if(cell.cape < 500){

      storm.intensity *= 0.985;

    }

  });

  for(let i = storms.length - 1; i >= 0; i--){

    if(storms[i].intensity < 5){

      storms.splice(i,1);

    }

  }

}

function drawRadar(){

  const cw =
    canvas.width / GRID_X;

  const ch =
    canvas.height / GRID_Y;

  ctx.clearRect(
    0,
    0,
    canvas.width,
    canvas.height
  );

  for(let y=0;y<GRID_Y;y++){

    for(let x=0;x<GRID_X;x++){

      const cell =
        cells[y][x];

      let color="#000";

      if(displayMode==="cape"){

        const v =
          Math.min(
            255,
            cell.cape/20
          );

        color =
          `rgb(${v},0,0)`;
      }

      else if(displayMode==="dewpoint"){

        const v =
          Math.max(
            0,
            Math.min(
              255,
              cell.dewpoint*3
            )
          );

        color =
          `rgb(0,${v},255)`;
      }

      else if(displayMode==="temperature"){

        const t = cell.temperature;

        if(t < 30) color = "#a000ff";
        else if(t < 40) color = "#4a00ff";
        else if(t < 50) color = "#0066ff";
        else if(t < 60) color = "#00ccff";
        else if(t < 70) color = "#00ff80";
        else if(t < 80) color = "#ffff00";
        else if(t < 90) color = "#ff9900";
        else if(t < 100) color = "#ff3300";
        else color = "#ff00ff";

      }

      ctx.fillStyle=color;

      ctx.fillRect(
        x*cw,
        y*ch,
        cw+1,
        ch+1
      );
    }
  }

  if(displayMode==="radar"){

    storms.forEach(storm=>{

      for(
        let i=0;
        i<storm.rain.length;
        i++
      ){

        const p =
          storm.rain[i];

        const rx =
          p.x * cw;

        const ry =
          p.y * ch;

        const dx =
          p.x - storm.x;

        const dy =
          p.y - storm.y;

        const dist =
          Math.sqrt(
            dx*dx +
            dy*dy
          );

        let color;

        if(dist < 1.5){

          color =
            "#ff00ff";

        }

        else if(dist < 3){

          color =
            "#ff0000";

        }

        else if(dist < 5){

          color =
            "#ffff00";

        }

        else{

          color =
            "#00ff00";

        }

        ctx.fillStyle =
          color;

        ctx.fillRect(
          rx,
          ry,
          3,
          3
        );

      }

    });

  }

}

function updateLegend(){

  const legend =
    document.getElementById("legend");

  if(displayMode==="temperature"){

    legend.innerHTML = `
      <b>Temperature (°F)</b><br>
      Purple: <30<br>
      Blue: 30-50<br>
      Cyan: 50-60<br>
      Green: 60-70<br>
      Yellow: 70-80<br>
      Orange: 80-90<br>
      Red: 90-100<br>
      Magenta: 100+
    `;

  }

  else if(displayMode==="dewpoint"){

    legend.innerHTML = `
      <b>Dewpoint (°F)</b><br>
      <span style="color:#663300">■</span> <30 (dry)<br>
      <span style="color:#996600">■</span> 30–40<br>
      <span style="color:#cccc00">■</span> 40–50<br>
      <span style="color:#66ff66">■</span> 50–60<br>
      <span style="color:#00ffcc">■</span> 60–65<br>
      <span style="color:#0099ff">■</span> 65–70<br>
      <span style="color:#6600ff">■</span> 70+
    `;

  }

  else if(displayMode==="cape"){

    legend.innerHTML = `
      <b>CAPE (J/kg)</b><br>
      <span style="color:#001122">■</span> 0–250<br>
      <span style="color:#0033ff">■</span> 250–500<br>
      <span style="color:#00ccff">■</span> 500–1000<br>
      <span style="color:#00ff00">■</span> 1000–2000<br>
      <span style="color:#ffff00">■</span> 2000–3000<br>
      <span style="color:#ff9900">■</span> 3000–4000<br>
      <span style="color:#ff0000">■</span> 4000–5000<br>
      <span style="color:#ff00ff">■</span> 5000+
    `;

  }

  else{

    legend.innerHTML =
      "<b>Radar Reflectivity Mode</b>";

  }

}

function loop(){

  updateAtmosphere();

  spawnStorms();

  updateStorms();

  updateLegend();

  drawRadar();

  requestAnimationFrame(loop);

}

loop();

</script>
</body>
</html>
