<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UTWX Weather Simulator</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

#topBar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:1000;
  background:rgba(0,0,0,.7);
  padding:12px;
  border-radius:12px;
}

#legend{
  position:fixed;
  bottom:20px;
  left:20px;
  width:220px;
  background:rgba(0,0,0,.75);
  padding:10px;
  border-radius:12px;
  font-size:13px;
  z-index:1000;
}

button{
  margin:2px;
  padding:8px 12px;
  cursor:pointer;
}

canvas{ display:block; }
</style>
</head>

<body>

<div id="topBar">
  <button onclick="setMode('radar')">Radar</button>
  <button onclick="setMode('cape')">CAPE</button>
  <button onclick="setMode('dewpoint')">Dewpoint</button>
  <button onclick="setMode('temperature')">Temperature</button>
  <button onclick="setMode('shear')">Wind Shear</button>
  <button onclick="setMode('stp')">STP</button>
</div>

<div id="legend"></div>
<canvas id="canvas"></canvas>

<script>

/* =========================
   SETUP
========================= */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

const GRID_X = 240;
const GRID_Y = 140;

const DX = canvas.width / GRID_X;
const DY = canvas.height / GRID_Y;

let mode = "radar";
let t = 0;

const cells = Array.from({length: GRID_Y}, (_, y) =>
  Array.from({length: GRID_X}, (_, x) => ({
    temperature: 95 - (y/GRID_Y)*35,
    dewpoint: 72 - (y/GRID_Y)*25,
    cape: 0,
    windU: 0,
    windV: 0,
    shear: 0,
    stp: 0
  }))
);

const storms = [];

function setMode(m){ mode = m; }

/* =========================
   ATMOSPHERE (IMPROVED STABILITY)
========================= */
function updateAtmosphere(){
  t++;

  for(let y=0;y<GRID_Y;y++){
    const lat = y/GRID_Y;

    for(let x=0;x<GRID_X;x++){
      const c = cells[y][x];

      const noise = (Math.random()-0.5)*0.2;

      c.temperature += noise + (1-lat)*0.01;
      c.dewpoint += (lat-0.5)*0.012;

      c.temperature *= 0.9998;
      c.dewpoint *= 0.9998;

      c.temperature = Math.max(40, Math.min(105, c.temperature));
      c.dewpoint = Math.max(20, Math.min(80, c.dewpoint));

      // jet + wave (smoother)
      const jet = Math.exp(-((lat - 0.25)**2)/0.01);
      const wave = Math.sin(x*0.01 + t*0.003);

      const baseWind = (40 + jet*120) * wave;

      c.windU = baseWind;
      c.windV = Math.sin(lat*10 + t*0.003) * 4;

      // CAPE (less explosive)
      const instab = c.temperature - (85 - c.dewpoint);
      c.cape = Math.max(0, instab * 90);

      // shear
      c.shear = Math.sqrt(c.windU*c.windU + c.windV*c.windV);

      // STP (smoothed)
      const lcl = Math.max(0, 2000 - 18*(c.temperature - c.dewpoint));
      const esrh = c.shear * 8;

      c.stp =
        (c.cape/2200) *
        (lcl/2200) *
        (esrh/220) *
        (c.shear/120);

      c.stp = Math.max(0, Math.min(10, c.stp));
    }
  }
}

/* =========================
   STORMS (MORE STRUCTURED FLOW)
========================= */
function spawnStorms(){
  if(storms.length > 8) return;
  if(Math.random() > 0.15) return;

  const x = (Math.random()*GRID_X)|0;
  const y = (Math.random()*GRID_Y)|0;

  const c = cells[y][x];

  if(c.cape > 1100 && c.shear > 22){

    storms.push({
      x,y,
      vx:c.windU*0.0015,
      vy:c.windV*0.0015,
      intensity:20,
      spin:0.15 + Math.random()*0.1,
      rain:Array.from({length:60}, () => ({
        x:x+(Math.random()-0.5)*5,
        y:y+(Math.random()-0.5)*5,
        life:1
      }))
    });
  }
}

/* =========================
   STORM UPDATE (SMOOTHER MOTION)
========================= */
function updateStorms(){

  for(const s of storms){

    const ix = s.x|0;
    const iy = s.y|0;

    const c = cells[iy]?.[ix];
    if(!c) continue;

    // steering flow (less jitter)
    const steerX = c.windU * 0.00008;
    const steerY = c.windV * 0.00008;

    s.vx = s.vx*0.98 + steerX;
    s.vy = s.vy*0.98 + steerY;

    s.x += s.vx;
    s.y += s.vy;

    s.x = Math.max(0, Math.min(GRID_X-1, s.x));
    s.y = Math.max(0, Math.min(GRID_Y-1, s.y));

    const cx = s.x;
    const cy = s.y;

    // rain physics (simplified but stable)
    for(const p of s.rain){

      const dx = p.x - cx;
      const dy = p.y - cy;

      const d = Math.sqrt(dx*dx + dy*dy) + 0.001;

      const tx = -dy/d;
      const ty = dx/d;

      p.x += tx*0.12 - dx/d*0.015 + c.windU*0.00004;
      p.y += ty*0.12 - dy/d*0.015 + c.windV*0.00004;

      p.life *= 0.985;
    }

    // regeneration (controlled)
    for(let i=0;i<2;i++){
      s.rain.push({
        x:s.x+(Math.random()-0.5)*3,
        y:s.y+(Math.random()-0.5)*3,
        life:1
      });
    }

    s.rain = s.rain.filter(p => p.life > 0.05);

    // intensity smoothing
    const capeBoost = c.cape/4500;

    s.intensity =
      s.intensity*0.985 +
      capeBoost;

  }

  for(let i=storms.length-1;i>=0;i--){
    if(storms[i].intensity < 3) storms.splice(i,1);
  }
}

/* =========================
   RENDER
========================= */
function color(c){

  if(mode==="cape"){
    return `rgb(${Math.min(255,c.cape/9)},0,0)`;
  }

  if(mode==="dewpoint"){
    return `rgb(0,${Math.min(255,c.dewpoint*3)},255)`;
  }

  if(mode==="temperature"){
    const t = c.temperature;
    return t<60?"#00ccff":
           t<80?"#ffff00":
           "#ff3300";
  }

  if(mode==="shear"){
    const v = Math.min(255,c.shear*2);
    return `rgb(255,${255-v},0)`;
  }

  if(mode==="stp"){
    const v = Math.min(255,c.stp*30);
    return `rgb(${v},0,${255-v})`;
  }

  return "#000";
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<GRID_Y;y++){
    for(let x=0;x<GRID_X;x++){
      ctx.fillStyle = color(cells[y][x]);
      ctx.fillRect(x*DX,y*DY,DX+1,DY+1);
    }
  }

  if(mode==="radar"){
    for(const s of storms){
      for(const p of s.rain){
        ctx.fillStyle =
          p.life<0.3?"#00ff00":
          p.life<0.6?"#ffff00":
          "#ff0000";

        ctx.fillRect(p.x*DX,p.y*DY,2,2);
      }
    }
  }
}

/* =========================
   LEGEND
========================= */
function legend(){
  document.getElementById("legend").innerHTML =
    `<b>${mode.toUpperCase()}</b>`;
}

/* =========================
   LOOP
========================= */
function loop(){
  updateAtmosphere();
  spawnStorms();
  updateStorms();
  draw();
  legend();
  requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
