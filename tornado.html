<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UTWX Tornado Archive</title>

  <style>

    :root {
      --bg0: #020617;
      --bg1: #0b1220;
      --bg2: #0f172a;

      --card: rgba(30, 41, 59, 0.60);

      --border: rgba(255,255,255,0.08);

      --text: #ffffff;
      --muted: #94a3b8;

      --blue: #3b82f6;
      --cyan: #22d3ee;
      --yellow: #fbbf24;
      --red: #ef4444;

      --shadow:
        0 12px 35px rgba(0,0,0,0.45);
    }

    /* ===== BASE ===== */

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      padding: 28px;

      font-family: 'Segoe UI', sans-serif;

      color: var(--text);
      min-height: 100vh;

      background:
        radial-gradient(circle at 15% 10%, rgba(59,130,246,0.18), transparent 45%),
        radial-gradient(circle at 85% 25%, rgba(34,211,238,0.10), transparent 50%),
        radial-gradient(circle at 50% 100%, rgba(239,68,68,0.08), transparent 55%),
        linear-gradient(180deg, var(--bg0), var(--bg1), var(--bg2));

      background-attachment: fixed;
      overflow-x: hidden;
    }

    body::before {
      content: "";

      position: fixed;
      inset: -200px;

      background:
        radial-gradient(
          circle at center,
          rgba(59,130,246,0.08),
          transparent 60%
        );

      animation: floatGlow 10s ease-in-out infinite;

      z-index: -1;
      pointer-events: none;
    }

    @keyframes floatGlow {

      0%, 100% {
        transform: translateY(0px);
        opacity: 0.7;
      }

      50% {
        transform: translateY(20px);
        opacity: 1;
      }
    }

    /* ===== PAGE WRAP ===== */

    .pageWrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ===== TITLE ===== */

    h1 {
      text-align: center;

      font-size: clamp(46px, 6vw, 70px);

      margin: 6px 0 24px;

      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;

      color: white;

      text-shadow:
        0 0 12px rgba(255,255,255,0.08),
        0 0 28px rgba(59,130,246,0.22),
        0 10px 30px rgba(0,0,0,0.45);

      position: relative;
    }

    h1::after {
      content: "";

      display: block;

      width: 140px;
      height: 4px;

      margin: 16px auto 0;

      border-radius: 999px;

      background:
        linear-gradient(
          90deg,
          rgba(59,130,246,0),
          rgba(59,130,246,1),
          rgba(34,211,238,1),
          rgba(59,130,246,0)
        );

      box-shadow:
        0 0 20px rgba(59,130,246,0.45);
    }

    /* ===== BUTTONS ===== */

    button {
      background:
        linear-gradient(
          135deg,
          var(--blue),
          #1d4ed8
        );

      color: white;

      border: none;

      padding: 10px 15px;

      border-radius: 13px;

      cursor: pointer;

      font-weight: 700;

      transition: 0.2s ease;

      box-shadow:
        0 10px 25px rgba(59,130,246,0.25);
    }

    button:hover {
      transform: translateY(-2px);

      filter: brightness(1.08);

      box-shadow:
        0 15px 35px rgba(59,130,246,0.35);
    }

    button:active {
      transform: scale(0.98);
    }

    /* ===== ACTIVE TAB ===== */

    .tabs button.active {
      color: white;

      background:
        linear-gradient(
          135deg,
          rgba(59,130,246,0.95),
          rgba(37,99,235,1)
       );

      border-color:
       rgba(96,165,250,0.9);

      box-shadow:
        0 0 18px rgba(59,130,246,0.35),
        0 12px 30px rgba(59,130,246,0.28);

      transform: translateY(-2px);

      opacity: 1;
    }

    /* ===== INPUTS ===== */

    input,
    textarea {
      width: 100%;

      padding: 12px 13px;

      border-radius: 14px;

      border:
        1px solid rgba(255,255,255,0.08);

      background:
        rgba(15,23,42,0.75);

      color: white;

      outline: none;

      margin-top: 8px;

      transition: 0.2s ease;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: var(--blue);

      box-shadow:
        0 0 0 3px rgba(59,130,246,0.20);
    }

    /* ===== TOP NAV ===== */

    .topNav {
      position: fixed;

      top: 16px;
      right: 16px;

      z-index: 999;
    }

    /* ===== CARDS ===== */

    .card {
      background:
        linear-gradient(
          180deg,
          rgba(30,41,59,0.72),
          rgba(15,23,42,0.82)
        );

      backdrop-filter: blur(18px);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 22px;

      padding: 24px;

      margin-bottom: 22px;

      box-shadow:
        0 12px 40px rgba(0,0,0,0.45),
        inset 0 1px 0 rgba(255,255,255,0.04);

      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);

      border-color:
        rgba(59,130,246,0.28);

      box-shadow:
        0 18px 50px rgba(0,0,0,0.55),
        0 0 25px rgba(59,130,246,0.08);
    }

    /* ===== META ===== */

    .meta {
      margin-bottom: 16px;

      padding-bottom: 14px;

      border-bottom:
        1px solid rgba(255,255,255,0.08);

      color: var(--muted);

      line-height: 1.7;

      backdrop-filter: blur(10px);
    }

    .meta b {
      color: white;
    }

    /* ===== TABS ===== */

    .tabs {
      display: flex;
      flex-wrap: wrap;

      gap: 12px;

      margin-bottom: 20px;
    }

    .tab {
      background:
        rgba(255,255,255,0.04);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 14px;

      padding: 11px 16px;

      cursor: pointer;

      font-weight: 700;
      font-size: 14px;

      color: #cbd5e1;

      transition: 0.2s ease;
    }

    .tab:hover {
      transform: translateY(-2px);

      border-color:
        rgba(59,130,246,0.45);

      color: white;

      background:
        rgba(59,130,246,0.08);
    }

    /* ===== TAB PANELS ===== */

    .tabPanel {
      display: none;

      background:
        rgba(255,255,255,0.03);

      border:
        1px solid rgba(255,255,255,0.08);

      border-radius: 18px;

      padding: 18px;

      backdrop-filter: blur(12px);

      animation: fadeIn 0.22s ease;
    }

    /* ===== SECTION TITLES ===== */

    .sectionTitle {
      font-size: 25px;
      font-weight: 900;

      margin-bottom: 8px;
    }

    .sectionSub {
      color: var(--muted);

      margin-top: -2px;
      margin-bottom: 18px;
    }

    /* ===== IMAGES ===== */

    img {
      width: 100%;
      max-width: 320px;

      border-radius: 16px;

      margin: 10px;

      border:
        1px solid rgba(255,255,255,0.08);

      transition:
        transform 0.22s ease,
        box-shadow 0.22s ease;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.35);
    }

    img:hover {
      transform: scale(1.035);

      box-shadow:
        0 18px 40px rgba(0,0,0,0.5);
    }

    /* ===== LINKS ===== */

    a {
      color: #93c5fd;
      word-break: break-word;
    }

    a:hover {
      color: white;
    }

    /* ===== PENDING ===== */

    .pendingBox {
      margin-top: 16px;

      padding: 15px;

      border:
        1px dashed var(--yellow);

      border-radius: 16px;

      background:
        rgba(251,191,36,0.06);

      backdrop-filter: blur(12px);
    }

    /* ===== DIVIDER ===== */

    hr {
      border: none;

      border-top:
        1px solid rgba(255,255,255,0.08);

      margin: 18px 0;
    }

    /* ===== ANIMATIONS ===== */

    @keyframes fadeIn {

      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== SCROLLBAR ===== */

    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #0b1220;
    }

    ::-webkit-scrollbar-thumb {
      background:
        linear-gradient(
          #334155,
          #475569
        );

      border-radius: 999px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background:
        linear-gradient(
          #475569,
          #64748b
        );
    }

    /* ===== MOBILE ===== */

    @media (max-width: 700px) {

      body {
        padding: 18px;
      }

      h1 {
        font-size: 42px;
      }

      .tabs {
        gap: 8px;
      }

      .tab {
        width: 100%;
        text-align: center;
      }

      .card,
      .tabPanel {
        padding: 18px;
      }

      img {
        max-width: 100%;
        margin: 8px 0;
      }
    }

  </style>
</head>

<body>

<div class="pageWrap">

<div class="topNav">
  <button onclick="location.href='index.html'">⬅ Home</button>
</div>

<h1 id="title">Loading...</h1>

<!-- SUMMARY -->
<div id="summaryBox" class="card">
  Loading summary...
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('tornado_pics')">Tornado Pics</button>
  <button class="tab" onclick="showTab('damage')">Damage</button>
  <button class="tab" onclick="showTab('radar')">Radar</button>
  <button class="tab" onclick="showTab('environment')">Environment</button>
  <button class="tab" onclick="showTab('research')">Research / Survey</button>
  <button class="tab" onclick="showTab('text_accounts')">Text / Newspapers / Accounts</button>
  <button class="tab" onclick="showTab('misc')">Misc</button>
</div>

<!-- CONTENT -->
<div id="tabContainer">

  <div id="tornado_pics" class="tabPanel">
    <h3>Tornado Pictures</h3>
    <input type="file" multiple onchange="uploadFiles(this,'photos')">
    <div id="tornado_picsContent"></div>
  </div>

  <div id="uploadStatus" style="
    margin-top:10px;
    font-weight:bold;
    color:#93c5fd;
  "></div>

  <div id="damage" class="tabPanel" style="display:none;">
    <h3>Damage</h3>
    <input type="file" multiple onchange="uploadFiles(this,'damage')">
    <div id="damageContent"></div>
  </div>

  <div id="radar" class="tabPanel" style="display:none;">
    <h3>Radar</h3>
    <input type="file" multiple onchange="uploadFiles(this,'radar')">
    <div id="radarContent"></div>
  </div>

  <div id="environment" class="tabPanel" style="display:none;">
    <h3>Environment</h3>
    <input type="file" multiple onchange="uploadFiles(this,'environment')">
    <div id="environmentContent"></div>
  </div>

  <div id="research" class="tabPanel" style="display:none;">
    <h3>Research</h3>
    <input type="file" multiple onchange="uploadFiles(this,'research')">
    <div id="researchContent"></div>
  </div>

  <div id="text_accounts" class="tabPanel" style="display:none;">
    <h3>Text / Newspapers / Accounts</h3>
    <input type="file" multiple onchange="uploadFiles(this,'text_accounts')">
    <div id="text_accountsContent"></div>
  </div>

  <div id="misc" class="tabPanel" style="display:none;">
    <h3>Misc</h3>
    <input type="file" multiple onchange="uploadFiles(this,'misc')">
    <div id="miscContent"></div>
  </div>

</div>

<script type="module">
import { supabase } from './supabase.js';

function getEFColor(intensity) {
  if (!intensity) return "#9E9E9E";

  const i = intensity.toString().toUpperCase();

  // Unknown
  if (i.includes("U")) return "#9E9E9E";

  // SPC-style colors
  if (i.includes("0")) return "#00FF00"; // EF0/F0 - bright green
  if (i.includes("1")) return "#32CD32"; // EF1/F1 - lime green
  if (i.includes("2")) return "#FFFF00"; // EF2/F2 - yellow
  if (i.includes("3")) return "#FFA500"; // EF3/F3 - orange
  if (i.includes("4")) return "#FF0000"; // EF4/F4 - red
  if (i.includes("5")) return "#FF00FF"; // EF5/F5 - magenta

  return "#9E9E9E";
}

const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  document.getElementById("title").innerText = "No tornado selected";
  throw new Error("Missing ID");
}

// DEFAULT TAB
window.showTab = function(tab) {

  // hide all panels
  document.querySelectorAll(".tabPanel").forEach(panel => {
    panel.style.display = "none";
  });

  // remove active from all buttons
  document.querySelectorAll(".tabs button").forEach(btn => {
    btn.classList.remove("active");
  });

  // show selected panel
  const selectedPanel = document.getElementById(tab);

  if (selectedPanel) {
    selectedPanel.style.display = "block";
  }

  // activate clicked button
  const clickedButton = document.querySelector(
    `.tabs button[onclick="showTab('${tab}')"]`
  );

  if (clickedButton) {
    clickedButton.classList.add("active");
  }
};

window.addEventListener("DOMContentLoaded", () => {
  showTab("tornado_pics");
});

// FILE UPLOAD
window.uploadFiles = async function(input, category) {
  const files = Array.from(input.files);
  const total = files.length;

  if (total === 0) return;

  const statusBox = document.getElementById("uploadStatus");
  let uploaded = 0;

  statusBox.innerText = `Uploading: 0/${total}`;

  for (let file of files) {
    const path = `${Date.now()}-${file.name}`;

    const { error } = await supabase.storage
      .from("uploads")
      .upload(path, file);

    if (error) {
      console.error(error);
      continue;
    }

    const { data } = supabase.storage
      .from("uploads")
      .getPublicUrl(path);

    const { data: { user } } = await supabase.auth.getUser();

    let uploader = "Anonymous";

    if (user) {
      const { data: profile } = await supabase
        .from("profiles")
        .select("username")
        .eq("id", user.id)
        .maybeSingle();

      uploader = profile?.username || "Anonymous";
    }

    await supabase.from("uploads").insert({
      tornado_id: id,
      category,
      file_url: data.publicUrl,
      status: "pending",
      uploaded_by: uploader
    });

    uploaded++;
    statusBox.innerText = `Uploading: ${uploaded}/${total}`;
  }

  statusBox.innerText = `✅ Uploaded: ${uploaded}/${total}`;
};

// SOURCE
window.uploadWriteup = async function () {
  const link = document.getElementById("writeupLink").value.trim();
  if (!link) return;

  const { data: { user } } = await supabase.auth.getUser();

  let uploader = "Anonymous";

  if (user) {
    const { data: profile } = await supabase
      .from("profiles")
      .select("username")
      .eq("id", user.id)
      .single();

    uploader = profile?.username || "Anonymous";
  }

  await supabase.from("uploads").insert([{
    tornado_id: id,
    category: "writeups",
    file_url: link,
    uploaded_by: uploader,
    status: "pending"
  }]);

  alert("Writeup submitted for approval");
  document.getElementById("writeupLink").value = "";
};

window.submitSummary = async function () {
  const summary =
    document.getElementById("summaryInput").value.trim();

  if (!summary) {
    alert("Write a summary first.");
    return;
  }

  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    alert("Please log in first.");
    return;
  }

  const { data, error } = await supabase
    .from("summary_submissions")
    .upsert(
      {
        tornado_id: id,
        user_id: user.id,
        summary_text: summary,
        status: "pending"
      },
      {
        onConflict: "tornado_id,user_id"
      }
    )
    .select();

  console.log("SUMMARY UPSERT RESULT:", data);
  console.log("SUMMARY UPSERT ERROR:", error);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  alert("Summary submitted!");
  location.reload();
};

// LOAD TORNADO
async function loadTornado() {
  const { data, error } = await supabase
    .from("tornadoes")
    .select("*")
    .eq("id", id)
    .single();

  if (error || !data) {
    document.getElementById("title").innerText = "Tornado not found";
    return;
  }

  document.getElementById("title").innerText = data.name;

  document.getElementById("summaryBox").innerHTML = `
    <h3>🌪 Tornado Information</h3>

    <div class="meta">
      <p><b>State(s):</b> ${(data.states || []).join(" - ") || "N/A"}</p>
      <p><b>Date:</b> ${data.date || "N/A"}</p>
      <p>
        <b>Intensity:</b>
        <span style="color:${getEFColor(data.intensity)}; font-weight:bold">
          ${data.intensity || "N/A"}
        </span>
      </p>
    </div>

    <hr style="border:1px solid #374151; margin:20px 0;">

    <h3>Summary</h3>
    ${data.description ? `<p>${data.description}</p>` : "<p>No summary yet.</p>"}

    <div style="margin-top:15px;">
      <h3>Add Summary</h3>
      <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
        <textarea id="summaryInput" placeholder="Write a tornado summary..."></textarea>
        <button onclick="submitSummary()">Submit Summary</button>
      </div>
    </div>

    <hr style="border:1px solid #374151; margin:20px 0;">

    <div id="writeupsBox"></div>

    <div style="margin-top:15px;">
      <h3>Add Writeup</h3>
      <div style="display:flex; flex-direction:column; gap:10px; margin-top:10px;">
        <input id="writeupLink" placeholder="Paste link here">
        <button onclick="uploadWriteup()">Add Writeup</button>
      </div>
    </div>

    ${
      data.pending_description
        ? `
      <div class="pendingBox" style="margin-top:20px;">
        <b>Pending Summary:</b>
        <p>${data.pending_description}</p>
        <small style="color:#fbbf24;">Awaiting admin approval</small>
      </div>
    `
        : ""
    }
  `;

  loadUploads();
  loadWriteups(id);
}

// LOAD UPLOADS
async function loadUploads() {
  const { data } = await supabase
    .from("uploads")
    .select("*")
    .eq("tornado_id", id)
    .eq("status", "approved");

  const safeData = data || [];

  const map = {
    tornado_pics: "photos",
    damage: "damage",
    radar: "radar",
    environment: "environment",
    research: "research",
    text_accounts: "text_accounts",
    misc: "misc"
  };

  Object.entries(map).forEach(([tab, cat]) => {
    const el = document.getElementById(tab + "Content");
    if (!el) return;

    const items = safeData.filter(i => i.category === cat);

    el.innerHTML = items.length ? "" : "<p>No uploads</p>";

    items.forEach(i => {
      if (tab === "writeups") {
        el.innerHTML += `<a href="${i.file_url}" target="_blank">${i.file_url}</a><br>`;
      } else {
        el.innerHTML += `
          <img
            src="${i.file_url}"
            onclick="showUploader('${i.uploaded_by || "Anonymous"}')"
            style="cursor:pointer;"
          >
        `;
      }
    });
  });
}

async function loadWriteups(tornadoId) {
  const { data, error } = await supabase
    .from("uploads")
    .select("*")
    .eq("tornado_id", tornadoId)
    .eq("category", "writeups")
    .eq("status", "approved");

  const box = document.getElementById("writeupsBox");

  if (error || !data || data.length === 0) {
    box.innerHTML = "<h3>Writeups</h3><p>None</p>";
    return;
  }

  box.innerHTML = `
    <h3>Writeups</h3>
    ${data.map(w => `
      <div style="
        margin-bottom:15px;
        padding:10px;
        border:1px solid #374151;
        border-radius:10px;
        background:rgba(255,255,255,0.03);
      ">

        <a href="${w.file_url}" target="_blank" style="color:#60a5fa;">
          Open Writeup
        </a>

        <div style="margin-top:10px;">
          <iframe
            src="${w.file_url}"
            style="width:100%;height:300px;border:none;border-radius:8px;"
          ></iframe>
        </div>

      </div>
    `).join("")}
  `;
}

window.showUploader = function(name) {
  alert("Uploaded by: " + name);
};

window.addEventListener("DOMContentLoaded", loadTornado);
</script>
</div>
</body>
</html>
